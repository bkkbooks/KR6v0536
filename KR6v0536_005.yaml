body:
  text: 第六歷代高僧附塔銘附居士佛法僧三寶為世福田佛已滅度法不自宏其傳法道而度衆生續慧命而啓後覺者唯僧是賴耳峨眉為普賢菩薩道場得具大誓願大精進大禪定大智慧之高僧宏揚之則普賢無盡之行如來最妙之道人人皆得修而證之矣故志高僧晉千歲寶掌和尚中印度人周威烈王十二年丁卯降神受質則左掌握拳七歲祝髮乃展因名寶掌魏晉間東遊此土入蜀禮普賢留大慈常不食日誦般若等經千餘卷有詠之者曰勞勞玉齒寒似迸巖泉急有時中夜坐階前神鬼泣一日謂衆曰吾有願住世千歲今六百二十有六矣故人以千歲稱之旋遊五臺復南歷衡嶽黃梅匡廬尋入建業會達磨入梁就而叩請悟無生忍武帝高其道臘延供內庭未幾如吳述偈曰梁城遇導師參禪了心地飄零二浙遊更盡佳山水遂遍探兩浙名山後居浦江之寶嚴與朗禪師友善每通問遣白犬馳往朗則使青猿故有題朗壁者云白犬銜書至青猿洗鉢回至唐高宗顯慶二年正旦手塑一像經九日成謂門人慧雲曰此肖誰雲曰與和尚無異即澡浴易衣趺坐謂雲曰吾住世已一千七十一年今將謝世聽吾偈曰本來無生死今亦示生死吾得去住心他生復來此又囑曰吾滅後六十年有僧來取吾骨勿拒言訖而逝入滅五十四年有刺浮長老自雲門至塔所禮曰冀塔洞開少選塔戶果啓其骨連環若黃金浮即持往秦望山建窣堵波奉藏以周威烈王丁卯至唐高宗顯慶二年丁巳實一千七十一年其在此土蓋歷四百餘歲云晉阿羅婆多尊者西域聖僧也來禮峨眉觀山水環合頗同西域化城寺地形遂依此而建道場山高無瓦埴又雨雪寒嚴多遭凍裂故以木皮蓋殿因呼為木皮殿晉釋慧持遠公之弟與遠共事道安法師及安在襄陽遠公東下持亦俱行初憩荊州上明寺後適廬山皆隨遠共止持欲觀瞻峨眉振錫岷岫乃以晉隆安三年辭遠入蜀遠苦留不住歎曰人生愛聚汝獨樂離如何持亦悲曰若滯情愛聚者本不應出家今既剖欲求道正以西方為期耳於是兄弟抆淚憫默而別到蜀止龍淵精舍四方慕德所至成侶刺史毛璩耆宿惠巖僧恭皆望風推服有升持堂者號登龍門後因譙縱之亂殺璩及巖恭等持避難之郫縣中寺縱有從子道福凶悖尤甚將兵往郫討戮入寺人馬浴血衆僧驚走持在房前盥洗神色無忤道福直至持邊持彈指漉水淡然自若福愧悔流汗出寺門謂左右曰大人故與衆異後境內清恬還止龍淵講說齊懺老而愈篤以晉義熙八年卒春秋八十有六臨終遺命務最律儀謂弟子曰經言戒如平地衆善由生汝等行住坐臥宜其謹哉附考宋時嘉州道左大樹因風吹折穴中有一定僧頭髮蓋身爪甲圍腰一匝有司以聞迎至都下令西僧總持擊金磬再拜乃出定叩之曰吾遠法師弟也再叩曰吾將往陳留遂復入定明萬曆末四川按察曹公學佺云往在金陵同年金礪為言近日陳留古廟因取土修理掘其下有三缸蓋底皆俯其中仰者有定僧坐焉爪甲繞身羣衆喧譁不已聊一開眸問曰是何時衆答曰萬曆某年也曰吾尚早仍閉目衆努力搖之不動衆懼遂覆之如初按高僧傳載持卒於龍淵今山頂有老僧樹云是持入定處未知孰是詳志餘按明嘉靖間灌縣青城山樵陽子亦有前身坐蛻樹中事孫柏潭先生有傳載四川總志晉釋明果資州人幼剃髮龍遊山謁秦竺法護於大興善寺一日聞護開示如來座者一切法空是頓悟厥旨回蜀就寶掌峯卓錫中峯始號乾明觀彼中道士每於三月三日效瞿武升仙之法歲以為常師聞知是妖孽請讓先升階伏獵人箭綴絲綸果中之一白蟒也尋理其處乃見冠簪白骨滿窟羽人悔悟即觀改為中峯寺迎師承事焉宇文周釋寶彖姓趙氏本安漢人後居綿州昌隆之蘇溪年七歲至巴西郡太守楊眺問云聞兒人讀書因何名為老子彖曰始生頭白故也眺密異之冠歲出家即受具戒後還涪州開化道俗又抄集醫方療諸疾苦或報以金帛一無所受彖雖道張井絡風播岷峨見大乘一經未弘蜀境為之疏記欲使後學有歸忽感風疾不言久之命將絶私心發誓願諸佛護念作是念已忽然能語後卒於潼川光興寺即綿州振響寺也時保定元年隋茂真尊者日遊呼應夜宿棋盤二處古迹現存唐昌福達道和尚眉州人初參晦機回峨眉住華嚴寺僧問學人來問則對不問時意旨如何曰謝師兄指示曰本來則不問如何是今日事曰師兄此問大好曰學人不會時如何曰謾得即得曰國有寶刀誰人得見曰師兄遠來不易曰此刀作何形狀曰師兄要也道不要也道曰請師道曰師兄難逢難遇曰普賢云何駕石船曰師是這箇亙古亙今西禪和尚問佛是摩耶降未審和尚是誰家子師曰水上問如何是密室中人師曰非男女相問國內按劍者誰師曰昌福曰忽遇尊貴時如何師曰不貴唐趙州禮峨眉於放光臺不登寶塔頂僧問和尚云何不到至極處州云三界之高禪定可入西方之曠一念而至惟有普賢法界無邊唐黃檗老人禮峨眉至覩佛臺霧氣澄霽曰云何不見僧問不見甚麼檗云不見普賢唐南泉老人禮峨眉觀白雲光紫曰還有這點霞氣在僧問和尚是那一點泉云東則東北則北僧便禮拜唐靈龕和尚成都人參陝西青峯禪師回峨眉住靈巖寺僧問如何是諸佛出身處曰處處非千佛春來草自青又問碌碌地時如何曰試進一步看僧曰不知前進處師曰步步踏著唐白水和尚初參夾山善會禪師回峨眉居白水僧問如何是西來大意曰四溟無窟宅一滴潤乾坤又問曹溪一路合談何事曰澗松千載鶴來聚月中香桂鳳凰歸唐洞溪和尚初參樂普曰月樹無根枝覆蔭普曰森羅秀處事不相依淥水千波孤峯各異師有省一日普問曰螺螄為甚麼被蛇吞去也師曰幾度扣關拈不出持錫便行普曰善哉又憶普賢回峨眉唐澄照大師初參投子回蜀住白水寺每日六時朝禮普賢大士僧問諸佛有難向火焰裏藏身衲僧有難向甚麼處師曰水晶石上起波文大地衲僧都在裏許又問云何是初生月曰大半人不見唐西禪和尚本州人昔參曹山曰佛是摩耶降未審和尚那家子山曰石頭漂在水裏曰三十六路阿那一路最妙山曰不出第一手曰忽被出頭時如何山曰脊著地也不難唐慧覺禪師謁台州勝光和尚值光在繩牀上坐師直到身邊叉手立光問甚麼處來師云猶待客話在便下去光乃拈拂子下僧堂前見師提起拂子問云闍黎喚這箇做甚麼師云敢死喘氣光低頭便歸方丈師初參羅山才禮拜起山云甚處來師云遠離西蜀近發開元卻近前云即今事作麼生山揖云喫茶去師擬議間山云秋氣稍暖出去師到法堂上自歎云我在西川峨眉山腳下拾得一枝蓬蒿箭擬撥亂天下今日到福建道陳老師寨裏弓折箭盡去也休休山明日升堂師又出問豁開戶牖當軒者誰山便喝師無對山云羽毛未備且去後還蟠龍寺住唐正性和尚住華嚴寺前朝古殿一所重修之以旋篆結頂至今呼為雲篆殿羅漢和尚初參香林澄遠禪師回峨眉延福院右邊住一小洞常現禪定僧問如何是西來大意師曰井中紅焰日裏浮漚曰如何理會師曰遙指扶桑日那邊曰如何是羅漢境界師曰地連香積水門對勝峯山曰既是羅漢為甚麼卻被人轉動師曰換卻眼睛轉卻髑髏布水巖和尚昔參曹山曰寶劍未磨時如何曰觸用不得磨後何如曰用觸不得又問如何是西來大意曰一步踏著火光飛於此有省回峨眉白巖寺居黃龍繼達禪師昔參晦機回峨眉住光相寺僧問如何是師作用處曰橫鋪四世界豎蓋一乾坤問道滿來時如何曰要羹與羹要飯與飯問黃龍出世金翅鳥滿空飛時如何曰我問你金翅疾得飽否僧無對黑水和尚本縣人因禮峨眉參黃龍曰雪覆蘆花時如何曰猛烈師云不猛烈黃便打師有省自爾契緣遊黑水峯下而居有人來禮問和尚尊號曰汝看山峯喚作甚麼大乘和尚青神人初參雲門回峨眉住龍池四面峯僧問如何是勝峯曰直聳煙嵐際曰向上事何如曰立地三尺五曰如何是佛法大意曰興義門前鼕鼕鼓曰學人不會曰朝打三千暮打八百唐東汀和尚本縣人初參曹山後居峨眉棋盤寺僧問如何是卻去底人曰石女紡麻纑問如何是卻來底人曰扇車關棙良計斷僧禮拜唐慧通禪師江陵人洛浦元安法嗣唐僖宗時遊峨眉望山峯奇異有古肇公道場欲往履之溪水泛漲偶感一虎至即騎虎跳過溪流故名虎渡橋厥後通聞朝廷重興六寺以山象火遂改三雲二水壓抑火星迄今全身供黑水祖堂出傳燈録師有妹尼慧續亦從兄闡化有烏鴉報曉二虎巡廊之異白水瑋禪師新羅金藏法嗣曹山本寂孫與洞山道延弟兄白水仁禪師洞山良價法嗣黑水和尚有二一黃龍晦機法嗣巖頭全奯曾孫一溈山靈祐法嗣與仰山兄弟唐昭宗時人禪燈世譜偶逸其名黑水承璟禪師德山緣密法嗣雲門文偃孫黑水義欽禪師承璟法嗣宋白水如新禪師玄沙師備法嗣雪峯義孫宋初住白水寺宋慧真廣悟禪師益州人受業於峨眉洞溪山黑水寺參方慕道遇雲門法席密承指喻乃開山創院漸成叢林開堂日雲門和尚躬臨證明僧問如何是佛法大意師曰日出方知天下朗無油那點佛前燈問如何是雙峯境師曰夜聽水流庵後竹晝看雲起面前山問如何是法王劍師曰鉛刀徒逞不若龍泉曰用者如何師曰藏鋒猶不許露刃更何堪問賓頭盧應供四天下還得遍也無師曰如月入水問如何是用而不雜師曰明月堂前垂玉露水晶殿裏撒珍珠有行者問某甲遇賊來時若殺即違佛教不殺又違王敕未審師意如何師曰官不容針私通車馬至太平興國二年三月戒門人曰吾不久去世汝可就本山頂預修墳塔至五月二十三日功畢師曰後日子時行矣及期會雲門爽和尚溫門舜峯長老七人夜話侍者報三更師索香焚之合掌而逝宋行明禪師長洲魯氏子從師歷五臺峨眉禮文殊普賢二菩薩菩薩皆隨心應現後棲祝融峯七寶臺誓投軀學薩埵太子越多劫而成聖果委身虎豹爭競食之須臾肉盡同學泰布衲收其殘骼焚之得舍利焉宋繼業三藏耀州王氏子剃髮於東京天壽院乾德二年奉詔入天竺求舍利及貝多葉至開寶九年始歸聽擇名山修習登峨眉至雙飛橋見兩石鬭溪上攬得其一眉目宛然以為寶瑞因名寶現溪見牛心衆峯環翊作庵以居已而為寺年八十四示寂有遺錫在牛心寺宋茂真居白水寺太平興國五年二月奉詔入朝太宗賜詩美之館于景德寺舒王元珍以夢兆語真真曰當有儲嗣果育仁宗既歸重興五山六寺後遣張仁贊齎黃金三千兩于成都鑄普賢大士像高二丈六尺至今供養按此茂真非隋茂真尊者乃另是一人宋白水宗月禪師谷隱靜顯法嗣黃龍慧南之孫與晦堂祖心兄弟宋密印安民禪師嘉定州朱氏子初講楞嚴于成都為義學所歸時圓悟居昭覺師與勝禪師為友因造焉聞悟小參舉國師三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰如何是文彩已彰處師心疑之告香入室悟問座主講何經師曰楞嚴悟曰楞嚴有七處徵心八還辨見畢竟心在甚處師多呈義解悟皆不肯師復請益悟令一切處作文彩已彰會偶僧請益十玄談方舉問君心印作何顏悟厲聲曰文彩已彰師聞而有省遂求印證悟示以本色鍵鎚師則罔措一日白悟曰和尚休舉話待某說看悟諾師曰尋常拈鎚豎拂豈不是經中道一切世界諸所有相皆即菩提妙明真心悟笑曰汝原來在此中作活計師又曰下喝敲牀時豈不是返聞聞自性性成無上道悟曰汝豈不見經中道妙性圓明離諸名相師於言下釋然後悟為衆小參舉古帆未挂因緣師聞未領求決悟曰汝問我師舉前話悟曰庭前柏樹子師即洞明謂悟曰古人道如一滴投於巨壑殊不知大海投於一滴悟歎曰奈這漢何未幾令分座悟有偈贈師載詩集尋開法保寧遷華藏旋里領峨眉中峯上堂衆賣華兮獨賣松青青顏色不如紅算來終不與時合歸去來兮翠藹中可笑古人恁麼道大似逃峯赴壑避溺投火爭如隨分到尺八五分钁頭邊討一箇半箇雖然如是保寧半箇也不要何故富嫌千口少貧恨一身多冬至上堂舉玉泉皓和尚云雪雪片片不別下到臘月再從來年正月至十月依前不歇凍殺餓殺免教胡說亂說師曰不是罵人亦非讚歎高出臨濟德山不似雲居羅漢且道玉泉意作麼生良久云但得雪消去自然春到來師後示寂於本山闍維舍利頗賸細民穴地尺許皆得之光明瑩潔心舌不壞宋慧遠禪師生於眉山金流鎮彭氏年十三投藥師院僧宗辨出家祝髮受具即往成都習經論還峨眉靈巖寺時徽禪師住焉徽黃龍南四世孫知見甚高師初入門值徽飯罷於庭廡間閒行師才見即放包問曰文殊為七佛之師未審甚麼人為文殊之師徽云金沙灘畔馬郎婦時有起鐵拂者為首座師亦往親近起常誘掖之兩歲未有所得一日靜坐次有僧獨行自語云假四大以蓋覆緣六塵而生心忽遇六塵頓息喚甚麼作心師聞之忽有省遽起告座座可之上方丈告徽徽亦可之明日即告行同志挽留師不聽曰吾師以為可而我終未釋然也時圓悟自雲居歸蜀住昭覺師造焉每問話請益辭旨峭硬悟深契之一日悟普說舉龐居士問馬祖不與萬法為侶者是甚麼人祖云待汝一口吸盡西江水即向汝道師聞舉豁然大悟仆於衆中衆以為中風共掖起之師乃曰吾夢覺矣至夜悟小參師出問曰淨裸裸空無一物赤骨立貧無一錢戶破家殘乞師賑濟答云七珍八寶一時拏師曰賊不入謹家之門答云機不離位墮在毒海師隨聲便喝悟以拄杖擊禪牀云喫得棒也未師又喝悟連喝兩喝師禮拜悟大喜以偈贈師有舊鐵舌轉關棙之語衆目之為鐵舌師自此機鋒峻發無所抵牾師自發明心要即得遊戲大自在三昧嘗因開爐升座曰天無門地無壁葫蘆棚上種冬瓜兩手扶犁水過膝跳金圈吞栗棘氈柏板對無孔笛屈屈獨腳山魈解雙躍去年冬裏無炭燒今年定是無火炙饑時饑到眼睛黃窮時窮到赤骨立屈屈且道屈箇甚麼頗奈監寺副寺維那典座直歲等卻與泥水匠商量放出兩頭鴟吻咬殺佛殿脊奉詔住高亭山崇先寺未幾再命靈隱開堂孝宗皇帝屢詔入內賜號佛海禪師上堂說偈曰淳熙二年閏季秋九月旦鬧處莫出頭冷地著眼看明暗不相干彼此分一半一種作貴人教誰賣柴炭向你道不可毀不可讚體若虛空沒巖岸相呼相喚歸去來上元定是正月半於時都下喧傳師當以正月十五日遷化遂達上聽至期無疾升座祝聖如常儀上亦密遣中使伺師起居皆見師往來如常時送歸奏齊罷侍者與俗官同上方丈但見門扃閉甚密師素畜一黑猿頗馴能知人意因衣以布裰命之曰猿行者至是求師不見因窺於窗隙中但見猿手持一卷書立於牀前遂亟從後路至榻前撥開帳子而師已化矣取猿手中書觀之乃辭世頌曰拗折稱錘掀翻露布突出機先鴉飛不度留七日顏色不變壽七十四宋釋道宏峨眉人姓楊氏受業於雲頂山相貌枯悴善畫山水僧佛晚年似有所遇遂復冠巾改號龍巖隱者族甚宏富只寄迹旅店中一空榻雖被襆之屬亦無所有為人畫土神其家必富畫貓則無鼠往往言人心事輒符合又凡如廁必出郭五里外鄉人每隨而窺之見其就溷無復便行但立而獨語再四乃出比皆異事後竟坐化店中年八十餘宋純白禪師梓州飛烏人姓支氏父謙聞法於松山道者以死生為戲白衣梵行緇俗無出其右者自嘗云吾根鈍不得入圓頓願有子續佛慧命足矣師少聞父誨諦聽沈思有如夙習一日躍過溪忽有省不覺失笑遂往依峨眉山華嚴寺落髮受具父子相與遍歷成都講肆通性相宗經論去之南遊首謁澧州太平俊禪師俊目為真法子付以十三條說法大衣師遜卻之後詣黃檗山禮真覺勝禪師親近歲餘未始一顧師奉事益勤勝一日忽擡眸視之師咄曰這老漢把不定作麼勝大笑乃為印證心地元豐末宗室南康郡王自黃檗邀勝詣輦下師侍行未幾會大學生上書訟博士者語連勝有旨放歸蜀門人星散獨師負巾鉢以從會成都府帥奏改昭覺為十方禪院問真覺誰可住持覺以師應師既領院遵南方規範一變律居上堂示衆有曰不起性海是理事縛不透聲輪是語言縛於是蜀之淨侶靡然向風朝散郎馮敢奉議郎段玘天臺山隱者宋放唐安文士祖思昱皆摳衣執弟子禮元祐末白水寺僧正闕丞相蔡京時帥成都命師住師不樂遂並昭覺辭之請歸舊剎建立綱宗久之將示寂頌曰風高月冷水遠天長出門無影四面八方怡然而寂宋禪惠大師名山人屢舉不第元符間郡守呂由誠以僧牒戲之師即削髮明日往天寧為僧或問瓦屋道坊何以木皮蓋師曰錦府豈從機上織劍門寧自匣中藏其機敏不一有禪惠語録行世宋別峯禪師龍遊李氏子世居峨眉從密印禪師得法後又事圓悟入室深相許可遍參溈山福巖疏山皆目擊契存至徑山大慧獨掃一室待之師出峽住保寧金山雪竇開堂升座曰世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比丘最初悟道後來真淨禪師初出洞山拈云今日新豐洞裏祇轉箇拄杖子遂拈拄杖著左邊云還有最初悟道者麼若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座則不然今日向鳳凰山裏初無工夫轉四諦法輪亦無氣力轉拄杖子祇教諸人行須緩步語要低聲何故欲得不招無閒業莫謗如來正法輪上堂三世諸佛以一句演百千萬億句收百千萬億句祇在一句祖師門下半句也無祇恁麼合喫多少痛棒諸仁者且道諸佛是祖師是若道佛是祖不是祖是佛不是取舍未忘若道佛祖一時是佛祖一時不是顢頇不少且截斷葛藤一句作麼生道大蟲戴紙帽好笑又驚人復舉僧問巖頭浩浩塵中如何辨主頭云銅砂鑼裏滿盛油師曰大小巖頭打失鼻孔或有人問保寧浩浩塵中如何辨主祇對他道天寒不及卸帽上堂六月初一燒空赤日十字街頭雪深一尺掃除不暇回避不及凍得東村廖鬍子半夜著靴水上立又云將心除妄妄難除即妄明心道轉迂桶底躍穿無忌諱等閒一步一芙蕖淳熙七年敕住徑山靈隱臨終預定時日如期而逝有塔銘見後宋黑水曇振禪師大慧杲法嗣宋峨眉道者蜀人不詳氏族名字戒律甚嚴不下山二十年一日有布衣青裘昂然一偉人來與語良久期以明年是日復相見於此願少見待明年是日方午道者沐浴端坐而逝至暮偉人果來問道者何在曰亡矣偉人歎息良久書數語於堂側壁間絶高處云落日斜西風冷幽人今夜來不來教人立盡梧桐影字畫飛動如翔鸞舞鳳非世間筆也或云呂洞賓作出竹坡詩話明廣濟禪師龍興寺僧洪武微時與之厚迄帝即位師避居牛心屢詔不出後竟終於此有塔在寺蜀獻王贈詩明寶曇國師吳人乃斷巖禪師後身洪武初敕往峨峯重建鐵瓦殿並鑄普賢金像留蜀十年道化大行後召還卒天界寺洪武寄詩二首明匾囤禪師號無空禹州陳氏子年踰二十忽辭父母求出家父母曰此兒引舌過鼻非常人也任其去乃投少林寺禮梵僧喇嘛為師挂搭三年一日從師請求法名師曰道本無形何名之有固請師授以心經讀至五蘊皆空豁然大悟曰身尚是幻何處求名一日手編大囤於師前師指曰匾囤是汝名也答曰既為匾囤為甚麼空師曰教外別傳方契此語一日辭師至中條後到峨眉絶頂結茅以居一日見阿彌陀佛手執大彌陀經一部曰藏內有經藏外全無付授與汝廣令傳化禪師遂飛錫周流宇內遍蹈九州後到京都居吉祥庵前後印造大彌陀經若干藏未幾復還少林嘉靖四十二年再之峨眉山欲以終老行至夔州江中曰道曠無涯逢人不盡登岸端坐而逝祥雲結頂身如金色明無瑕禪師蜀資縣人鎣華惠堂禪師法嗣居聖燈峯虎豹遠避有病者取頂帽數繻丸之令服立效萬曆初預定時日說偈坐化有塔銘明遍融真圓禪師西蜀營山人姓錢氏家世業儒書史過目不忘至壯齡三十有二一旦天機頓發百念灰冷遂託峨眉之遊宗親遮留弗止至是會異僧於九老洞示授曹洞宗旨欣然翦髮僧囑以遍遊法席勿坐守一隅師即下山直抵京師遇通秀二師講華嚴聽至若人欲識佛境界當淨其心如虛空倏然頓悟身超虛空不覺屋廬為礙私喜曰法界玄宗毗盧性海無外吾之方寸矣且道離文字孰衍孰聽所謂畫餅不能充飢斯言信矣翌日曳杖匡山高棲馬祖洞同氣相求者裹糧趨風不可勝數嘗戒衆云聖道虛玄要在躬履密踐至於水冷天秋之際或有少分相應否則畢命寒巖於汝何益衆領會竟進山中乏食採薪貿粟九江冒暑經寒凡歷七載未嘗憚勞師由是道振江南矣復往京師寓柏林禪院閲藏經年一時雷動風合公卿畢集識者疑為彌勒再世隆慶中被誣入獄訊次刑具斷裂飛擲屋上訊者驚沮未幾太嶽張公上章明師無罪獄幸解乃延請住德勝門北大千佛寺宮中陳李二國母命皇親李公送襯帛萬匹師儼坐室中若未聞見李公歎息而去宗伯五臺陸公見訪啓師曰如何是文殊智曰不隨心外境又問如何是普賢行曰調理一切心又問如何是毗盧法界曰事事無礙陸聞誨如坐春風之中壽八十三明鎮滄沙彌未剃髮時從峨眉慧宗禪師荷擔甚疲師問曰耐煩乎應曰諾行一二里復問如前略不少惰乃於雙飛橋為之祝髮師憐其愚令炷香跪大士前頂水盂誦祝聰明呪一百遍凡歷年所至白水寺猶如此一日寺災滄遂入水觀三昧祝曰殿宇既空願保庫司無恙遂歸庫房默坐頂水火至自滅明別傳和尚名會宗楚人光澤惠禪師法嗣壞空成之孫無際曾孫明神宗賜號洪濟禪師生平戒行精嚴願力勇猛始開峯頂銅瓦殿及海會堂兩處叢林凡齊僧造佛鑄鐘募化戒壇僧衆衣鉢俱以十萬八千為期嘗於古德林手栽楠樹二里共六萬九千七百七十七株每種一樹輒禮法華經一字至今蓊鬱成林號為神樹兵火時曾有人欲竊取為兵械者林中忽有大蛇逐之又有拾枯枝供爨者大石壓折一足曾於聖積寺接衆又為募鑄一鐘甚巨師初禮五臺道京師參遍融和尚囑令持一大瓢募緣師詣後宰門禪定七日感朝廷施金滿中約斗許送千佛寺齊僧奉詔入內庭賜紫仍在後宰門供養三年圓寂後遣大璫送靈骨還峨三處眷屬分請造塔在白水之鉢盂山有塔銘詳後有弟子台泉由中貴披剃奏請重建萬年寺載碑記明通天大師秦同州人自幼棄家學道嚴持戒律所至募緣飯僧滴水同享後得法於鐵山和尚萬曆間憩息峨眉宣文太后為建護國草庵寺即今圓覺庵居之壽七十六辭世建塔肉身現存山頂有塔銘明無窮禪師蜀銅梁人通天法嗣從師苦行忘身供養後至京都感萬曆慈聖太后賜金建大佛寺又於萬年寺側建慈聖庵一所內賜經藏袈裟幡幢及香燈田地甚多有塔銘詳後明大智和尚諱真融楚人戒律精嚴刻苦供衆凡建立五臺伏牛峨眉鎣華四常住最後至普陀創海潮寺今峨眉山頂淨土庵存有遺願碑切戒子孫不得背衆營私恃強爭競塔在普陀海潮即今之法雨寺明妙峯名福登山西平陽人姓續氏春秋續鞠居之裔生秉奇姿脣掀齒露鼻昂喉結七歲失恃怙為里人牧羊十二歲投近寺僧出家僧待之虐逃至蒲坂行乞于市夜宿郡東文昌閣閣係山陰王建請萬固寺朗公居之一日山陰王見之謂朗公曰此子五官皆露而神凝骨堅他日必成大器當收為徒善視之未幾地大震民居盡塌登壓其下無所傷王益奇之乃修中條山棲巖蘭若令登閉關專修禪觀日夜鵠立者三年入關未久即有悟處作偈呈王王曰此子見處已如此若不挫之後必發狂遂取敝履割底書一偈云者片臭鞋底封將寄與汝並不為別事專打作詩嘴封而寄之登接得禮佛以線繫項自此絶無一言矣三年關滿往見王則本分事明具大人相王甚喜令其往聽楞嚴受具戒繼又令其遍參知識北方乾燥及到南方朝普陀因受潮溼遍身生疥發願造滲金文殊普賢觀音三大士像並銅殿送五臺峨眉普陀以永供養回至寧波染時證幾死旅宿求滴水不可得遂以手掬浴盆水飲之而甘次日見其甚穢大嘔吐忽悟曰飲之甚甘視之甚穢淨穢由心非關外物即通身發汗而愈而疥瘡仍舊至南京大報恩寺無極法師講華嚴懸談憨山為副講登討一淨頭單以期養病而聽經每日于大衆過堂及放養息時打掃廁室甚為清潔憨山億此淨頭必是高僧遂私訪之與登訂盟為同參不久廁室不潔憨山知登去遂亦去尋之登去後回蒲州乃於中條最深處結茅靜修辟穀三年大有所悟山陰王於南山建梵宇請登居之又令往北京請藏經於京師市中得遇憨山及經事完畢同至蒲州次年同往五臺卜居於北臺下龍門之妙德庵越三年各寫華嚴經憨山用泥金刺血和金寫其金紙皆慈聖皇太后所賜登則刺舌血和硃寫各以此報罔極恩及經畢登擬建無遮大會百二十日事已妥慈聖太后遣官來山祈皇儲遂以此功德通歸祈儲過十月皇儲生即泰昌也此會已畢登與憨山以大名之下不可久居同皆下山隱遁憨山往牢山登往蘆芽山結庵以居太后命人訪而得之即為賜建蘆芽華嚴寺成一大道場自此建叢林修橋梁鋪山路者二十餘年凡大工程他人不能成者一請登料理不久即成成則去之不復過問一生所興大道場十餘處並其他工程由登之福德智慧與其忠誠故上自皇帝宰輔以訖士庶無不景仰信從而樂施之三大名山之銅殿亦登所親製初登奉敕送大藏經于雞足山歸而禮峨眉發願鑄三大士滲金像而以銅殿供之及至京稟復後遂杖錫謁潞安瀋王王出萬金即具資送登往荊州監製殿成運至峨眉大中丞王霽宇撫蜀為之輔助遂建聖壽永延寺欽賜藏經工成登令惟密師住持登復往荊鑄普陀銅殿此係王霽宇出資者及成運至金陵普陀僧拒不敢受蓋恐以金殿之名致海寇之搶劫耳因送之寶華山時山寺衰敗登即奏懇敕修得以中興又鑄五臺者供顯通寺亦蒙敕修其寺將終前晉王請修山西省城大塔寺殿宇工完又修會城橋長十里工未完登以疾還山乃料理所建道場通為十方常住各得其人向來輔助料理之眷屬悉令歸萬固不留一人於餘處至臘月十九日端坐而逝壽七十三臘四十餘時萬曆四十年將逝之前數日皇帝敕封真正佛子之敕黃到及聞其逝又賜金建塔並令凡登所有未完之工悉令完之猗歟懿哉如登者可謂人天師表法門砥柱矣當其閉關得鞋底時若非有大根行當即氣死豈肯以此繫之于項乎況已通宗教後為養病故討淨頭當今人稍有見處令彼打掃佛殿尚不肯況廁室乎又況偷空打掃必致極其淨潔乎所興十餘處大道場自己眷屬一人不住其謙卑自牧無有我相唯知為法為人了無自私之念非乘願再來振興法道者能如是乎登一生道行功業詳具夢遊集本傳今略舉其大概而已明歸空和尚諱明陽自伏牛入京能一七不食日飲水數升持之至五年衆號之曰水齊自幼出家慈氏寺後三十年行腳不襪不席曾跪行至五臺足膝血流不知痛為參古松然一指以供文殊再禮普陀參大智然一指以供觀音後禮峨眉叩通天然一指以供普賢至北京時譽者日衆孝定皇太后聞而創寺居焉明神宗賜額曰長椿並賜紫衣金頂凡三吉水鄒都憲南皋問十指今七那三指何在曰十指依然又問老師遍參所得何事曰是慈氏寺明陽崇禎甲戌九月朔端坐說偈而逝鄒公贈詩二首云實無一事金門客時過長椿佛子堂強似淵明心不雜清尊特許對爐香尚餘七指杖能拏亂走胡行今到家為問那三何處在依然合十更無差明萬世尊者自稱峨眉山人巴陵進士楊一鵬初任成都府推官登峨眉世尊踞佛座睨楊而笑曰汝不記下地時行路遠啼哭數日夜吾撫其頂而止耶楊追憶兒時語大驚禮拜耳語達旦臨別囑曰三十年後見汝於淮上楊後開府淮安一日薄暮有野僧擊鼓稱峨眉山萬世尊寄書發函得絶句詩七首大索寄書僧已不知所往矣已而流賊焚鳳陽明祖陵楊坐失救論死西市其詩始傳於世而後二首祕不傳楊公子昌朝云公臨刑無他語但連呼好師傅數聲世尊名大傅今常在峨眉往來人間無常處人亦時時見之寄楊詩云謫向人間僅一周而今限滿恐難留清虛有約無相負好覓當年范蠡舟業風吹破進賢冠生死關頭著腳難六百年來今一遇莫將大事等閒看浪遊生死豈男兒教外真傳別有師富貴神仙君兩得尚牽韁鎖戀狂癡難將蟒玉拒無常勳業終歸土一方欲問後來神妙處碧天齊擁紫金光頒來法旨不容違仙律森嚴敢泄機楚水吳山相共聚與君共跨片霞飛澄江和尚川西內江人童年入道行平等慈遍參諸方名宿專精戒律深探藏海別行一路向上提持一時遠邇皈仰師在內水開兩處叢林所募書冊梵本兩藏現存說戒富邑感有大山鋪五王神從座領戒之異壽八十塔於峨眉伏虎寺逝多林印宗和尚綿州人齠齔披緇制心一處參方事畢止錫四峨每跏趺時祥雲結蓋猛獸柔心無不調伏歲逢亢旱縣令遠延蒲團剛至甘霖充滿一夕中有四龍王容貌殊特衣冠甚偉禮拜叉手環立四向至誠白云我本龍王現居巖後欽師道德故來頂授師為咐囑信受而去次日摳衣後巖見一石龕四像儼然天下衲子雲驟越千三百每於垂訓道俗聆之無不流涕春秋七十有零一日敷坐告衆云諸上善人吾世緣已盡汝等各各殷勤戒定莫習餘業莫戀名利須信春深一刻值千金臨渴掘泉枉徒勞復厲聲云萬緣已盡詎可再三召大衆念佛千聲瞑目而逝清貫之和尚諱性一犍為人自少於觀音寺三濟和尚座下出家生平竭力殫心利人濟物靡有倦怠後偕其徒可聞開建伏虎寺結構精工宏壯歷草餘載乃成遂冠峨山諸剎臨終索紙筆書偈云年經七十六自愧無長處弘誓深如海道心高似佛生生任我行世世人天路萬物常圍繞那些隨分足擲筆端坐而逝塔於寺右紅珠山有塔銘清紫芝和尚諱性藏渝城人年十五祝髮住白水寺三十餘載開堂說法者九有語録行世康熙癸丑杖錫東行乙卯歲圓寂於揚州上方寺書偈扇頭曰年光五十七世緣今已畢東海石頭枯大峨如鐵壁書畢沐浴趺坐而逝法嗣瓊目負靈骨歸峨建塔清繡頭和尚不知何處人亦不言其名惟髮繡成螺髻無蟣蝨爬搔人咸以繡頭和尚稱之結茅於洪椿坪山左箐林中止一鋤钁種芋菜為食夜則念佛經行數十里直造峨山之頂黎明便還不入寺院或邀飲食不赴如是十數年習以為常繼而靜坐不再出遊目不識丁口能說偈每食先傾飯兩堆於屋前擊竹梆數下羣蛇羣鼠各出就食食竟乃去住山二十餘年人皆異之凡朝山者往往造廬禮拜焉清舒光照禪師蘄水人避世入峨眉絶頂影不出戶者二十餘載忽欲下山鳴鼓上堂云九旬限滿巧中藏拙晝夜殷勤拙中藏巧養馴一箇水牯牛頭角崢嶸毛不少今朝肆足印莓苔笑殺平田黃大嫂辭世形本無形說亦無說盡大地人難摸索七十九年駐娑婆彈指光陰如夢覺舉步踢倒峨眉山者邊那畔總一箇喝一喝擲筆而逝附塔銘塔銘乃高僧傳之校詳者文體雖異事實是同故附之別峯禪師塔銘宋陸游南山自長安秦中西南馳為嶓為岷東行紆徐起伏歷蠻夷中跨軼且千里然後秀偉特起為三峯摩星辰蓄雲雨龍蟠鳳翥是名峨眉山通義犍為二郡實在其下人鍾其氣為秀民傑士出而仕者固多以功業文章擅古今至於厭薄紛華捐棄衣冠木食澗飲自放於塵垢聲利之外而不幸為人知不能遂其隱操亦卒至於光顯榮耀者如別峯禪師是也師名寶應字恆寂生為龍游李氏子世居峨眉之麓少而奇警日誦千言然不喜在家乃從德山院清遠道人得度成童時已博通六經及百家之說至是復從華嚴起信諸名師窮源探賾不高出同學不止論說雲興泉涌衆請主講席謝不可圓悟克勤禪師有嗣法上首安民號密印禪師說法於中峯道場乃挈一笠往從之一日密印舉僧問巖頭起滅不停時如何巖頭叱曰是誰起滅師豁然大悟自是室中鋒不可觸密印恨相得之晚會圓悟自南歸成都昭覺乃遣師往省因隨衆入室圓悟舉從上諸聖以何法接人師舉起拳圓悟曰此是老僧用者孰為從上諸聖用者師即揮拳圓悟亦舉拳相交大笑而罷圓悟歎異曰是子他日必類我師留昭覺三年密印猶在中峯以堂中第一座致師師辭密印大怒曰我以法得人人不我傳尚何以說法為欲棄衆去衆惶恐亟趨昭覺羅拜致懇圓悟亦助之請始行道望日隆學者爭歸之雖悟印二師不能掩也久之南遊見溈山佛性泰福巖月庵果疏山草堂清皆目擊而契或以第一座留之師潛遁以免最後至徑山見大慧杲大慧問曰上座從何處來師曰西川來大慧曰未出劍門關與汝三十棒了也師曰不合起動和尚時徑山衆千七百雖耆宿名衲以得棲笠地為幸顧為師獨掃一室堂中皆驚大慧南遷師亦西歸焉始住臨邛鳳凰山舉香嗣密印歷住廣漢崇慶武信東禪成都龍華眉山中巖復還成都住正法道既盛行士大夫亦喜從之遊築都不會庵松竹幽邃閒日名賢畢集聞師一言皆自謂意消稍或閒闊輒相語曰吾輩鄙吝萌矣其道德服人如此俄復下硤抵金陵徙京口金山金山自兵亂後雖屢葺莫能成至是始復大興潭帥張公孝祥延以大溈山師與張公雅故念未有以卻而京口之人自郡守以降力爭之卒返潭使魏惠憲王牧四明虛雪竇來請師度不可辭乃入東凡住四年樂其山林有終老之意而名益重被敕住徑山淳熙七年五月也七月至行在所壽皇召入禁中以老病足蹇賜肩輿於東華門內賜食於觀堂引對於選德殿特賜坐勞問良渥師因舉古宿云透得見聞覺知受用見聞覺知不墮見聞覺知上悅曰此誰語師曰祖師皆如此提唱亦非別人語上為微笑時秋暑方熾師再欲起上再留使畢其說乃退後十餘日又命開堂於靈隱山中十年二月上製圓覺經注遣使馳賜且命作序師老益厭住持事門人相與築庵於山北今上在東宮書別峯二大字榜之紹熙元年冬十一月忽往見住山智策告別策問行日師曰水到渠成歸取幅紙大書曰十二月七日夜雞鳴時如期而化奉蛻質返寺之法堂留七日顏色精明鬚髮皆長頂溫如沃湯是月十四日葬於別峯之西岡壽八十有二臘六十有四得法弟子梵牟宗性道奇智周慧海宗燦等得度弟子智穆慧宗等百四十有七人有慧綽者山陰陸氏子當以蔭得官辭之從師祝髮上為敕有司定諡曰慈辨且名其塔曰智光說法數十年所至門人集為語録三年三月法孫宗願走山陰鏡湖囑游銘師之塔游與師交最久嘗相約還蜀結茅青衣喚魚潭上今雖老病義不可辭銘曰圓悟再傳是為別峯坐十道場心法之宗淵識雄辨震驚一世矯乎人中龍也海口電目髦期稱道卓乎澗壑松也叩而能應應已能默渾乎金鐘大鏞也師之出世如日在空升於暘谷不為生隱於崦嵫其可以為終乎通天大師塔銘明王在公東吳大師諱明徹號通天乃陝西同州潘氏子父名申母鄭氏母夢日從懷中出遂有娠以語申申曰日乃照明之意若生子定不凡也氏曰若生子送之出家後果生師師少時穎悟不雜言好禮佛家貧師見僧必欲布施施得一錢以為喜年十四一日語母曰慈母愛我何不自愛母曰何為自愛師曰曾許子出家今正是時子恐母成妄語耳母頷之父亦無難色遂送至五臺九龍岡禮翠峯和尚為師剃髮秉律笑語不苟識者已知其為法器也師以十事律身一誓願悟道二誓固淨戒三誓不攀緣四誓目不視美好五誓滴水同餉六誓脅不著席七誓不慢後學八誓不畜餘物九誓修淨土十誓老不改行師之十事終身無遺師一日告翠峯和尚曰阿練若處飯僧可乎峯曰可師曰願充此役即於金閣嶺接待雲水不憚勞瘁入京都跪門化糧供衆一日見僧從鎮州來有饑色師問曰鎮州時儉乎僧曰然師遂以金閣嶺接待囑知事者辭大衆束裝復至地名王蒯聚糧飯僧久之忽思苦行以集福非慧因也一日隻杖單瓢遍歷諸方參詢知識殆十餘年聞神仙山有鐵山和尚特往參之山曰子何之曰行腳山曰何不息腳師曰常行常息山肯之遂授以衣法囑曰此正法眼藏自臨濟至我歷二十五代授受相資如燈續焰子今得之宜韜光匿迹保養聖胎直得天龍推挽方可出也翌日師拜辭入終南山誅茅以居不蔽風雨食青松三載乃往南嶽賣柴供衆禮五祖上雲南雞足山大理府有士夫眷屬參師師不介意不下單士夫怒遂白於郡目為妖僧將置之法適中丞唐公正睡夢一老僧項帶鐵索謂公曰可釋我公覺而偵之師正被窘即言於郡釋之留住建叢林師以因緣不在彼即行後往小西天行至曬經關山中積雪不開寒極落一足指復往汾地髮長不翦面垢不洗和光混俗或為乞丐於窰中或作頭陀於樹下或臥幽壑深林或坐嶮巖古洞數十年間了卻大事是時懸巖撒手嘯月吟風無欲無依得法自在隆慶戊辰從滇南出蜀禮普賢大士默祝曰若與此山有緣晝示攝光夜現聖燈是日二事皆果師遂歷閲巖巒至千佛頂前卜隙地栖焉弔影孤單宴坐終日老熊作伴煙霧為鄰萬曆癸酉就天門石下構一海會禪林以安衆師持水齊十年色力愈壯一日夜遊光相寺見聖燈飛熒者種種變幻復遊雷洞坪之巖下路難措足懸膝而下過三宿帶一法孫幼有懼意師曰此道非險汝不修行三途之路實為懼也師臨返以癭瓢三衣懸之巖下為記半月後石崩如雷衣瓢復至師所事甚異師匿而不傳然是後道日增新等心利物海內英賢參叩不絶有內貴王公慈舟蒼明隱公等同謁師執弟子禮披緇祝髮皆蒙法印二公回燕都聞於宮禁萬曆丁亥賜紫衣袈裟及龍藏一部復遣太監本張公持送帑金莊嚴經閣以鐵為瓦敕賜額曰護國草庵寺為今之圓覺庵即初時安衆地也梵剎凡八草庵寺之外有大佛寺慈聖庵回龍庵蓮華庵十方院太子坪法慧庵師之餘蔭也皆無窮師葺之常聚禪侶千百餘法道大盛五竺梵僧聞風踵至辛卯歲成都亢旱當道以肩輿迎師師甫及界雷雲大作霖雨如瀉師曰置我雨中待雨充足而返耳衆愍之舁師回師至山中築壇說戒自成戒衣五百副隨成隨授不憚勞苦侍者曰師過勞矣師曰世尊尚不舍穿針之福我何人斯而敢言勞耶一生無妄語蓋其生而性成不假誓願而然七十六年如一日法臘六十二於萬曆辛丑年十一月初二日示微疾呼法衆悉集謂曰我有十事律己終身無改當此末法汝等依行二三即吾徒也說偈云七十六年幻化身東西南北苦勞生今朝惹得虛空笑大地原來不是塵擲筆而逝弟子以龕貯之聞於內特遣中貴雲骨公齎金五百兩修建骨塔三年後啓龕視之師容如常外加以漆不掩龕塔於圓覺庵左匾曰證涅槃門時常放光云銘曰深山大澤實産龍蛇當其未奮如井底蛙師之生也天植其性師之來也大法日盛慧刃當權愚癡絶命匿迹韜光弗求弗競時節既至盛德已彰聲動慈宮恩寵異常帑金不惜莊嚴特勝接物利生人天恭敬世緣既謝素志已償幻泡一擲如棄敝囊嗟嗟末世尚有典型師其寂矣孰不懷欽我聞法身無來無去遺蛻禪龕千秋永賁別傳禪師塔銘明陳以勤大學士余幼聞別傳禪師聲迹訇然為蜀人士所歸仰今年秋遊大峨自白水登絶頂覩樓殿像設崇雄絢爛多師所經營歸而問道左宿草之塋師舍利藏焉為停輿瞻歎久之已而僧維峨維靜持軸請曰此禪師功行之略幸憐而賜之一言以詔法胤余既早慕師師滅度且三載石塔之文闕如有待而余遊適與會似與師有少緣因不辭而銘之禪師諱慧宗字別傳姓汪氏湖廣德安府雲夢縣人祖贊父崇義世嗜善不倦師生而至性凝𥳑不墮世相見者識為龍象器七歲投白鶴寺僧通徹剃度正德戊寅入蜀綦江縣海印石門永壽寺從師宗實具戒嘉靖甲午遊峨眉覩普賢瑞像圓明殊勝因敬生悟更從僧宗寶學究竟法印契西來密旨蓋師所參叩而宗寶為之印正云峨頂舊止鐵瓦殿一歲久浸圮登遊回向之徒無所棲止師惻然曰此震旦第一奇勝覺場忍令隕墜乎丁酉八月初於大士像前發信願毅荷擔法門為任乙巳歲於雙飛橋飯僧結十方淨緣自是減衣鳩食銖積寸纍以圖興葺會刑部徐君讞至檄師募化遠邇乃克集事遂飾新舊宇創建新殿瓦以銅者一前為板殿七後為板屋五環以廊廡鑄普賢銅像一銅佛六十五咸奉峨頂又於白水建伽藍殿一鑄銅佛大像三費數千金先後鑄銅鐘三一置白水永壽一置老寶樓樓鐘最巨重以斤計二萬五千丙寅鑱闢雙飛橋路闊一丈長二里許隆慶丁卯植松柏杉楠十萬八千株蔭覆巖岫蓋師安住峨眉者且四十年諸所崇飾洞天名藍之勝願力慧利不可思議矣己巳始出山遊京師法譽彌振內給賜金萬歲牌一座洎幡幢法物華嚴經二十四部萬曆甲戌渡海禮觀音大士雲氣中涌出金蓮白衣冉冉示現同航者五十人獨師及成都僧翠峯見之師鐫三石像巖端以報慈貺曾於松江建大法會戊寅遊五臺駐錫老焉後雖至京師仍入五臺己卯十二月五日無疾示化朝廷遣內璫張暹劉礱監視茶毗弟子鎮滄負骨還峨以辛巳夏瘞今塋在四會亭下世壽八十一僧夏七十五云師平居獨持戒律不喜作頌讚歌曲嘗曰吾宗本無言說三藏法寶尚係糟粕更饒舌何益告寂三日前忽云吾將西歸澡後更衣結跏澄息誦佛號不輟至期升座召諸弟子曰吾素不留文字今不能無言因唱偈曰生本無所生死亦何所有這具臭皮囊今朝成腐朽師目瞑諸弟子鳴鐘而泣鐘止目開續唱曰一聲吼破太虛空爍爍禪光橫大有恬然而逝嗚乎當此剎那頃前後際斷妙機瞥發不覓津航直登覺岸其視三界空華如煙消冰釋了無罣礙豈膠著教相者可同年語耶或疑叢林古德蒲團枯坐墮體刳心棒喝縱橫吻乾舌敝尚隔真乘渺無階漸師於此等若不措意建創莊嚴如救頭然何其大事了脫自在乃爾余意師體內融證入親切懸解密詣誰得而窺之又或夙根種智早得玄珠特乘願輪而來了菩提未盡緣耳且夫大乘法門理事不二即境融心則大地山河通達無礙以心涉渡觀空息想亦屬塵勞則願心內弘莊嚴外度以無為之正覺顯妙有之機用豈可猥云有漏之因少之今世衲子持鉢東西豎拂闓道人增疑慢師所至王公大人下及四衆洗心傾嚮投施山積無量淨業隻手支撐塵沙之役咄嗟立辦斯其福慧機神感通人天誠有不可以意想測者師之種樹峨山也內江趙文肅公贈之氆氌衣其航南海觀音大士示現雲間陸宗伯為作偈言二公近世名卿精諳內典者契許若此可以觀師矣鎮滄師上首能歸骨數千里外峨靜又滄高弟拳拳於撰德耀後咸可謂錚錚者已銘曰巍巍勝峯山東旦名第一慧日現光明普照大千界師來瞻禮初頓生敬信心誓告大士前願廣人天福鑄作黃金相百寶騰祥光鎔範一鼓銅洪鐘懸萬石崇新大道場丹雘一何須儼如兜率天劖巖成砥道萬樹栴檀蔭疑師乘願輪來畢淨土緣弘此大方便妙力無邊際所以彈指頃莊嚴具足備我聞真圓體一切空萬幻空有亦皆捐況乃世間相問師何以然法無有二故假相以明空心境了無礙有為則有漏無著即上果師傳佛心印不涉有情見行遊與坐臥無非真實諦居不閲竺典頌讚未嘗作不出廣長舌棒喝呈伎倆或疑所修為行高而解少問師何以然言語道斷故達磨自西來直指心體妙一法無亦無何用三藏教師秉正法幢峨峯顯慈迹緣訖五臺山先期自知化雙趺坐說偈文字豈不諳不落蹄筌故忍發師子吼去住本無心瞥爾法自露靈骨歸名區舍利晶光浮我讚師功德鐫之無縫塔峨月有缺圓峨雪萬古在師名皎如雪法同圓月輪性則超太虛不起亦不滅萬曆十年壬午十一月望日無瑕禪師塔銘明邊維垣無瑕禪師名廣玉資縣人生而沈靜古朴年三十餘遇異人遂別家至大足縣寶頂寺祝髮受戒戒師問曰僧在甚處來玉曰師在甚處問師曰慧燈高照起看玉曰威音飛進鐵圍城洞遊踏破無生地師笑曰原是大手玉去遊峨眉山九老洞中見白老師師曰誰也毛頭將禪杖過來我打玉曰雖在亦非在真人超天外這杖打空中枉自辱四大師曰如是如是玉又至鎣華山依慧堂禪師大悟宗旨一日與大衆登絶頂望見天彭九峯之勝自負熟麵三斤徑詣九峯棲息聖燈巖洞中趺坐四旬採南星苗食之夜常有一老熊驚跳巖前玉方攝念熊不敢近頃之一虎至咆哮躑躅玉定寂如故虎移時遁去由是名振四遠沙門從方外來者咸頂禮師事檀越為之創寺名曰雷音數百里內向風虔拜不問老幼賢愚有病者手為撫摩或取頂帽敝繻丸之令服無不立效焉萬曆癸未十二月朔自言十二日當化去其徒泣留之弗果至甲申二月望日又曰三月初一是吾涅槃期矣遠近聞者登山爭覩且與其徒苦留之乃以初七日之晨沐浴剃髮趺坐道偈云反身登臺化樂天隻手單拳不用船百萬人天獅子吼空中還有不二禪及昧爽即雷電風雨大作山谷震動若崩端坐而化至今容體儼然若生髮亦漸長如未剃時四方來觀者無不驚異云青霞外史邊維垣曰余聞之先師云朝聞道夕死可矣夫死生亦大矣而以繫於旦夕之間故冥然而生匪生也全歸而死匪死也士號稱仲尼之徒者類能力排佛老而昧三戒之旨叛五常之懿寄蝸牛於蘧廬滅蟭螟於蚊睫者何限以今觀於玉公其視生死旦暮若過客之在逆旅行止去留一任其便蓋飄飄然太虛之風雲也是誠得道也與哉無窮大師塔銘明王在公東吳古語云吾有大患為吾有身是六十二見之根蒂八萬四千塵勞之窟宅世間無有一人不受其沈錮者智者觀之如同幻泡無礙菩薩曰見身實相者不起見身及見滅身身與滅身無二無分別於其中不驚不懼者是為入不二法門嗟嗟白衣無論既號為釋子乃不知實相不識因果往往著此不淨之軀破戒造業無所不至況求其能行道乎末世中忘身為法者得一人焉無窮師是也師為重慶銅梁縣田氏子諱真法無窮其號也於萬曆癸酉忽悟人世無常頓棄妻子徑至大峨山禮通天和尚祝髮受具繼禮五臺然三指回山日倍增精進絶人我忘形骸或汲水以代勞或肩糧以供衆後為侍者持巾瓶數年一日長跪於和尚前請開示和尚曰若問修行事也奇特也平常制心一處無事不辦師點頭禮謝即向齊廚作務運柴執爨不憚勞苦衆食畢乃食僅糠粃而已一日損一碗遂不辭而下山至嘉州沿門募化得碗三千而還早晚佛前發弘誓身心俱竦觀者斂容乃然身燈四十八炷用表四十八願法華經中藥王焚身燒臂智者大師誦至是真精進是名真法供養如來即獲旋陀羅尼見靈山一會儼然未散復往九老洞住年餘除持鉢外趺坐不發一語心若死灰形如槁木恬然不以為意又詣荊南栖一禪寺每日持華嚴三品以為常課師不善書發心出血請僧書華嚴經一部以報四恩書畢曰未也又出血復書一部見者無不囁指有廣元王捐金造滲金大士三尊奉師供養師復於楚蜀二地募造大悲千手觀音像一尊法身高三丈餘載至峨眉值李令公以像嵬峨乃卜東關隙地置像作鎮焉萬曆辛卯同孫性寬至北都奏請慈宮出帑金若干兩敕建大佛寺及大悲正殿前三門進五層巨棟雕梁為宇內壯觀後建藏經閣以貯大藏及水陸聖像一堂規模嚴飾又於萬年寺側創建慈聖庵一所樓高五級接待雲水以作光相寺之化城也前後欽賜五大典一十二部百吉幡二幢聖母親持華嚴經一部法華經一部皆宮錦裝成非人間所有有梵僧持金書貝葉經一函非中華物也後聖母復齎金若干兩置莊田百畝以充兩常住飯僧費皆重師故復賜師紫衣師於癸卯年進北都謝恩住京師之延壽寺示寂焉世壽六十七歲法臘五十一時朝廷差內使姜公蘇公發送靈骨回山瘞於鉢盂山之麓今法子森然二剎規繩秋毫無改皆師忘身為法制心一處之明效也銘曰大道玄同孰知其然一相無相乃法之源處世百年猶若閃電止因顛倒妄著身見師念最重無過度生何以表願然此肉燈肌膚焦灼觀者為恫師顏不動如燒虛空四恩未報日夜籌量惟憑法力庶可酬償兩書華嚴刺血為墨六相十玄總在一畫圓融行布剖破疑團重重法界現一毫端有為無為原無分別入此法門紅爐鍛雪造像建剎寵賁煌煌承前啓後法道以昌報緣既盡怡然示寂遺範若斯山川增色明萬曆四十七年己未冬日貫之和尚塔銘清宋肄樟從上古德載傳燈者多人列散聖者亦不乏蓋其辦一片實心實行自然上契諸佛鼻孔固不在源流拂子討活計也峨山為大行菩薩道場非實行不能住即勉住亦不能著行迹彰聲施惟以行承行契菩薩心其人始傳通天大德而後再見貫之和尚焉師之法嗣曰可聞得法於昭覺丈老人受付囑以師行由囑豫為塔銘余雖未獲覩師道貌而耳食其名已久重以可聞禪師命烏敢辭謹按師生於上川南犍為邑父姓王諱清母某氏師甫離襁褓穎慧過人年十二遭父喪雖日讀儒書而厭塵勞為苦海每聽僧說法怡然自得出所有以供養之三次白母願出家修大乘法報雙親恩母聽之遂送嘉州金碧庵禮三濟和尚剃染名以性一字以貫之自後窮研內典遇十方雲水之衲殷勤恭敬虛心請益聞一妙諦如獲至寶其勇猛精進如此年三十值三濟師圓寂師於辛巳歲就夙明法師受沙彌戒甲申蜀亂隱於銅河獅子山結茅以居接待禪客堅修淨業師逆知大兵之後必有凶年躬率屬衆墾耕積食逮丙戌丁亥果荐饑饉斗米值金三十市竟乏糶轉溝壑者無限師盡出所貯飯諸方大衆全活甚夥毫無德色其先見而能博濟如此戊子歲詣嘉城請澄江和尚授具戒庚寅歲因峨山諸剎兵燹之餘香火荒涼虎狼窟穴行人絶迹食窘僧饑師以為憂竭囊糴米運供峨山之僧僧咸德之因而四峨山印宗瞿如二禪師謀於通山耆宿以伏虎名勝久廢請師開建師謙讓未遑敦懇乃諾辛卯之春命衆誅茅甫至橋邊白額遂傷一人師乃親率僧俗以往闢草萊覓舊址殿基傍有臥虎驚出搖尾而去不敢為害其道德足感異類如此自是結茅山麓為虎溪精舍殫心盡力接待諸方歷十餘載凡登峨宰官莫不高其願力勸修伏虎叢林始興工結構歷草餘載乃就創建前後左右殿堂樓閣共百十餘間巍然煥然為峨眉第一大觀俾朝山遊旅賓至如歸矣蓋師之踐履純熟用心堅固以利人為志以濟物為懷不惜身命成此因緣故不須說法而無處非法不必安禪而無時不禪也康熙辛酉三月草八日示微恙四月初三日子刻命諸職事及大衆課誦畢請入方丈序列索紙筆書偈云年經七十六自愧無長處弘誓深如海道心高似佛生生任我行世世人天路萬物常圍繞那些隨分足令衆齊念大悲名號百餘聲擲筆端坐而逝法屬舁至影堂供養旬日顏色如生異香滿室茶毗之日白氣冲霄塔靈骨於寺右五里許名紅珠山與大峨同不朽云銘曰乘悲願來原為斯人七十六載勞形苦身濟人利物廣結淨因不打口鼓念念發真心奉塵剎以報佛恩果然伏虎搖尾吟呻說偈坐逝無減無增紅珠山下白毫日新可聞禪師塔銘清王廷詔翰林編修登峯者必造其極則不致仰嵐以行探幽者必窮其奇而未始不窮其奧大道有所從入高遠有所自始其理一也峨眉為普賢道場銀色世界清標震旦鶉首井絡為南戒宗天下之仰慕名山者莫不摩頂踵息妄緣閒關峻嶺之一登覽其勝而不可即至何幸於疊嶂層巒之下拾級升階眇杳空冥之中得蒙指示伏虎禪林實始於晉歷代住錫其中者非具大智慧因不能導引羣迷解塵網而開覺路也虎溪靜衲代有名者今之紹衍宗乘指南衲子者惟可聞大師其人焉師金陵太平當塗趙氏子父欽母王氏世篤清修屢兆祥符將誕之夕母夢白蓮華放以語欽欽曰蓮華淨潔不被汙淤泥若生子定不凡果生師賀者聽啼而知為英物髫齡天姿穎異善根夙具一日白椿萱出家頷之辛巳歲送青山禮慶齊祝髮披緇癸未秋因護送普賢大士香像峨山供奉齊衆禮畢甲申春慶師甫事言旋值世運滄桑兵火流離惟有遙望青山而歎道阻耳寓嘉陽金壁庵未幾而慶師圓寂塔師禮備見是庵近市朱紫混淆難久居住因知貫之和尚住洪椿閲三載涵養純粹願輪深廣通山耆舊以大清定鼎全川蕩平伏虎為登峯首剎久委榛莽請大師開建接待遐邇緇素但奈規模弘敞幅員遼闊籌量至再欲得擔荷煩劇相與有成而難其人師竊有志願殫心力因禮為師更名海源號可聞毅然預勞董監院事尋當年基址漸次開闢朝昏竭蹶鳩工庀材繼以規矩準繩辛卯歲結茅屋蔽風雨庚子夏修建紺殿瓊樓璀璨輝煌塑大佛三尊諸菩薩金像皆莊嚴妙好禪堂齊所僧寮雲水廚庫倉浴橋亭三門局次有序積年告成又於路旁豎立茶房待行人饑餐渴飲五十年來而工始竣悉賴本省文武護法宰官捐金布施檀那善人共襄盛舉誠峨山叢林之大觀師苦心擔荷之勳德也徒寂玩勤修密行見購棟梁之艱難發願寺之前後左右廣栽杉楠柏樹準法華經一字一株待將來興作之需倏爾樹林陰翳禽鳥和鳴徑節萬竿鳳集飲露矣第獨是山志未修缺然於懷壬子秋幸逢華陽虎臣蔣太史解組來峨隱寺之蘿峯庵與師同梓里有乳水之合因得其旁搜博採纂輯成編付之剞劂播傳海內師夙志遂矣辛酉歲貫和尚西逝師從遺命繼至省參昭覺丈雪和尚昭問何處來師云峨眉昭云來時龍門洞水滿也未師云湛湛地昭云是汝湛湛地龍門湛湛地師以坐具摵一摵云老老大大作這箇語話昭留纍月徵詰多番乃書偈付囑曰萬歲池深係岸固從來不許人輕掬俄分一滴與願王遍界為霖灑甘露弘臨濟正脈慧日法流隨機設教禪衲踵至客過留贈師沈厚謹慎達官長者縉紳文學特加禮重遠近不殊焉嗣於甲子歲走門人與峨赴江浙募藏經承命向往言行真實人無閒言故立談之頃莫不歡喜成就數月之間印刷梵本大藏五千餘卷並方冊全藏二部載歸語云佛化有緣人信不虛也續賴大參憲傅大參戎佟捐豎崇樓以貯經櫝壬申接俗籍來書情詞敦切念及自孩至長雙親撫育無窮不能忘情於懷南旋故園祭奠考妣先塋焚香百拜薦冥福幽用報罔極之恩從而禮補怛歷名勝大暢宗旨仍返虎溪走門弟子明宗赴吳越八載苦行募裝彌勒大佛阿彌陀佛大悲菩薩護法關聖繪水陸諸聖像全堂皆備極莊嚴由舟迎歸水不揚波安穩到寺非大願力焉能如意若斯耶寺有紙錢街高家堰乾壩鴨子池四處齊僧田畝得供饔飧列列護法給示蠲差在案永護常住於不朽矣蓉城北關有古剎名曰金繩創自五代獻逆焚劫僅存瓦礫大中丞于公肇建招提為選佛之場修書遣使請師卓錫開法辭未應命再使敦請情不容已飛錫進院氣象一新風幡重展德教愚蒙齒頰皆香禪衲追隨杖履仰承益智增慧者摩肩接踵兩更寒暑靜念頓生倦省會繁華擾擾何異塵勞翻然退院歸老虎溪寸絲粒粟悉歸常住付囑法孫靈樞承接住持耳提面命當自磋磨方可報上憲護持佛教德意尤足見善於繼志述事遂扶杖辭歸意願窮巖遁迹長謝故人露頂趺坐曠志怡懷然尚未得從心所欲庚辰中元修盂蘭會初七日命懸水陸聖像午後示微恙次日初八曰生寄死歸時節已至集衆雁堂與峨正安等侍側叮囑身後常住諸事畢盥洗搭衣書偈端坐示寂偈曰七十年來波波挈挈推倒普賢喚惺彌勒正恁麼時天空海闊舁供影堂色笑猶生緇素奔赴者日有千衆羅列座前焚檀頂禮慟哭填咽建窣堵於雙峯之陽師生於崇禎辛未世壽七十法臘六十今已三周法嗣與峨照裕以塔銘未修師德無聞請銘於余余與大師夙契有年知其一生為人光明洞達弘慈濟世誼不敢辭因援筆而為之銘銘曰金陵閒氣篤生奇英來禮願王不遠道程貫翁高足頡頏經綸開建伏虎擔荷營營五十年來巋然告成紺殿陵空日月倒影一見昭覺水滿龍門以是夙緣雲集千人苦心開法妙舌婆心直指人性臨濟上乘道德彰聞傾動中丞金繩酬對為世典型退休逸老去來分明唱還鄉曲彌勒惺惺解脫真脫破人疑情蘆花江上月皎風清雙峯之陽窣堵堅精舍利斯藏萬祀垂馨附伏虎寺開學業禪堂緣起明釋海明破山此文於教育後進振興叢林大有關係故附於高僧之後俾住持叢林教育後進者知所本焉蓋聞佛法無主要假人弘得人則興失人即廢所以達人不可無是人也非生而知之者吾教建叢林立規矩意在養育賢才陶鑄後學繼往開來如日月光明乎天下奈何海內叢林悉忘此意豫不得不犯天下所忌敢以古今興廢試一論之上古叢林聚衆朝夕激揚使悟本心冀各為一方眼目輾轉傳化續佛慧燈以故古時穎脫者不知其數此佛法得人所以興也邇來叢林雖在古法盡亡招賢弘教杳絶無聞自愚愚人輾轉蒙昧致使初學有志者無處棲泊蹉跎白首不知佛義此佛法失人所以廢也不思叢林者何所取義如來無量劫中修行難得無上菩提演布三藏欲後人講誦參討自見本心古人知此所以建禪堂以安學者使用力於此代出高人如林內具諸棟梁材故曰叢林豈如今日驅賢養愚忘本務末以了叢林之事此非木之叢實草之叢也況諸施中法施為最如來為法降生為佛子者不知本末先後謂之倒置致佛日不明者誰之咎歟故知達人必出叢林興廢關乎主者唯主人權柄在手指呼是從蒞是位不行是道佛祖寧不皺眉耶明自參學以來經歷多載見今思古每自傷歎何今古相反若是耶古亦人也今亦人也古人何增今人何減特因昧本忘恩不思不行而已矣若海內叢林一一皆能體佛心而行佛事則天下咸成佛國何今古之閒然況今教禪律流各執一邊互相矛盾鮮窺大全詎知無上妙道出於口為教契於心為禪軌乎身為律三法本一人所行今乃分疆自畫去佛法遠矣明不揣薄劣憂佛道之不行慮人心之忘古值峨眉伏虎貫之禪師建一學業叢林集有志緇流究性相之深詮窮離文之妙旨破目前之堅礙消歷劫之固執融五教十玄於毛孔中會六相五宗於揚眉處通變自在迥異常情達磨不向東來釋迦未曾出世以斯先覺復教後覺內外典籍貴以貫融罷參者休心無事初進者勵志向前不計歲月以徹為期圓性達人必從此出心包法界體合真空即一切非一切雖度生而無生可度佛即我我即佛雖成佛而無佛可成佛法之興安有涯量故欲佛法興莫先於得人得人莫先於整叢林以教後學捨此而欲佛法興者吾莫知也由是觀之無賢主則不出達人無達人則不興佛法反覆推尋主人為最此位任大毋自抑小宜去高去慢虛心待物視此身為天下學人之父母視天下學人皆我一家之子弟內則為之聚糧辦衣供油以資歲月朝夕之需外則為之請出世名宿以作模範熏之陶之日益日損方不失為主人之實明耳之快然研墨運楮以助其喜昔世尊以佛法付囑國王大臣誠有見於末法之弊非主持世道者不能弘揚吾教願今舉世宰官達士世道既平亦宜傍興佛法蓋三寶乃世間福田下得一種收得一斛諺云山中無老衲朝中無宰相安知滿朝文武非昔修行苦行僧耶惟冀不忘前因各出手眼共報佛恩使天下叢林俱興佛法賢者進而愚者化佛教則煥然一新王道亦不教而善此二教兼化並行而不相悖之大義也願與同志共勖之附録馮楫范文光蔣超三居士傳略宋馮楫遂寧人號不動居士由太學登第初訪道禪林晚年專崇淨業作西方禮大彌陀懺儀歸鄉郡作淨土會感香爐中白光亙天舍利隱現靖康兵厄名山藏經多燬楫積俸資造大藏經四十八藏小藏四大藏後以給事中出帥瀘南率道俗作繫念會及刺史邛州預知死日於廳事設高座著僧衣登座謝官吏橫拄杖於膝上說偈而逝按華嚴寺馮守誦華嚴經感玉女饋餐即此也明范文光字仲暗內江人以孝廉官郎中詩文名世初棲心禪學晚年棄官歸值明末蜀寇亂避於峨眉山中約蓮社修淨土業清蔣超字虎臣金壇人始生時其祖母夢峨眉老僧託生及長亦自言夢身是僧常於山溪濯足早年成進士入翰林後督學北直事竣假歸即溯峽遊峨眉食長蔬寓伏虎寺經年輯峨眉志甫脫稿以疾至成都就醫藥一日索紙筆寫詩八句趺坐念佛而逝詩曰翛然猿鶴自相親老衲無端墮孽塵妄向鑊湯來避熱那從大海去翻身功名傀儡場中物妻子骷髏隊裏人只有君親無報答生生常自祝能仁此三居士歸依三寶清淨自居身雖在家心不染塵徹悟禪宗篤修淨業現宰官身行菩薩道是火裏之青蓮為佛門之外護故附於高僧之後以其志同道合也
