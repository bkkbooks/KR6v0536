body:
  text: 第四寺庵勝概附堂殿院樓閣亭橋坊塔法王到處法衆恆隨峨眉為中國最高之山實普賢應化之地以故十方緇素咸來投誠而依棲歷代王臣悉各從事於建造致使琳宮紺殿棋布雲巖草舍茅篷星羅幽岫或參禪以冥契佛心或宏教以啓迪衆智在昔建築甚多晚近頽廢不少姑依舊志略録大端凡新建者備諸圖説故志寺庵寺光相寺在大峨峯頂相傳漢明帝時建名普光殿其改名光相當在唐宋時也明初洪武遣僧寶曇重修始以鐵為瓦明末傾圮清巡撫張德地捐俸重修有碑記由此而下為天王殿殿後左右祖師龍神二堂正中錫瓦普賢殿又為銅瓦殿僧別傳開建殿後有坊曰捫參歷井坊旁有井絡泉由此左上為藏經閣有舊頒龍藏今失其半閣一名永延寺僧妙峯開建峯後惟密嗣修壽九十七清雲南援𠞰總兵祁三升捐資添造鐵瓦往來朝山者多憩息焉自樓左向後層梯而上峯頂為滲金小殿一名永明華藏寺殿左右有小銅塔四座明萬曆間僧妙峯募瀋王及川督等鑄殿瓦柱門櫺窗壁皆銅為之而滲金廣一丈四尺五寸深一丈三尺五寸高二丈五尺前安願王像駕四壁萬佛圍繞門陰刻全蜀山川形勝水陸程途一覽瞭然妙峯曾募造金殿三座分送五臺峨眉其一座欲載送普陀至金陵遇普陀僧恐招海盜不敢受遂送江寧寶華山供奉云向左為覩佛臺即放光處在光相寺前約丈許臺下千佛巖在右金剛石石下即七寶臺在左辟支童子二臺兩兩對照若龍虎然亦山頂形勢最勝處也天門寺在天門石下僧瑞峯建石凡三折始達山路丹青不能似也護國草庵寺明萬曆賜額又名圓通庵在天門石右通天和尚建有慈聖太后手書佛號金繡長幡今失唯所賜九層沈香塔尚存大佛寺縣東郊明萬曆間通天和尚之徒無窮至京奏請慈聖太后開建寺有千手千眼觀音大士銅像土木弘麗賜有香燈田五百畝載在碑記西坡寺在城西南唐武德六年建舊名壽聖西坡寺遊山者往來多宿此聖積寺離峨眉縣五里即古慈福院正德三年內江王重修寺內有銅塔高二丈許永川萬華軒所施寺前有樓曰真境一名老寶乃慧寶禪師建樓上有魏鶴山書峨峯真境四大字內名賢題詠最多舊志後嶺有洪範庵過嶺有華嚴樓大悲興聖二庵今俱廢唯儒林橋隔澗西坡寺度凹十方院無恙耳伏虎寺在伏虎山下行僧心安開建宋紹興間虎狼為患人迹罕見有高僧士性建尊勝幢一座據鎮方隅患遂息明末毀於兵火繼得貫之和尚偕徒可聞禪師結茅接待歷有數稔於清順治十八年督撫司道捐俸修建前後左右凡列一十三層甚為弘敞誠峨眉之大觀也華嚴寺一名歸雲在玉女峯下唐昌福達道禪師道場宋紹興三年僧士性重修寺有旋螺殿極奇古初為白牛長老住持明洪武時僧廣圓領帖焚修成化改為會福寺有宋紹興碑及華嚴堠左刻至州十五里州疑指今峨眉縣右刻至山頂七十里玉女峯頂上有池宋有天女饋食邛州刺史馮楫故事詳形勝中峯寺一名集雲在白雲峯下一名白巖本晉乾明觀時道士惑于三月三日升仙之説歲為毒蟒所食有資州明果禪師至暗伏獵人射殺之道士感激改觀為寺事焉宋高僧茂真尊者重修宋時孫王宋三真人羽化於此又黃魯直習靜處也明洪武時僧慧安法曇長老住持內普賢大士殿明成化三年蜀昭王建黑水寺在對月峯創自晉魏肇公唐僖宗間高僧慧通住錫道聞朝廷敕建永明華藏寺並賜無縫衣玉環供器滄桑無存弘建普賢延福中峯華嚴四剎以山相火易二水三雲抑之繼席祖庭位列傳燈承璟義欽黑水曇振洞溪廣悟前後七代悉宗風大振故古今稱峨眉祖堂黑水洞溪俱以山彰名也前牛心寺在雙飛橋上牛心嶺後牛心寺宋繼業三藏開建一名臥雲寺一名延福院即孫真人修真處有吳道子畫壁十八羅漢像一云張僧繇畫宋淳祐間僧紹才重修明洪武時廣濟禪師住持萬年寺即白水寺昔蒲氏事佛舊址寺創自晉時唐慧通禪師精修唐人有聽廣濬禪師彈琴處即此寺在宋為白水普賢寺內敕建鑄大士銅像並殿高十餘丈太宗真宗仁宗俱有御賜寶供三經回祿無存明嘉靖間旋修旋燬萬曆間敕改聖壽萬年寺寺前有大峨樓樓前有南戒名宗坊左豎祇樹林坊寺內殿凡七層一毗盧一七佛一天王一金剛一大佛一甎砌旋螺中供銅鑄普賢丈六金身騎象像一接引殿殿有明末代巡黃岡梧陽劉公捐造真武祠今廢寇亂寺焚燬殆半清巡撫張公捐俸莊嚴載有碑記寺有明萬曆頒賜藏經今失唯一敕尚存靈巖寺在大峨山下南進高橋寶掌和尚結廬舊址寶掌周威烈王十二年生至唐高宗顯慶二年卒壽一千七十一歲其寺歷代重興至宋紹興五年改護國光林寺明成化元年又改為會福寺後天順四年頒賜龍藏棋盤寺在城南進高橋經太平墩路口茂真尊者開建墩前有一泉常溫蟠龍寺近新開寺進黃沙溪冷竹坪唐慧覺禪師開建新開寺在伏虎寺後鞠家漕萬曆三年九老洞僧大用建香巖寺離伏虎寺後三里西域香巖尊者居此西禪寺在縣西南十五里羅目街上寺以僧名與醫王白鵲同時石佛寺在縣西五里今廢玉屏寺在縣西十里袁家溝彌陀寺在楊鎮場下隔河即二峨山伽藍寺在楊鎮場茶土寺在三峨山上圓通寺在四峨山下上有花山明印宗和尚住此祈雨響應感四衆雲集設大戒壇觀音寺在經太平墩道傍伍家坪離城南一百里古洞溪和尚住靜處本壽寺在縣北二十里深幽至極鞠惟律師説戒所普賢寺離縣二十餘里寶曇國師開建廣福寺即前牛心寺別院在寶現溪側今廢佛到寺在覩佛臺下由縣南轉西從盤龍寺黃沙溪冷竹坪開山日得石佛故名今廢羅漢寺在新開寺下建日有梵僧赴齋齋畢不見今廢果哲寺今廢永延寺在九嶺岡下明周藩建法華寺今廢大隱寺俱在二峨山下放光寺在後山宋嘉州刺史王良弼奏請開建今廢庵靜室館附淨土庵在桫欏坪上明萬曆初大智和尚建師名真融楚人戒律精嚴刻苦供衆凡建立五臺伏牛峨眉鎣華四常住最後至普陀開海潮寺有遺願碑存本庵切戒子孫不得背衆營私恃強相爭庵左有白龍池水極甘洌庵中佛像莊嚴細巧最稱如法臥雲庵在藏經閣右性天和尚建後毀清總制哈公及通省文武捐俸命可聞禪師重建絶頂無水唯此庵下有半月池各庵寺仰汲詳形勝有碑記回龍庵在太子坪上有戒壇僧三濟開建大覺庵在通天塔左法慧庵在太子坪後文殊庵在七天橋右天仙橋左有坊曰為天一柱白衣庵富順庵永定庵聖水庵鳳凰庵普賢庵在天門石般若庵在錫瓦殿下彌陀庵在錫瓦殿前天啓庵在山頂齒牙峯下禪定庵金像庵勝峯庵萬行庵即太子坪僧古智建蓮華庵洪範庵華嚴庵華藏庵定慧庵卓錫庵毗尼庵淨居庵法華庵慧日庵太虛庵鳳嶺庵解脫庵在解脫坡上即觀音堂呼應庵在大峨石右呼應峯後相傳茂真尊者與孫真人奕棊於此呼應庵側有棊盤石有溫涼二池三仙洞庵雄黃石庵萬公庵今俱廢佛會庵白衣庵慈聖庵禪定庵鉢盂庵千佛庵即洪椿坪伏牛山楚山和尚開建德心大師重修梵宇精潔結構弘敞常有千人此地曲折幽雅最為隱僻大坪庵石筍庵在石筍溝寶掌庵在佛到寺右鐵峯庵福壽庵在大峨石畔僧性天果開建此僧另是一位非峯頂之性天庵舊有九曲渠流杯池昔人觴詠其中庵前有海棠大數圍高十餘丈幹直上二尋為數百年間物石踞神水池上體微側詳形勝龍泉庵維那庵月窟庵勝峯庵流春庵圓教庵白雲庵上七庵廢三望坡茶庵在中峯寺傍妙觀庵在觀心坡上九老洞茶庵在華嚴頂上洞泉庵在豬肝洞下儀鳳庵在四峨花山下洪範庵有二一在西坡寺前一在山頂大悲庵石佛庵在宋王觀壩下三一庵在瑜伽河下鳳嶺庵立禪庵在曹溪洞右寶珠庵在石筍溝半月庵興聖庵俱近聖積寺龍鳳庵即伏虎寺右靜室前蔣太史易為蘿峯庵飛龍庵在玉女峯下即伏虎寺左靜室彌陀庵聖水坪庵定居庵在山頂太湖庵僧融虛建庵前有太湖石金剛際靜室蓮華社靜室在九嶺岡上九龍坪靜室在蓮華石上象鼻巖靜室逝多園靜室牛心鎮靜室培風館在捫參歷井坊後堂龍神堂在伏虎寺左觀音堂在解脫坡西龍堂在梅樹埡下今廢喜光堂在萬年寺今廢本尊堂在二峨山下三藏堂在二峨山下仰天窩此處産香梨櫻桃學士堂在通天塔左中靜堂觀心坡禪堂在頂心坡後僧空庵開建大慈堂沐浴堂會宗堂即問宗堂風道人明光開建有碑記在伏虎寺海會堂在萬年寺左有御賜紫衣及丁雲鵬畫歷代祖師像八十八軸今俱毀唯佛牙尚在重十三斤淨業堂在萬年寺右古泉清洌足供萬人相傳下有龍窩殿無量殿純陽殿在華嚴寺上明御史郝衡陽建龍神殿在三望坡上白雲殿在梅子坡上常有白雲屯聚俗名雲壇接引殿在八十四盤下清順治十七年有河間府僧年八十至此見佛像臥荒叢中乃誓餓七日募修時大雪凡露餓六日蜀趙翊皇登山見而憫之歸白督臺李公捐金五百命僧聞達重修雷神殿在雷洞左木皮殿在初歡喜亭上五里西域阿婆多開建即古化城寺昔有昆明施紹高太和王藎台來此遇白猿獻二果啖之俱仙去鷟殿以山形如鸑鷟得名一云初殿又云鑿井初殿在觀心坡上駱駝嶺下昔漢蒲公採藥見鹿處後人因立此殿殿下今尚有蒲氏村皆公後也院慈福院在聖積寺對門普安院在普安橋華林院在青竹橋今俱廢龍門院在種玉溪上惠續尼院在黑水寺前即月峯禪師惠通禪師之妹入定處有黑虎巡廊之異有御賜袈裟玉環今失塔院在學士堂右圓覺庵下金裝通天和尚肉身在內至今生氣宛然樓老寶樓即真境樓玉皇樓在伏虎寺溪右家慶樓在飛來岡大廟後詳古迹大峨樓在萬年寺前總督蔡公重建白衣觀音樓在雙飛橋上閣普賢閣在中峯寺後歸雲閣在華嚴寺後普溪閣在大峨石後僧瑞光建聖水閣在大峨石後高僧化機隱此明巡撫安慶吳用先築此居之清音閣在雙飛橋下琉璃亭後有一大石名洗心臺臺上建閣今廢菩薩閣在白水寺今廢有榜曰天下大峨山朝陽閣在八十四盤上觀音閣在金剛臺上臥雲庵後閣前有小覩佛臺楞嚴閣在山頂藏經閣在山頂光相寺萬聖閣在普賢庵下賢首閣在七寶臺右亭涼風亭在無量殿上宗漏亭玉液亭俱在大峨石琉璃亭在牛心石接王亭在雙飛橋上四會亭在萬年寺前有接引佛銅像初喜亭在九嶺岡上大歡喜亭在觀音巖上三里思佛亭在桫欏坪橋普庵橋庵或作安在聖積寺西一里虎溪橋在伏虎寺前涼風橋在無量殿上解脫橋在解脫坡下玉女橋青竹橋俱在華嚴寺前虎跳橋在萬年寺左一名七笑橋為前賢張鳳羾安盤程啓充徐文華章寓之王宣及僧瑞堂建太平橋在五十三步上萬定橋即古萬福橋在大峨石上百福橋即響水橋在歌鳳臺側三望橋在中峯寺上雙飛橋在牛心寺下兩山相對出牛心嶺自中亙垂如貫珠左一水從雷洞坪繞白水寺來右一水從九老洞繞洪椿坪來至此界作二道雙虹跨淵凡一橋受一水一水出一洞水分黑白即符文水勢如虬龍奮舞兩不相下過橋始馴久之乃合有石狀如牛心鎮峽口晶瑩如鏡觀察西山張能鱗改為洗心石云相傳左橋始軒轅遊勝峯時造右則自漢至宋不知經幾何數修理古今多以此處為峨山第一勝景凡黑龍潭寶現溪水俱從此下始出龍門也仙女橋在息心所下窄甚仙迹橋在山頂天仙橋在山頂七天橋在山頂天門石上積善橋在觀音巖自此可達洪椿坪一名萬度橋有上中下三道高橋在靈巖寺前坊震旦第一山坊在涼風橋下即今伏虎寺南戒名宗坊在萬年寺前為天一柱坊在山頂天仙橋左捫參歷井坊在山頂銅瓦殿後山後七十二古德名庵坊在山頂大佛坪右塔小金塔在聖積寺高二丈餘永川萬華軒施普同塔有二一在伏虎寺逝多林有澄江大師藏骨一在四會亭小石塔在玉泉池側滲金小塔四座在山頂銅殿側妙峯募造沈香塔在草庵寺肉身塔有二一是黑水一是通天大僧塔在紅珠山即開建伏虎貫之和尚塔也第五感應靈異一心顯現萬法萬法不出一心衆生與佛同然本無所謂靈異唯衆生久為業力所縛自性功德不得受用忽睹佛菩薩感應境界輒詫為希有由是返迷歸悟背塵合覺久久必能徹證自心故知菩薩現光現燈及諸妙相者乃曲垂接引之大慈悲心也故志靈異光燈諸經載佛説法時恆放白毫光或七寶光是無相中之相不可思議也峨眉峯頂晝則放光夜則出燈明由普賢示現啓人生信不然何以唯菩薩道場有之他則不聞耶故志焉佛光常放於光相寺前覩佛臺下為萬仞深谷臨巖作欄杆光起時寺僧鳴鐘朝山大衆聞鐘齊集憑欄而望放光時每在卓午先有兜羅綿雲布滿巖壑宛如玉地名曰銀色世界雲為水波為傘蓋為樓臺諸狀上得日色照之遂現圓光從小漸大外暈或七重或五重五色絢縵環中虛明如鏡觀者各見自身現於鏡中舉手動足影亦如之止見己身不見傍人以此為異此名攝身光光上有金橋如虹憑空而現若可往來有時雲氣散盡出一光如大虹霓圓似水晶映物名曰清現凡光相依雲而出其不依雲則謂之清現最難得者又有白色無紅暈者曰水光如箕形者曰辟支光如鏡鉢形者曰童子光光皆一光變態而異名佛光未發時有鳥先飛過作聲曰佛現了佛現了已而佛光果出此類雀而稍大只有二枚鳥別無種類飛入佛殿常就僧食但不見有長育耳凡朝山者心主誠敬則一二日內即遇光現否則有候至旬日不現而歸者七天橋天門石巖畔亦時有光現與覩佛臺前之光無異觀李中溪遊雞足山記與此光正相類可見佛菩薩境界皆同聖燈乃現於夜凡千百數明熒騰空冉冉來朝佛臺就近拾之一木葉耳然四時皆然其非楓林霜葉明矣此真聖燈凡夫無庸妄肆猜疑也佛光辨何式恆嘗聞佛教圓通掃去色空諸相又聞佛教廣大時現百千萬億化身蓋有相無相之間久欲致辨焉而未果所願余癸亥初夏偕山陰孟蘊士登峨峯禮普賢願王陵晨旭日初升羣翳盡斂蒙首瓦屋及塞外曬經雪嶺諸山無不面目俱現至午餘兜羅雲布忽成銀色世界少頃佛光從巖下漸起紺綵奪目不可迫視仰首半空突有五色祥光數道隱現菩薩法相余頂禮畢益信化身之説不虛矣夫世疑峨眉洞壑臨淵日色反射宜有異光復疑山中多晶石映日益陸離而大此皆臆説不可以存余特述所見以著辨俾後之遊峨者知菩薩以無相為圓通之果而有相未始不為廣大之因也然則有相無相之間殆不可思議云佛燈辨余客西蜀峨眉咫尺而未得措足者三載每遇遊峨者輒津津問之若佛燈一事或云是古木葉也或云是千歲積雪精瑩凝結也余疑之而未敢遽信今於孟夏之望七覩佛光後益欲諦審於佛燈矣夫諸佛菩薩以至道度世不難表光相示衆生何惜昏夜一炬令大地光明耶爰是暝鐘初息沙彌來報燈現余急趨頂上乍見一二熒熒處猶然諸説橫據胸中未幾如千朵蓮華照曜巖前有從林出者有從雲出者有由遠漸近冉冉而至者殆不可數計始歎耳食之不如目睹也久矣昔蘇長公月夜泛舟探石鐘之勝因作石鐘山記有曰事不經身歷即言之未必得其真得其真矣而未必盡其詳蓋笑李渤之陋而歎酈元之簡也余不敏何能紀佛燈然親見種種如是又何敢不以數言附於峨志之末令後人益嗤後人也遊峨眉山記清蔡育榮川湖總督三韓古者立國必依山川在禮諸侯祭其境內名山大川山出為雲為風雨則祭之所以祈福禳災祐國庇民非獨務遊觀覽勝概而已蘇子瞻謂天下山水在蜀蜀之山水在嘉蓋指峨山而言也余以康熙辛亥奉命入蜀忝為峨山主又讀通志宋范成大明陳文燭袁子讓曹學佺遊記所稱佛光聖燈兜羅綿雲者心羡慕之而未能無疑也九月余自蜀旋楚道經嘉州因念是山為蜀之望自兵火以來蜀民鮮有孑遺而嘉眉邛雅以南獲稱安堵斯山之靈實式祐之不可不修祀事且以果右軍之緣遂命駕往登自伏虎萬年諸蘭若歷觀心鷟殿化城雷洞諸奇險震悼怵心駭目見諸前賢載記及山圖詳志且悉不復縷述余自萬年晨發晡刻抵山巔禮普賢大士畢登覩佛臺俯視下界如在天上少頃白雲噓布萬頃一色望之如雪如氈如銀海乃所謂兜羅綿雲者無何二佛現鳥如鸜鵒依人衣袖間鳴曰佛現佛現忽大雲中現五色光或黃或赤或紫或緑或碧輪囷蓬渤如太極暈如大圓鏡光彩射人重重攝入大衆歡呼歎未曾有逮至夜分主僧復報聖燈現矣余疾起往視初見一燈二燈旋繞虛空已復散為百為千若列宿海若繁星翳天寺僧合十向余謂曩間宰官居士登山候至數日十餘日求一見佛光不可得今公甫至三相俱現非具大福德至誠虔感何遽為諸佛菩薩感應攝受若此之神速也余遜謝不敢當自念今歲仲冬為家大人六帙誕期余感荷大慈獲覩瑞相不勝慶幸私心默禱願此光明雲上為聖天子有道萬年受茲百福家大人壽考康寧永錫純嘏蓋余至此始信諸佛菩薩境界不可思議華嚴經所稱大光明山普光明殿藏海寶網香雲遍滿皆真實語非親至其境者不能知也唯是自有此山以來登者衆矣或旬日始見佛光又未能悉見所謂聖燈兜羅綿雲者余皆一朝見之可不謂厚幸一大奇緣也哉是遊也同行有皖江劉灊柱餘謨諸君子抵山稍後僅見聖燈綿雲未及覩光余以王事於役次日即下山不及少留方欲以是傲諸君子灊柱笑而言曰佛光常住相猶無相若人以相見佛佛即以相現若人以無相見佛佛即以無相現凡所有相皆是虛妄使餘謨見猶不見而況欲以見見乎余喜其言通於禪故泚筆記之而並録其語于後清康熙辛亥佛現鳥賦明廖大亨四川巡撫杜宇化蜀靈鷲開山物無小而可忽機有動而先傳巖攢鴿鵓眉掃蔚藍光飛蝃蝀華發優曇七寶臺高三生業重灝養鴻濛碧傾空洞爰有神鳥狀類伯勞衣浣玄水喙啄赤霄紺緣豐領羽點文苞載飛載止倏近倏遙𦒑䎀欲轉翪翀以翹不類瀟湘叫雨有若洪巖戲翛機忘剝啄智謝繒繳作錦衣之飛使報虹綵於神皋言隨意變形幻舌饒機不先而不後緣如赴而如招夫其崱屴峛崺之險靉靆霠霃之交霜鵬戢翼霧豹歇嗥荔披有魅草宿無媌而乃有羽可儀其音載好既山輝以壑媚亦虹流而霓繞白馬黃金琪林瑤草草木忽而蔥蒨海雲遮而繪巧聳赤城之霞標烜文燦於海島使面壁兒孫歸崇佛老目睜乎金剛閃灼心切乎玉象縹眇知微知彰倏來倏杳清絶桐花鳳慧超秦吉了嗟乎楚鳳不作孫龍亦邈人我墮相聲光誰葆盡是皮毛誤大千可以人而不如鳥附録法苑珠林千佛篇述意文蓋聞九土區分四生殊俗昏波易染慧業難基久復愛河長流苦海不生意樹未啓心燈故三明大聖八解至人總法界而為智竟虛空以作身形無不在量極規矩之外智無不為用絶思議之表不可以人事測豈得以處所論將欲啓愚夫之視聽須示真人之影迹其猶谷風之隨嘯虎慶雲之逐騰龍感應相招仰惟常理自鹿樹表光金河匿曜故像法衆生歸向有徵雖千佛異迹一智同途大悲平等隨性欲而利生宏誓莊嚴運慈舟而濟溺衆生有感機緣契會也
