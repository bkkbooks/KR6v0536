body:
  text: 第二菩薩聖迹分六一釋名二修證三德相四法要五利行六應化以普賢視峨眉不啻滄海之一滴而峨眉有普賢則如芥子納須彌所以雖僻處西陲而名高五嶽與補怛清涼同為朝野所崇奉者以有大士應化故也但徒瞻仰金容拜伏於象王足下而不知大士聖德神功巍巍無上殊負大士度世之心因略引經文顯揚大士本迹故志聖迹一釋名普賢菩薩證窮法界久成正覺見如來不思議境界經為輔弼釋迦度脫衆生隱本垂迹現菩薩身其德無量無邊不可思議名號亦無量無邊不可思議如華嚴經如來名號品所說今且約普賢二字以示其概梵語邲輸跋陀或作三曼多跋陀羅嘉祥法華疏云三曼多此云普跋陀羅此云賢華嚴大疏云體性周遍曰普隨緣成德曰賢此約自體又曲齊無遺曰普鄰極亞聖曰賢此約諸位普賢又德周法界曰普至順調善曰賢此約當位普賢又果無不窮曰普不捨因門曰賢此約佛後普賢當位普賢悲智雙運佛後普賢智海已滿而運即智之悲寂而常用窮未來際又一即一切曰普一切即一曰賢此約融攝又或譯為遍吉遍即普義賢從理體立名吉從事相立名也此菩薩與文殊為釋迦佛左右二輔文殊表智普賢表行又普賢表理文殊表智又文殊表根本智普賢表差別智理智合一行解相應寂照同時即毗盧遮那法身故華嚴一經所明全歸於此一佛二菩薩之法門故稱為華嚴三聖大日經疏云普賢菩薩者普是遍一切處賢是最妙善義謂從菩提心所起願行及身口意三業皆遍一切處純一妙善備具衆德故以為名蓋此菩薩從根本智發廣大願以萬善莊嚴一一周遍法界所謂全性起修全修在性圓滿菩提歸無所得故名普賢也二修證菩薩久證法身不離寂光垂形法界本地修證其何能測即迹門示現無量劫來所修所證種種行願功德以至修無可修證無可證之聖迹亦劫海難宣今略引二則以見端倪悲華經云往昔過恆河沙等阿僧祇劫有世界名刪提嵐劫名善持有佛號寶藏如來時有轉輪聖王名無諍念即阿彌陀佛王有千子第一太子名不眴即觀世音菩薩第二王子名尼摩即大勢至菩薩第三王子名王衆即文殊菩薩第八王子名泯圖即普賢菩薩轉輪聖王及諸王子於寶藏佛前次第發願佛一一授記以上敍事係節略第八王子泯圖白佛言世尊我今所願要當於是不淨世界修菩薩道復當修治莊嚴十千不淨世界令其嚴淨如青香光明無垢世界亦當教化無量菩薩令心清淨無有垢穢皆趣大乘悉使充滿我之世界然後我當成阿耨多羅三藐三菩提世尊願我修行菩薩道時要當勝於餘諸菩薩世尊我已於七歲之中端坐思惟諸佛菩薩清淨功德及種種莊嚴佛土功德是時即得悉見種種莊嚴三昧等萬一千菩薩三昧增進修行世尊若未來世諸菩薩等行菩薩道時亦願悉得如是三昧世尊願我得出離三世勝幢三昧以三昧力故悉見十方無量無邊諸佛世界在在處處現在諸佛出離三世為諸衆生說於正法世尊願我得不退三昧以三昧力故於一念中悉見如微塵等諸佛菩薩及諸聲聞恭敬圍繞願我於此一一佛所得無依止三昧以三昧力故作變化身一時遍至如一佛世界微塵數等諸如來所供養禮拜願我一一身以種種無上珍寶華香塗香末香妙勝技樂種種莊嚴供養一一諸佛世尊願我一一身於一一佛所如大海水滴等劫行菩薩道願我得一切身變化三昧以三昧力故於一念中在一一佛前知如一佛土微塵數等諸佛世界世尊願我得功德力三昧以三昧力故於一一佛前遍到如一佛土微塵數等諸佛世尊所以微妙讚歎讚歎諸佛世尊願我得不眴三昧以三昧力故於一念中悉見諸佛遍滿十方無量無邊世界之中世尊願我得無諍三昧以三昧力故於一念中悉見過去未來現在諸佛所有淨妙世界世尊願我得首楞嚴三昧以三昧力故化作地獄之身入地獄中與地獄衆生說微妙法勸令發阿耨多羅三藐三菩提心彼諸衆生聞是法已尋發無上菩提之心即便命終生於人中隨所生處常得值佛隨所值佛而得聽法聽受法已即得住於不退轉地乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等天龍鬼神夜叉羅剎毗舍遮富單那迦吒富單那屠殺魁膾商賈淫女畜生餓鬼如是等衆亦復如是皆令發阿耨多羅三藐三菩提心有諸衆生隨所生處得諸色像我分之身如業所作隨受苦樂及諸工巧願我變化作如是身隨其所作而教化之世尊若有衆生各各異音願我隨其種種音聲而為說法各令歡喜因其歡喜勸發安止令其不退於阿耨多羅三藐三菩提世尊我要當教十千佛土所有衆生令心清淨無有行業煩惱諸毒乃至不令一人屬於四魔何況多也若我莊嚴十千佛土如是清淨如光明無垢尊香王佛青香光明無垢世界所有種種微妙莊嚴然後我身及諸眷屬乃當如彼師子香菩薩之所願也世尊若我所願成就得己利者當令十千諸佛世界所有衆生斷諸苦惱得柔軟心得調伏心各各自於四天下界見佛世尊現在說法一切衆生自然而得種種珍寶華香末香及以塗香種種衣服種種幢幡各各以用供養於佛供養佛已悉發無上菩提之心世尊願我今者以悉得見種種莊嚴三昧力故皆得遙見如是諸事作是語已尋如所願悉得見之爾時世尊讚阿彌具言善哉善哉善男子汝今世界周匝四面一萬佛土清淨莊嚴於未來世復當教化無量衆生令心清淨復當供養無量無邊諸佛世尊善男子以是因緣故今改汝字號為普賢於未來世過一恆河沙等阿僧祇劫入第二恆河沙等阿僧祇劫末後分中於北方界去此世界過六十恆河沙等佛土有世界名知水善淨功德汝當於中成阿耨多羅三藐三菩提號智剛吼自在相王如來節録悲華經大施品及諸菩薩本受記品楞嚴經云普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就佛問圓通我說本因心聞發明分別自在斯為第一三德相菩薩德不可思議由德所現之相亦不可思議若欲備知非佛莫由凡夫二乘能欽仰德相而修持之終必有親證菩薩德相之一日華嚴經普賢三昧品云爾時普賢菩薩摩訶薩於如來前坐蓮華藏師子之座承佛神力入于三昧此三昧名一切諸佛毗盧遮那如來藏身普入一切佛平等性能於法界示衆影像廣大無礙同於虛空法界海漩靡不隨入出生一切諸三昧法普能包納十方法界三世諸佛智光明海皆從此生十方所有諸安立海悉能示現含藏一切佛力解脫諸菩薩智能令一切國土微塵普能容受無邊法界成就一切佛功德海顯示如來諸大願海一切諸佛所有法輪流通護持使無斷絶如此世界中普賢菩薩於世尊前入此三昧如是盡法界虛空界十方三世微細無礙廣大光明佛眼所見佛力能到佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數普賢菩薩皆亦入此一切諸佛毗盧遮那如來藏身三昧爾時一一普賢菩薩皆有十方一切諸佛而現其前彼諸如來同聲讚言善哉善哉善男子汝能入此一切諸佛毗盧遮那如來藏身菩薩三昧佛子此是十方一切諸佛共加於汝以毗盧遮那如來本願力故亦以汝修一切諸佛行願力故所謂能轉一切佛法輪故開顯一切如來智慧海故普照十方諸安立海悉無餘故令一切衆生淨治雜染得清淨故普攝一切諸大國土無所著故深入一切諸佛境界無障礙故普示一切佛功德故能入一切諸法實相增智慧故觀察一切諸法門故了知一切衆生根故能持一切諸佛如來教文海故爾時十方一切諸佛即與普賢菩薩摩訶薩能入一切智性力智與入法界無邊量智與成就一切佛境界智與知一切世界海成壞智與知一切衆生界廣大智與住諸佛甚深解脫無差別諸三昧智與入一切菩薩諸根海智與知一切衆生語言海轉法輪辭辨智與普入法界一切世界海身智與得一切佛音聲智如此世界中如來前普賢菩薩蒙諸佛與如是智如是一切世界海及彼世界海一一塵中所有普賢悉亦如是何以故證彼三昧法如是故一切如來諸毛孔中咸放光明於光明中而說頌言普賢遍住於諸剎坐寶蓮華衆所觀一切神通靡不現無量三昧皆能入普賢恆以種種身法界周流悉充滿三昧神通方便力圓音廣說皆無礙一切剎中諸佛所種種三昧現神通一一神通悉周遍十方國土無遺者如一切剎如來所彼剎塵中悉亦然所現三昧神通事毗盧遮那之願力普賢身相如虛空依真而住非國土隨諸衆生心所欲示現普身等一切普賢安住諸大願獲此無量神通力一切佛身所有剎悉現其形而詣彼一切衆海無有邊分身住彼亦無量所現國土皆嚴淨一剎那中見多劫普賢安住一切剎所現神通勝無比震動十方靡不周令其觀者悉得見一切佛智功德力種種大法皆成滿以諸三昧方便門示己往昔菩提行如是自在不思議十方國土皆示現為顯普入諸三昧佛光雲中讚功德爾時一切菩薩衆皆向普賢合掌瞻仰承佛神力同聲讚言從諸佛法而出生亦因如來願力起真如平等虛空藏汝已嚴淨此法身一切佛剎衆會中普賢遍住於其所功德智海光明者等照十方無不見普賢廣大功德海遍往十方親近佛一切塵中所有剎悉能詣彼而明現佛子我曹常見汝諸如來所悉親近住於三昧實境中一切國土微塵劫佛子能以普遍身悉詣十方諸國土衆生大海咸濟度法界微塵無不入入於法界一切塵其身無盡無差別譬如虛空悉周遍演說如來廣大法一切功德光明者如雲廣大力殊勝衆生海中皆往詣說佛所行無等法為度衆生於劫海普賢勝行皆修習演一切法如大雲其音廣大靡不聞國土云何得成立諸佛云何而出現及以一切衆生海願隨其義如實說此中無量大衆海悉在尊前恭敬住為轉清淨妙法輪一切諸佛皆隨喜阿僧祇品偈云以此諸塵數諸剎一塵十萬不可說爾劫稱讚一普賢無能盡其功德量十定品云爾時普眼菩薩摩訶薩承佛神力從座而起偏袒右肩右膝著地合掌白佛言世尊我於如來應正等覺欲有所問願垂哀許佛言普眼恣汝所問當為汝說令汝心喜普眼菩薩言世尊普賢菩薩及住普賢所有行願諸菩薩衆成就幾何三昧解脫而於菩薩諸大三昧或入或出或時安住以於菩薩不可思議廣大三昧善入出故能於一切三昧自在神通變化無有休息佛言善哉普眼汝為利益去來現在諸菩薩衆而問斯義普眼普賢菩薩今現在此已能成就不可思議自在神通出過一切諸菩薩上難可值遇從於無量菩薩行生菩薩大願悉已清淨所行之行皆無退轉無量波羅蜜門無礙陀羅尼門無盡辨才門皆悉已得清淨無礙大悲利益一切衆生以本願力盡未來際而無厭倦汝應請彼彼當為汝說其三昧自在解脫爾時會中諸菩薩衆聞普賢名即時獲得不可思議無量三昧其心無礙寂然不動智慧廣大難可測量境界甚深無能與等現前悉見無數諸佛得如來力同如來性去來現在靡不明照所有福德不可窮盡一切神通皆已具足其諸菩薩於普賢所心生尊重渴仰欲見悉於衆會周遍觀察而竟不覩亦不見其所坐之座此由如來威力所持亦是普賢神通自在使其然耳爾時普眼菩薩白佛言世尊普賢菩薩今何所在佛言普眼普賢菩薩今現在此道場衆會親近我住初無動移是時普眼及諸菩薩復更觀察道場衆會周遍求覓白佛言世尊我等今者猶未得見普賢菩薩其身及座佛言如是善男子汝等何故而不得見善男子普賢菩薩住處甚深不可說故普賢菩薩獲無邊智慧門入師子奮迅定得無上自在用入清淨無礙際生如來十種力以法界藏為身一切如來共所護念於一念頃悉能證入三世諸佛無差別智是故汝等不能見耳爾時普眼菩薩聞如來說普賢菩薩清淨功德得十千阿僧祇三昧以三昧力復遍觀察渴仰欲見普賢菩薩亦不能覩其餘一切諸菩薩衆俱亦不見時普眼菩薩從三昧起白佛言世尊我已入十千阿僧祇三昧求見普賢而竟不得不見其身及身業語及語業意及意業座及住處悉皆不見佛言如是如是善男子當知皆以普賢菩薩住不思議解脫之力普眼於汝意云何頗有人能說幻術文字中種種幻相所住處不答言不也佛言普眼幻中幻相尚不可說何況普賢菩薩祕密身境界祕密語境界祕密意境界而於其中能入能見何以故普賢菩薩境界甚深不可思議無有量已過量舉要言之普賢菩薩以金剛慧普入法界於一切世界無所行無所住知一切衆生身皆即非身無去無來得無斷盡無差別自在神通無依無作無有動轉至於法界究竟邊際善男子若有得見普賢菩薩若得承事若得聞名若有思惟若有憶念若生信解若勤觀察若始趣向若正求覓若興誓願相續不絶皆獲利益無空過者爾時普眼及一切菩薩衆於普賢菩薩心生渴仰願得瞻覲作如是言南無一切諸佛南無普賢菩薩如是三稱頭頂禮敬爾時佛告普眼菩薩及諸衆會言諸佛子汝等宜更禮敬普賢殷勤求請又應專至觀察十方想普賢身現在其前如是思惟周遍法界深心信解厭離一切誓與普賢同一行願入於不二真實之法其身普現一切世間悉知衆生諸根差別遍一切處集普賢道若能發起如是大願則當得見普賢菩薩是時普眼聞佛此語與諸菩薩俱時頂禮求請得見普賢菩薩爾時普賢菩薩即以解脫神通之力如其所應為現色身令彼一切諸菩薩衆皆見普賢親近如來於此一切菩薩衆中坐蓮華座亦見於餘一切世界一切佛所從彼次第相續而來亦見在彼一切佛所演說一切諸菩薩行開示一切智智之道闡明一切菩薩神通分別一切菩薩威德示現一切三世諸佛是時普眼菩薩及一切菩薩衆見此神變其心踊躍生大歡喜莫不頂禮普賢菩薩心生尊重如見十方一切諸佛是時以佛大威神力及諸菩薩信解之力普賢菩薩本願力故自然而雨十千種雲所謂種種華雲種種鬘雲種種香雲種種末香雲種種蓋雲種種衣雲種種嚴具雲種種珍寶雲種種燒香雲種種繒綵雲不可說世界六種震動奏天音樂其聲遠聞不可說世界放大光明其光普照不可說世界令三惡趣悉得除滅嚴淨不可說世界令不可說菩薩入普賢行不可說菩薩成普賢行不可說菩薩於普賢行願悉得圓滿成阿耨多羅三藐三菩提爾時普眼菩薩白佛言世尊普賢菩薩是住大威德者住無等者住無過者住不退者住平等者住不壞者住一切差別法者住一切無差別法者住一切衆生善巧心所住者住一切法自在解脫三昧者佛言如是如是普眼如汝所說普賢菩薩有阿僧祇清淨功德所謂無等莊嚴功德無量寶功德不思議海功德無量相功德無邊雲功德無邊際不可稱讚功德無盡法功德不可說功德一切佛功德稱揚讚歎不可盡功德四法要菩薩所說之法無不契理契機徹上徹下俾上根衆生不離當念親證法身即中下根人亦令種成佛之善因漸次修習畢竟皆得成就無上覺道之妙果耳華嚴經世界成就品普賢菩薩說世界海十種事華藏世界品普賢菩薩說世界海中一切世界及佛名號毗盧遮那品普賢菩薩說往古大威光太子本行十定品佛敕普賢說十大三昧十通品十忍品如來十身相海品皆普賢菩薩所說普賢行品普賢菩薩警告大衆極陳瞋心障道應勤修十法能具十種清淨如來出現品由妙德菩薩請問大法佛口放光明普照十方入普賢口因答妙德之問離世間品普慧菩薩致二百問普賢菩薩酬二千答以上具如經文不能廣引而普賢行願品實華嚴之歸宿大藏之綱要十方三世一切諸佛上成佛道下化衆生成始成終之總持法門無論上聖下凡同須依之而修故將全卷經文悉具録之以期見聞同生淨信則超凡入聖了生脫死即於現生得其實益矣大方廣佛華嚴經普賢菩薩行願品唐罽賓國三藏般若奉詔譯爾時普賢菩薩摩訶薩稱歎如來勝功德已告諸菩薩及善財言善男子如來功德假使十方一切諸佛經不可說不可說佛剎極微塵數劫相續演說不可窮盡若欲成就此功德門應修十種廣大行願何等為十一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恆順衆生十者普皆回向善財白言大聖云何禮敬乃至回向普賢菩薩告善財言善男子言禮敬諸佛者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛世尊我以普賢行願力故深心信解如對目前悉以清淨身語意業常修禮敬一一佛所皆現不可說不可說佛剎極微塵數身一一身遍禮不可說不可說佛剎極微塵數佛虛空界盡我禮乃盡以虛空界不可盡故我此禮敬無有窮盡如是乃至衆生界盡衆生業盡衆生煩惱盡我禮乃盡而衆生界乃至煩惱無有盡故我此禮敬無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言稱讚如來者所有盡法界虛空界十方三世一切剎土所有極微一一塵中皆有一切世間極微塵數佛一一佛所皆有菩薩海會圍繞我當悉以甚深勝解現前知見各以出過辨才天女微妙舌根一一舌根出無盡音聲海一一音聲出一切言辭海稱揚讚歎一切如來諸功德海窮未來際相續不斷盡於法界無不周遍如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我讚乃盡而虛空界乃至煩惱無有盡故我此讚歎無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言廣修供養者所有盡法界虛空界十方三世一切佛剎極微塵中一一各有一切世界極微塵數佛一一佛所種種菩薩海會圍繞我以普賢行願力故起深信解現前知見悉以上妙諸供養具而為供養所謂華雲鬘雲天音樂雲天傘蓋雲天衣服雲天種種香塗香燒香末香如是等雲一一量如須彌山王然種種燈酥燈油燈諸香油燈一一燈炷如須彌山一一燈油如大海水以如是等諸供養具常為供養善男子諸供養中法供養最所謂如說修行供養利益衆生供養攝受衆生供養代衆生苦供養勤修善根供養不捨菩薩業供養不離菩提心供養善男子如前供養無量功德比法供養一念功德百分不及一千分不及一百千俱胝那由他分迦羅分算分數分喻分優波尼沙陀分亦不及一何以故以諸如來尊重法故以如說行出生諸佛故若諸菩薩行法供養則得成就供養如來如是修行是真供養故此廣大最勝供養虛空界盡衆生界盡衆生業盡衆生煩惱盡我供乃盡而虛空界乃至煩惱不可盡故我此供養亦無有盡念念相續無有閒斷身語意業無有疲厭復次善男子言懺悔業障者菩薩自念我於過去無始劫中由貪瞋癡發身口意作諸惡業無量無邊若此惡業有體相者盡虛空界不能容受我今悉以清淨三業遍於法界極微塵剎一切諸佛菩薩衆前誠心懺悔後不復造恆住淨戒一切功德如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我懺乃盡而虛空界乃至衆生煩惱不可盡故我此懺悔無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言隨喜功德者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來從初發心為一切智勤修福聚不惜身命經不可說不可說佛剎極微塵數劫一一劫中捨不可說不可說佛剎極微塵數頭目手足如是一切難行苦行圓滿種種波羅蜜門證入種種菩薩智地成就諸佛無上菩提及般涅槃分布舍利所有善根我皆隨喜及彼十方一切世界六趣四生一切種類所有功德乃至一塵我皆隨喜十方三世一切聲聞及辟支佛有學無學所有功德我皆隨喜一切菩薩所修無量難行苦行志求無上正等菩提廣大功德我皆隨喜如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨喜無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言請轉法輪者所有盡法界虛空界十方三世一切佛剎極微塵中一一各有不可說不可說佛剎極微塵數廣大佛剎一一剎中念念有不可說不可說佛剎極微塵數一切諸佛成等正覺一切菩薩海會圍繞而我悉以身口意業種種方便殷勤勸請轉妙法輪如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我常勸請一切諸佛轉正法輪無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言請佛住世者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來將欲示現般涅槃者及諸菩薩聲聞緣覺有學無學乃至一切諸善知識我悉勸請莫入涅槃經於一切佛剎極微塵數劫為欲利樂一切衆生如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此勸請無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言常隨佛學者如此娑婆世界毗盧遮那如來從初發心精進不退以不可說不可說身命而為布施剝皮為紙析骨為筆刺血為墨書寫經典積如須彌為重法故不惜身命何況王位城邑聚落宮殿園林一切所有及餘種種難行苦行乃至樹下成大菩提示種種神通起種種變化現種種佛身處種種衆會或處一切諸大菩薩衆會道場或處聲聞及辟支佛衆會道場或處轉輪聖王小王眷屬衆會道場或處剎利及婆羅門長者居士衆會道場乃至或處天龍八部人非人等衆會道場處於如是種種衆會以圓滿音如大雷震隨其樂欲成熟衆生乃至示現入於涅槃如是一切我皆隨學如今世尊毗盧遮那如是盡法界虛空界十方三世一切佛剎所有塵中一切如來皆亦如是於念念中我皆隨學如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨學無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言恆順衆生者謂盡法界虛空界十方剎海所有衆生種種差別所謂卵生胎生溼生化生或有依於地水火風而生住者或有依空及諸卉木而生住者種種生類種種色身種種形狀種種相貌種種壽量種種族類種種名號種種心性種種知見種種欲樂種種意行種種威儀種種衣服種種飲食處於種種村營聚落城邑宮殿乃至一切天龍八部人非人等無足二足四足多足有色無色有想無想非有想非無想如是等類我皆於彼隨順而轉種種承事種種供養如敬父母如奉師長及阿羅漢乃至如來等無有異於諸病苦為作良醫於失道者示其正路於暗夜中為作光明於貧窮者令得伏藏菩薩如是平等饒益一切衆生何以故菩薩若能隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野沙磧之中有大樹王若根得水枝葉華果悉皆繁茂生死曠野菩提樹王亦復如是一切衆生而為樹根諸佛菩薩而為華果以大悲水饒益衆生則能成就諸佛菩薩智慧華果何以故若諸菩薩以大悲水饒益衆生則能成就阿耨多羅三藐三菩提故是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺善男子汝於此義應如是解以於衆生心平等故則能成就圓滿大悲以大悲心隨衆生故則能成就供養如來菩薩如是隨順衆生虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨順無有窮盡念念相續無有閒斷身語意業無有疲厭復次善男子言普皆回向者從初禮拜乃至隨順所有功德皆悉回向盡法界虛空界一切衆生願令衆生常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就關閉一切諸惡趣門開示人天涅槃正路若諸衆生因其積集諸惡業故所感一切極重苦果我皆代受令彼衆生悉得解脫究竟成就無上菩提菩薩如是所修回向虛空界盡衆生界盡衆生業盡衆生煩惱盡我此回向無有窮盡念念相續無有閒斷身語意業無有疲厭善男子是為菩薩摩訶薩十種大願具足圓滿若諸菩薩於此大願隨順趣入則能成熟一切衆生則能隨順阿耨多羅三藐三菩提則能成滿普賢菩薩諸行願海是故善男子汝於此義應如是知若有善男子善女人以滿十方無量無邊不可說不可說佛剎極微塵數一切世界上妙七寶及諸人天最勝安樂布施爾所一切世界所有衆生供養爾所一切世界諸佛菩薩經爾所佛剎極微塵數劫相續不斷所得功德若復有人聞此願王一經於耳所有功德比前功德百分不及一千分不及一乃至優波尼沙陀分亦不及一或復有人以深信心於此大願受持讀誦乃至書寫一四句偈速能除滅五無閒業所有世間身心等病種種苦惱乃至佛剎極微塵數一切惡業皆得消除一切魔軍夜叉羅剎若鳩槃茶若毗舍闍若部多等飲血啖肉諸惡鬼神皆悉遠離或時發心親近守護是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切衆生悉應供養此善男子善得人身圓滿普賢所有功德不久當如普賢菩薩速得成就微妙色身具三十二大丈夫相若生人天所在之處常居勝族悉能破壞一切惡趣悉能遠離一切惡友悉能制伏一切外道悉能解脫一切煩惱如師子王摧伏羣獸堪受一切衆生供養又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等此諸菩薩色相端嚴功德具足所共圍繞其人自見生蓮華中蒙佛授記得授記已經於無數百千萬億那由他劫普於十方不可說不可說世界以智慧力隨衆生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數世界衆生發菩提心隨其根性教化成熟乃至盡於未來劫海廣能利益一切衆生善男子彼諸衆生若聞若信此大願王受持讀誦廣為人說所有功德除佛世尊餘無知者是故汝等聞此願王莫生疑念應當諦受受已能讀讀已能誦誦已能持乃至書寫廣為人說是諸人等於一念中所有行願皆得成就所獲福聚無量無邊能於煩惱大苦海中拔濟衆生令其出離皆得往生阿彌陀佛極樂世界爾時普賢菩薩摩訶薩欲重宣此義普觀十方而說偈言所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言辭盡於未來一切劫讚佛甚深功德海以諸最勝妙華鬘伎樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若欲示涅槃我悉至誠而勸請唯願久住剎塵劫利樂一切諸衆生所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根回向衆生及佛道我隨一切如來學修習普賢圓滿行供養過去諸如來及與現在十方佛未來一切天人師一切意樂皆圓滿我願普隨三世學速得成就大菩提所有十方一切剎廣大清淨妙莊嚴衆會圍繞諸如來悉在菩提樹王下十方所有諸衆生願離憂患常安樂獲得甚深正法利滅除煩惱盡無餘我為菩提修行時一切趣中成宿命常得出家修淨戒無垢無破無穿漏天龍夜叉鳩槃茶乃至人與非人等所有一切衆生語悉以諸音而說法勤修清淨波羅蜜恆不忘失菩提心滅除障垢無有餘一切妙行皆成就於諸惑業及魔境世間道中得解脫猶如蓮華不著水亦如日月不住空悉除一切惡道苦等與一切羣生樂如是經於剎塵劫十方利益恆無盡我常隨順諸衆生盡於未來一切劫恆修普賢廣大行圓滿無上大菩提所有與我同行者於一切處同集會身口意業皆同等一切行願同修學所有益我善知識為我顯示普賢行常願與我同集會於我常生歡喜心願常面見諸如來及諸佛子衆圍繞於彼皆興廣大供盡未來劫無疲厭願持諸佛微妙法光顯一切菩提行究竟清淨普賢道盡未來劫常修習我於一切諸有中所修福智恆無盡定慧方便及解脫獲諸無盡功德藏一塵中有塵數剎一一剎有難思佛一一佛處衆會中我見恆演菩提行普盡十方諸剎海一一毛端三世海佛海及與國土海我遍修行經劫海一切如來語清淨一言具衆音聲海隨諸衆生意樂音一一流佛辨才海三世一切諸如來於彼無盡語言海恆轉理趣妙法輪我深智力普能入我能深入於未來盡一切劫為一念三世所有一切劫為一念際我皆入我於一念見三世所有一切人師子亦常入佛境界中如幻解脫及威力於一毛端極微中出現三世莊嚴剎十方塵剎諸毛端我皆深入而嚴淨所有未來照世燈成道轉法悟羣有究竟佛事示涅槃我皆往詣而親近速疾周遍神通力普門遍入大乘力智行普修功德力威神普覆大慈力遍淨莊嚴勝福力無著無依智慧力定慧方便威神力普能積集菩提力清淨一切善業力摧滅一切煩惱力降伏一切諸魔力圓滿普賢諸行力普能嚴淨諸剎海解脫一切衆生海善能分別諸法海能甚深入智慧海普能清淨諸行海圓滿一切諸願海親近供養諸佛海修行無倦經劫海三世一切諸如來最勝菩提諸行願我皆供養圓滿修以普賢行悟菩提一切如來有長子彼名號曰普賢尊我今回向諸善根願諸智行悉同彼願身口意恆清淨諸行剎土亦復然如是智慧號普賢願我與彼皆同等我為遍淨普賢行文殊師利諸大願滿彼事業盡無餘未來際劫恆無倦我所修行無有量獲得無量諸功德安住無量諸行中了達一切神通力文殊師利勇猛智普賢慧行亦復然我今回向諸善根隨彼一切常修學三世諸佛所稱歎如是最勝諸大願我今回向諸善根為得普賢殊勝行願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界乃至虛空世界盡衆生及業煩惱盡如是一切無盡時我願究竟恆無盡十方所有無邊剎莊嚴衆寶供如來最勝安樂施天人經一切剎微塵劫若人於此勝願王一經於耳能生信求勝菩提心渴仰獲勝功德過於彼即常遠離惡知識永離一切諸惡道速見如來無量光具此普賢最勝願此人善得勝壽命此人善來人中生此人不久當成就如彼普賢菩薩行往昔由無智慧力所造極惡五無閒誦此普賢大願王一念速疾皆消滅族姓種類及容色相好智慧咸圓滿諸魔外道不能摧堪為三界所應供速詣菩提大樹王坐已降伏諸魔衆成等正覺轉法輪普利一切諸含識若人於此普賢願讀誦受持及演說果報唯佛能證知決定獲勝菩提道若人誦此普賢願我說少分之善根一念一切悉皆圓成就衆生清淨願我此普賢殊勝行無邊勝福皆回向普願沈溺諸衆生速往無量光佛剎爾時普賢菩薩摩訶薩於如來前說此普賢廣大願王清淨偈已善財童子踊躍無量一切菩薩皆大歡喜如來讚言善哉善哉爾時世尊與諸聖者菩薩摩訶薩演說如是不可思議解脫境界勝法門時文殊師利菩薩而為上首諸大菩薩及所成熟六千比丘彌勒菩薩而為上首賢劫一切諸大菩薩無垢普賢菩薩而為上首一生補處住灌頂位諸大菩薩及餘十方種種世界普來集會一切剎海極微塵數諸菩薩摩訶薩衆大智舍利弗摩訶目犍連等而為上首諸大聲聞并諸人天一切世主天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切大衆聞佛所說皆大歡喜信受奉行大方廣佛華嚴經普賢菩薩行願品終行願品已完此後另起大方廣如來不思議境界經云爾時世尊為令諸菩薩及一切衆生了知諸佛深密禪定威神之力入於三昧名如來不思議境界德藏菩薩問普賢菩薩三昧名字及云何得云何於十方世界自在示現種種佛事普賢答已爾時德藏菩薩為欲利益諸衆生故復問普賢菩薩言其有欲證此三昧者修何福德施戒智慧時普賢菩薩遍於十方一切淨剎現成正覺化衆生者告德藏菩薩言佛子若欲證得此三昧者先應修福集諸善根謂常供養佛法僧衆及以父母所有一切貧窮苦惱無救無歸可悲愍者攝取不捨乃至身肉無所吝惜何以故供養佛者得大福德速成阿耨多羅三藐三菩提令諸衆生皆獲安樂供養法者增長智慧證法自在能正了知諸法實性供養僧者增長無量福智資糧致成佛道供養父母和尚尊師及世間中曾致饒益賴其恩者應念倍增報恩供養何以故以知恩者雖在生死不壞善根不知恩者善根斷滅作諸惡業故諸如來稱讚知恩毀背恩者又常愍濟諸苦衆生菩薩由此廣大善根永不退失若人有能勤修福德常念報恩悲愍衆生則為菩提已在其手應知佛說能隨供養此三種田一一成就無量善根德藏當知菩薩次應植廣大種由是故生此三昧芽成菩提果云何植種謂持種種微妙華鬘塗香末香及衆伎樂恭敬供養現在諸佛或佛形像作是思惟如上所說遍於虛空毛端量處及微塵內無量剎中一一所見諸佛威力及菩薩衆我悉於彼諸佛會中一心正念普皆供養如所供養一佛法性即是一切諸佛法性若我供養一如來者即為供養一切如來隨彼一一諸佛神力能以幾劫入於一念亦爾所劫供養如來若有衆生信解此法種植大種即能得是如來不思議境界廣大三昧故善男子應以此法日日供養由是下至於諸佛所但一敬禮亦能令此種子增長三昧芽生又應常以布施持戒大願智慧而溉灌之又復菩薩為灌三昧修行施時不𥳑福田怨親善惡持戒破戒富貴貧窮又復思惟施於富者雖無所用然我自應修習施行菩薩又應清淨持戒見毀禁者起大悲愍不應於彼生嫌恚心又應深發大菩提願我當決定念念普於遍滿虛空毛端量處乃至一切佛剎塵中無量世界成等正覺轉妙法輪度諸衆生如今世尊毗盧遮那等無有異不起功用攝無量劫入於一念即於如是一一剎中各現佛剎微塵等諸佛威儀一一威儀各度恆河沙等衆生皆令離苦乃至虛空衆生界盡常無休息佛子修智慧者若善男子善女人為求無上菩提發心欲證此三昧者是人要須先修智慧以此三昧由慧得故修智慧者應當遠離妄語綺語及諸散亂無益之事詣精舍中覩佛形像金色莊嚴或純金成身相具足無量化佛在圓光中次第而坐即於像前頭面禮足作是思惟我聞十方無量諸佛今現在世所謂一切義成佛阿彌陀佛寶幢佛阿閦佛毗盧遮那佛寶月佛寶光佛等於彼諸佛隨心所樂尊重之處生大淨信想佛形像作彼如來真實之身恭敬尊重如現前見上下諦觀一心不亂往空閒處端坐思惟如佛現前一手量許心常繫念不令忘失若暫忘失復應往觀如是觀時生極尊重恭敬之心如佛真身現在其前了了明見不復於彼作形像解見已即應於彼佛所以妙華鬘末香塗香恭敬右繞種種供養彼應如是一心繫念常如世尊現其前住然佛世尊一切見者一切聞者一切知者悉知我心如是審復想見成已還詣空處繫念在前不令忘失一心勤修滿三七日若福德者即見如來現在其前其有先世造惡業障不得見者若能一心精勤不退更無異想還得速見何以故若有為求無上菩提於一事中專心修習無不成辦譬如有人於大海中飲一掬水即為已飲閻浮提中一切河水菩薩若能修習此菩提海則為已修一切三昧諸忍諸地諸陀羅尼是故常應勤修匪懈離於放逸繫念一心要令自得現前見佛如是修習初見佛時作是思惟為真佛耶為形像耶知所見像隨想生故乃至虛空毛端量處一切真佛皆亦如是猶如虛空平等無異自心作佛離心無佛乃至三世一切諸佛亦復如是皆無所有唯依自心菩薩若能了知諸佛及一切法皆唯心量得隨順忍或入初地捨身速生妙喜世界或生極樂淨佛土中常見如來親承供養按此段經文與觀無量壽佛經相發修淨業者其毋忽也五利行修道之人于將得未得之時每有宿世怨家現強軟境界以圖破壞故菩薩於法華及觀普賢行法經中示其保護之相果能志心歸命決定不被魔嬈自得圓證真如妙法蓮華經普賢菩薩勸發品云爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來所經諸國普皆震動雨寶蓮華作無量百千萬億種種伎樂又與無數諸天龍夜叉乾達婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等大衆圍繞各現威德神通之力到娑婆世界耆闍崛山中頭面禮釋迦牟尼佛右繞七匝白佛言世尊我於寶威德上王佛國遙聞此娑婆世界說法華經與無量無邊百千萬億諸菩薩衆共來聽受惟願世尊當為說之若善男子善女人於如來滅後云何能得是法華經佛告普賢菩薩若善男子善女人成就四法於如來滅後當得是法華經一者為諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心善男子善女人如是成就四法於如來滅後必得是經爾時普賢菩薩白佛言世尊於後五百歲濁惡世中其有受持是經典者我當守護除其衰患令得安隱使無伺求得其便者若魔若魔子若魔女若魔民若為魔所著者若夜叉若羅剎若鳩槃茶若毗舍闍若吉蔗若富單那若韋陀羅等諸惱人者皆不得便是人若行若立讀誦此經我爾時乘六牙白象王與大菩薩衆俱詣其所而自現身供養守護安慰其心亦為供養法華經故是人若坐思惟此經爾時我復乘白象王現其人前其人若於法華經有所忘失一句一偈我當教之與共讀誦還令通利爾時受持讀誦法華經者得見我身甚大歡喜轉復精進以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼法音方便陀羅尼得如是等陀羅尼世尊若後世後五百歲濁惡世中比丘比丘尼優婆塞優婆夷求索者受持者讀誦者書寫者欲修習是法華經於三七日中應一心精進滿三七日已我當乘六牙白象與無量菩薩而自圍繞以一切衆生所喜見身現其人前而為說法示教利喜亦復與其陀羅尼呪得是陀羅尼故無有非人能破壞者亦不為女人之所惑亂我身亦自常護是人惟願世尊聽我說此陀羅尼呪即於佛前而說呪曰阿檀地一檀陀婆地二檀陀婆帝三檀陀鳩舍隸四檀陀修陀隸五修陀隸六修陀羅婆底七佛馱波羶禰八薩婆陀羅尼阿婆多尼九薩婆婆沙阿婆多尼十修阿婆多尼十一僧伽婆履叉尼十二僧伽涅伽陀尼十三阿僧祇十四僧伽婆伽地十五帝隸阿惰僧伽兜略盧遮切阿羅帝波羅帝十六薩婆僧伽地三摩地伽蘭地十七薩婆達磨修波利剎帝十八薩婆薩埵樓馱憍舍略阿㝹伽地十九辛阿毗吉利地帝二十世尊若有菩薩得聞是陀羅尼者當知普賢神通之力若法華經行閻浮提有受持者應作此念皆是普賢威神之力若有受持讀誦正憶念解其義趣如說修行當知是人行普賢行於無量無邊諸佛所深種善根為諸如來手摩其頭若但書寫是人命終當生忉利天上是時八萬四千天女作衆伎樂而來迎之其人即著七寶冠於采女中娛樂快樂何況受持讀誦正憶念解其義趣如說修行若有人受持讀誦解其義趣是人命終為千佛授手令不恐怖不墮惡趣即往兜率天上彌勒菩薩所彌勒菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生有如是等功德利益是故智者應當一心自書若使人書受持讀誦正憶念如說修行世尊我今以神通力故守護是經於如來滅後閻浮提內廣令流布使不斷絶觀普賢菩薩行法經云爾時普賢菩薩復放眉間大人相光入行者心既入心已行者自憶過去無數百千佛所受持讀誦大乘經典自見故身了了分明如宿命通等無有異豁然大悟得旋陀羅尼百千萬億諸陀羅尼門從三昧起面見一切分身諸佛衆寶樹下坐師子座復見琉璃地妙蓮華叢從下方空中涌出一一華間有微塵數菩薩結跏趺坐亦見普賢分身菩薩在彼衆中讚說大乘時諸菩薩異口同音教於行者清淨六根或說汝當念佛或說汝當念法或說汝當念僧或說汝當念戒或說汝當念施或說汝當念天如此六法是菩提心生菩薩法汝今應當於諸佛前發露先罪至誠懺悔於無量世眼根因緣貪著諸色以著色故貪愛諸塵以愛塵故受女人身世世生處惑著諸色色壞汝眼為恩愛奴故色使汝經歷三界為此弊使盲無所見今誦大乘方等經典此經中說十方諸佛色身不滅汝今得見審實爾不眼根不善傷害汝多隨順我語歸向諸佛釋迦牟尼佛說汝眼根所有罪咎諸佛菩薩慧眼法水願與洗除令得清淨作是語已遍禮十方佛向釋迦牟尼佛大乘經典復作是言我今所懺眼根重罪障蔽穢濁盲無所見願佛大慈哀愍覆護普賢菩薩乘大法船普度一切十方無量諸菩薩伴唯願慈哀聽我悔過眼根不善惡業障法如是三說五體投地正念大乘心不忘捨是名懺悔眼根罪法稱諸佛名燒香散華發大乘意懸繒幡蓋說眼過患懺悔罪者此人現世見釋迦牟尼佛及見分身無量諸佛阿僧祇劫不墮惡道大乘力故大乘願故恆與一切陀羅尼菩薩共為眷屬作是念者是為正念若他念者名為邪念是名眼根初境界相淨眼根已復更誦讀大乘經典晝夜六時胡跪懺悔而作是言我今云何但見釋迦牟尼佛分身諸佛不見多寶佛塔全身舍利多寶佛塔恆在不滅我濁惡眼是故不見作是語已復更懺悔過七日已多寶佛塔從地涌出釋迦牟尼佛即以右手開其塔戶見多寶佛入普現色身三昧一一毛孔流出恆河沙微塵數光明一一光明有百千萬億化佛此相現時行者歡喜偈讚繞塔滿七匝已多寶如來出大音聲讚言法子汝今真實能行大乘隨順普賢眼根懺悔以是因緣我至汝所為汝證明說是語已讚言善哉善哉釋迦牟尼佛能說大法雨大法雨成就濁惡諸衆生等是時行者見多寶佛塔已復至普賢菩薩所合掌敬禮白言大師教我懺悔普賢復言汝於多劫耳根因緣隨逐外聲聞妙音時心生惑著聞惡聲時起百八種煩惱賊害如此惡耳報得惡事恆聞惡聲生諸攀緣顛倒聽故當墮惡道邊地邪見不聞法處汝於今日誦持大乘功德海藏以是因緣見十方佛多寶佛塔現為汝證汝應自當說己過惡懺悔諸罪是時行者聞是語已復更合掌五體投地而作是言正遍知世尊現為我證方等經典為慈悲主唯願愍我聽我所說我從多劫乃至今身耳根因緣聞聲惑著如膠著草聞惡聲時起煩惱毒處處惑著無暫停時坐此竅聲勞我神識墜墮三塗今始覺知向諸世尊發露懺悔既懺悔已見多寶佛放大光明其光金色遍照東方及十方界無量諸佛身真金色東方空中作是唱言此佛世尊號曰善德亦有無數分身諸佛坐寶樹下師子座上結跏趺坐是諸世尊一切皆入普現色身三昧皆作是言善哉善哉善男子汝今讀誦大乘經典汝所誦者是佛境界說是語已普賢菩薩復更為說懺悔之法汝於前世無量劫中以貪香欲分別諸識處處貪著墮落生死汝今應當觀大乘因大乘因者諸法實相聞是語已五體投地復更懺悔既懺悔已當作是語南無釋迦牟尼佛南無多寶佛塔南無十方釋迦牟尼分身諸佛作是語已遍禮十方佛南無東方善德佛及分身諸佛如眼所見一一心禮香華供養供養畢已胡跪合掌以種種偈讚歎諸佛既讚歎已說十惡業懺悔諸罪既懺悔已而作是言我於先世無量劫時貪香味觸造作衆惡以是因緣無量世來恆受地獄餓鬼畜生邊地邪見諸不善身如此惡業今日發露歸向諸佛正法之王說罪懺悔既懺悔已身心不懈復更讀誦大乘經典大乘力故空中有聲告言法子汝今應當向十方佛讚說大乘於諸佛前自說己過諸佛如來是汝慈父汝自當說舌根所作不善惡業此舌根者動惡業相妄言綺語惡口兩舌誹謗妄語讚歎邪見說無益語如是衆多諸雜惡業鬭構壞亂法說非法如是衆罪今悉懺悔諸世雄前作是語已五體投地遍禮十方佛合掌長跪當作是語此舌過患無量無邊諸惡業刺從舌根出斷正法輪從此舌起如此惡舌斷功德種於非義中多端強說讚歎邪見如火益薪猶如猛火傷害衆生如飲毒者無瘡疣死如此罪報惡邪不善當墮惡道百劫千劫以妄語故墮大地獄我今歸向南無諸佛發露黑惡作是念時空中有聲南方有佛名栴檀德彼佛亦有無量分身一切諸佛皆說大乘除滅罪惡如此衆罪今向十方無量諸佛大悲世尊發露黑惡誠心懺悔說是語已五體投地復禮諸佛是時諸佛復放光明照行者身令其身心自然歡喜發大慈悲普念一切爾時諸佛廣為行者說大慈悲及喜捨法亦教愛語修六和敬爾時行者聞此教敕心大歡喜復更誦習終不懈息空中復有微妙音聲作如是言汝今應當身心懺悔身者殺盜淫心者念諸不善造十惡業及五無閒猶如猿猴亦如黐膠處處貪著遍至一切六情根中此六根業枝條華葉悉滿三界二十五有一切生處亦能增長無明老死十二苦事八邪八難無不經歷汝今應當懺悔如是惡不善業爾時行者聞此語已問空中聲我今何處行懺悔法時空中聲即說是語釋迦牟尼名毗盧遮那遍一切處其佛住處名常寂光常波羅蜜所攝成處我波羅蜜所安立處樂波羅蜜滅受想處淨波羅蜜不住身心相處不見有無諸法相處如寂解脫乃至般若波羅蜜是色常住法故如是應當觀十方佛時十方佛各伸右手摩行者頭作如是言善哉善哉善男子汝今讀誦大乘經故十方諸佛說懺悔法菩薩所行不斷結使不住使海觀心無心從顛倒想起如此想心從妄想起如空中風無依止處如是法相不生不沒何者是罪何者是福我心自空罪福無主一切諸法皆亦如是無住無壞如是懺悔觀心無心法不住法諸法解脫滅諦寂靜如是想者名大懺悔名莊嚴懺悔名無罪相懺悔名破壞心識懺悔行此懺悔者身心清淨不住法中猶如流水念念之中得見普賢菩薩及十方佛時諸世尊以大悲光明為於行者說無相法行者聞說第一義空行者聞已心不驚怖應時即入菩薩正位佛告阿難如是行者名為懺悔此懺悔者十方諸佛諸大菩薩所行悔法佛告阿難佛滅度後佛諸弟子若有懺悔惡不善業但當讀誦大乘經典此方等經是諸佛眼諸佛因是得具五眼佛三種身從方等生是大法印般涅槃海如此海中能生三種佛清淨身此三種身人天福田應供中最其有讀誦大方等典當知此人具佛功德諸惡永滅從佛慧生爾時世尊而說偈言若有眼根惡業障眼不淨但當誦大乘思念第一義是名懺悔眼盡諸不善業耳根聞亂聲壞亂和合義由是起狂亂猶如癡猿猴但當誦大乘觀法空無相永盡一切惡天耳聞十方鼻根著諸香隨染起諸觸如此狂惑鼻隨染生諸塵若誦大乘經觀法如實際永離諸惡業後世不復生舌根起五種惡口不善業若欲自調順應勤修慈心思法真寂義無諸分別相心想如猿猴無有暫停時若欲折伏者當勤誦大乘念佛大覺身力無畏所成身為機關主如塵隨風轉六賊遊戲中自在無罣礙若欲滅此惡永離諸塵勞常處涅槃城安樂心憺怕當誦大乘經念諸菩薩母無量勝方便從思實相得如此等六法名為六情根一切業障海皆從妄想生若欲懺悔者端坐念實相衆罪如霜露慧日能消除是故應至心懺悔六情根說是偈已佛告阿難汝今持是懺悔六根觀普賢菩薩法普為十方諸天世人廣分別說佛滅度後佛諸弟子若有受持讀誦解說方等經典應於靜處若在冢間若林樹下若阿練若處讀誦方等思大乘義念力強故得見我身及多寶佛塔十方分身無量諸佛普賢菩薩文殊師利菩薩藥王菩薩藥上菩薩恭敬法故持諸妙華住立空中讚歎恭敬行持法者但誦大乘方等經故諸佛菩薩晝夜供養是持法者佛告阿難我與賢劫諸菩薩等及十方諸佛因思大乘真實義故除卻百萬億劫阿僧祇數生死之罪因此勝妙懺悔法故今於十方各得為佛若欲疾成阿耨多羅三藐三菩提者若欲現身見十方佛及普賢菩薩當淨澡浴著淨潔衣燒衆名香在空閒處應當讀誦大乘經典思大乘義佛告阿難若有衆生欲觀普賢菩薩者當作是觀作是觀者是名正觀若他觀者名為邪觀佛滅度後佛諸弟子隨順佛語行懺悔者當知是人行普賢行行普賢行者不見惡相及惡業報其有衆生晝夜六時禮十方佛誦大乘經思第一義甚深空法一彈指頃除卻百萬億阿僧祇劫生死之罪行此行者真是佛子從諸佛生十方諸佛及諸菩薩為其和尚是名具足菩薩戒者不須羯磨自然成就應受一切人天供養爾時行者若欲具足菩薩戒者應當合掌在空閒處遍禮十方佛懺悔諸罪自說己過然後靜處白十方佛而作是言諸佛世尊常住在世我業障故雖信方等見佛不了今歸依佛唯願釋迦牟尼正遍知世尊為我和尚文殊師利具大慧者願以智慧授我清淨諸菩薩法彌勒菩薩勝大慈日憐愍我故亦應聽我受菩薩法十方諸佛現為我證諸大菩薩各稱其名是勝大士覆護衆生助護我等今日受持方等經典乃至失命設墮地獄受無量苦終不毀謗諸佛正法以是因緣功德力故今釋迦牟尼佛為我和尚文殊師利為我阿闍黎當來彌勒願授我法十方諸佛願證知我大德諸菩薩願為我伴我今依大乘經甚深妙義歸依佛歸依法歸依僧如是三說歸依三寶已次當自誓受六重法受六重法已次當勤修無礙梵行發曠濟心受八重法立此誓已於空閒處燒衆名香散華供養一切諸佛及諸菩薩大乘方等而作是言我於今日發菩提心以此功德普度一切作是語已復更頂禮一切諸佛及諸菩薩思方等義一日乃至三七日若出家在家不須和尚不用諸師不白羯磨受持讀誦大乘經典力故普賢菩薩勸發行故是十方諸佛正法眼目因由是法自然成就五分法身戒定慧解脫解脫知見諸佛如來從此法生於大乘經得受記莂是故智者若聲聞人毀破三歸五戒及八戒比丘戒比丘尼戒沙彌戒沙彌尼戒式叉摩那戒及諸威儀愚癡不善惡邪心故多犯諸戒及威儀法若欲除滅令無過患還為比丘具沙門法者當勤修讀方等經典思第一義甚深空法令此空慧與心相應當知此人於一念頃一切罪垢永盡無餘是名具足沙門法式具諸威儀應受人天一切供養若優婆塞犯諸威儀作不善事不善事者所謂論說佛法過惡論說四衆所犯惡事偷盜淫泆無有慚愧若欲懺悔滅諸罪者當勤讀誦方等經典思第一義若王者大臣婆羅門居士長者宰官是諸人等貪求無厭作五逆罪謗方等經具十惡業是大惡報應墮惡道過於暴雨必定當墮阿鼻地獄若欲除滅此業障者應生慚愧懺悔諸罪云何名為剎利居士懺悔罪法懺悔法者但當正心不謗三寶不障出家不為梵行人作惡留難應當繫念修六念法亦當供給供養持大乘者不必禮拜應當憶念甚深經法第一義空思是法者是名剎利居士修第一懺悔第二懺悔者孝養父母恭敬師長是名修第二懺悔第三懺悔者正法治國不邪枉人民是名修第三懺悔第四懺悔者於六齊日敕諸境內力所及處令行不殺修如此法是名修第四懺悔第五懺悔者但當深信因果信一實道知佛不滅是名修第五懺悔佛告阿難於未來世若有修習如此懺悔法當知此人著慚愧服諸佛護助不久當成阿耨多羅三藐三菩提六應化菩薩俯應羣機如一月當空普印衆水舉凡江海溝渠一勺一滴皆現圓月月何容心哉以其高而明故也菩薩無心以衆生之心為心故得隨其誠之大小而為應化攝受焉華嚴清涼疏云普賢身不可思議略有三類一隨類身隨人天等見不同故二漸勝身乘六牙象相莊嚴故三窮盡法界身帝網重重無有盡故蓋第三即普賢法身如華嚴阿僧祇品偈言於一微細毛端處有不可說諸普賢一切毛端悉亦爾如是乃至遍法界又行願品偈言一身復現剎塵身一一遍禮剎塵佛是也第二即普賢報身如觀普賢行法經言普賢菩薩生東方淨妙國土身量無邊色相無邊又華嚴經壽量品言最後勝蓮華世界賢勝佛剎普賢菩薩及諸同行大菩薩等充滿其中又行願品言往生極樂世界即見阿彌陀佛文殊師利菩薩普賢菩薩等色相端嚴功德具足是也第一即普賢化身如法華楞嚴二經言乘六牙象以衆生喜見身現其人前又行願品言我為菩提修行時一切趣中成宿命天龍夜叉鳩槃茶乃至人與非人等所有一切衆生語悉以諸音而說法是也末法衆生垢深障重得一瞻大士化身已屬大善根福德因緣何敢望見法報二身故大士隱勝顯劣而峨山即為應化之場舊志稱峨山應化始於漢明帝時里人蒲公採藥見麋迹似蓮華詢諸千歲寶掌菩薩掌令往洛陽問摩騰法蘭二尊者蘭曰華嚴經菩薩住處品有文西南方有處名光明山從昔已來諸菩薩衆於中止住現有菩薩名曰賢勝與其眷屬三千人俱常在其中而演說法所謂賢勝即普賢也蒲歸乃建普光殿供願王菩薩像菩薩示現始於此按菩薩住處品乃佛在摩竭提國阿蘭若菩提道場所說其西南方自不在震旦又菩薩名為賢勝而非普賢引經為證豈可改易經文故此說頗啓後人之疑而不少辨論但普賢菩薩既以法界藏身無往不在又恆順衆生之願無感不應峨眉從漢以來二千年大小寺宇莫不崇奉普賢菩薩四方信士禮敬普賢者亦莫不指歸峨眉則此山為大士應化之地更復何疑正不必有經文作證也況大士隨緣赴感如月印千江一勺一渧無不見月似春來大地一草一木莫不逢春縱有經文指菩薩住處在峨眉豈其應化即局於峨眉試觀歷史所記大士應化事迹不限方所故有降中興以慰宋后劉宋路昭太后大明四年造普賢菩薩乘白象像供於中興寺因設講于寺其年十月八日齊畢解座會僧二百人于時寺宇始構帝甚留心輦蹕臨幸旬必數四僧徒勤整禁衛嚴肅爾日僧名有定就席久之忽有一僧預于座次風貌秀舉合堂驚矚齊主與語往還百餘言忽不復見列筵同覩識為菩薩降臨來天安以應道溫劉宋大明中有寺統法師名道溫居秣陵縣見皇太后睿鑑沖明聖符幽洽滌思淨場研襟至境固以聲藻震中事靈梵表乃創思鎔斫抽寫神華模造普賢聖像寶傾宙珍妙盡天飾所設講齊訖其月八日襯會有限名簿素定引次就席數無盈減轉經將半景及昆吾忽覩異僧預于座內容止端嚴氣貌秀發舉衆矚目莫有識者齊主問曰上人何名答曰慧明問住何寺答云來自天安言對之間倏然不見合堂驚愧遍筵肅心以為明祥所賁幽應斯闡云乘馬入道冏之堂劉宋沙門釋道冏扶風好畤人姓馬學業淳粹弱齡有聲元嘉二年九月在洛陽為人作普賢齊道俗四十許人已經七日正就中食忽有一人袴褶乘馬入至堂前下馬禮佛冏謂常人不加禮異此人登馬揮鞭忽失所在便見赤光赫然竟天良久而滅後三年十二月在白衣家復作普賢齊將竟之日有二沙門容服如凡直來禮佛衆謂庸僧不甚尊仰聊問何居答曰住在前村時有白衣張道覺其有異至心禮拜沙門出門行數十步忽有飛塵直上衝天追目此僧不復知所冏以七年與同學來遊京師時司空何尚之始構南澗精舍冏寓居焉夜中忽見四人乘一新車從四人傳教來在屋內呼與共載道冏驚其夜至疑而未言因閉眼不覺升車俄而至郡後沈橋見一貴人著帢被箋布單衣坐牀燾繖形似華蓋鹵簿從衛可數百人悉服黃衣見冏驚曰行般舟道人精心遠詣祇欲知其處耳何故將來即遣人引送冏還至精舍門外失所送人門閉如故呼喚久之寺內諸僧咸驚相報告開門納之視所住房戶猶故關之駕象降普明之室劉宋上定林寺釋普明姓張臨渭人少出家稟性清純蔬食布衣以懺誦為業誦法華維摩二經凡諷誦時有別衣別座未嘗穢雜每至勸發品輒見普賢乘象立在其前誦維摩經則聞空中唱樂又善神呪所救皆愈鄉人王道真妻病請明來呪明入門婦便悶絶俄見一物如貍長數尺許從狗竇出因此而愈明嘗行水傍祠巫覡云神見之皆奔走以宋孝建中卒春秋八十有五上四則見法苑珠林卷十七普賢部化女子而求宿顯曇翼之真修晉曇翼餘杭人初入廬山依遠公後往關中見羅什東還會稽入秦望山誦法華經十二年感普賢大士化女子身披采服攜筠籠一白豕大蒜兩根至翼處求宿曰妾遠往探親值天大雪迷失道路現日將暮不知所往豺狼縱橫歸無生理聽託一宿師卻之力女復哀求不已遂令居草牀上夜半號呼腹痛告求按摩翼辭以持戒不應手觸女號呼愈甚翼乃以布裹錫杖遙為按之痛減而已次晨女謝而出涌身虛空現普賢相采服化祥雲豕變白象蒜化雙蓮垂手摩翼頂為其授記而滅郡太守孟顗聞於朝敕建法華寺即今天衣寺也本舊志志餘為拾得以驅牛示亡僧之破戒唐天台國清寺作務僧拾得普賢化身異迹甚多一日牧牛值寺僧布薩拾得驅牛至大笑曰悠悠者聚頭時持律首座呵曰風人何以喧礙說戒拾得曰我不牧牛也此羣牛多是此寺知僧事人也乃呼各亡僧法號牛各應聲而過舉衆驚愕咸思改往修來感菩薩垂迹度脫高僧傳三集入蓮華之勝會二聖書名宋長蘆宗賾宗教雙通悟證深遠遵廬山之規建蓮華勝會一夕夢一烏巾白衣風貌清美可三十許揖謂賾曰欲入蓮華會求書一名賾乃取會録問曰何姓名答曰普慧書已白衣又云家兄亦求書一名曰令兄何名答曰普賢言訖遂隱既覺詢諸耆宿曰華嚴經離世間品有普賢普慧二菩薩助揚佛法吾今建會共期西方感二大士幽贊乃以二大士為會首於是遠近嚮化焉淨土聖賢録授淨梵之羯磨圓音嘉獎宋佛護字淨梵主姑蘇大慈講三大部兼禮法華懺至第三會感普賢授羯磨法稱淨梵比丘者三洪音如撞巨鐘三昧將圓有二僧來作禮曰春至天台石梁禮聖迹忽見空中飛華異香非常有一僧曰姑蘇梵法主散華至此語畢即不見某因來禮座高僧傳新四集道潛禮懺停象駕於三門五代吳越錢塘永明寺釋道潛禮阿育王佛舍利塔見舍利在懸鐘之外繞行悲喜交集因禮普賢懺三七日忽見普賢乘象在塔寺三門停止象鼻直枕懺室吳越國王請入府授菩薩戒造永明寺以居之高僧傳三集辨才戴經授華嚴之玄義唐僧辨才不知何許人幼事裕法師以華嚴為業久而不悟乃別護淨造香函盛經頂戴行道凡經三載普賢指授玄義忽爾成誦煥若臨鏡華嚴持驗記則章親證三昧徑往蓮邦宋則章與若愚友善同修淨業廣為勸導後章既沒愚夢神人告曰汝同學則章得普賢行願三昧已生淨土彼方待汝覺而沐浴更衣命衆念佛誦經端坐默聽忽云淨土現前吾其往矣書偈而逝高僧傳新四集海雲應現五臺普利含識唐海雲居清涼山南臺峭絶幽僻處其刻苦辦道儉而難遵後沒於其處昔傳載雲是普賢菩薩應化蓋菩薩無處不現身與文殊互為主伴以度衆生也高僧傳三集說樂邦之勝異偕文殊同登蓮臺唐法照禮五臺見異光值二童子引入化竹林寺金地寶樹以為莊嚴登講堂見文殊在西普賢在東各據獅子座萬衆圍繞而為說法照作禮問曰末代凡夫去聖時遙知識隘劣障垢尤深佛性無由顯現佛法浩瀚未審修何法門最為其要文殊告曰汝今念佛今正是時諸修行門無過念佛供養三寶福慧雙修此之二門最為善要我於過去劫中因觀佛故因念佛故因供養故得一切種智是故一切諸法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛諸法之王照問當云何念文殊言此世界西有阿彌陀佛彼佛願力不可思議汝當繼念令無閒斷命終決定往生永不退轉語已二大聖同舒金臂摩照頂曰汝以念佛故不久證無上正等菩提若善男女等願疾成佛者無過念佛則能速證無上菩提照歡喜作禮辭而退淨土聖賢録息地獄之苦輪與地藏共居樹杪吳門王建死至冥查係誤勾命回生見地獄黑焰蔽空號叫如霆吼三老僧趺坐大樹杪每獄囚痛聲騰沸時以淨水灑之聲即停息詢之則觀音普賢地藏三大士也現果隨録證大行於普勝塵數同名華嚴經說普賢行品十方剎塵菩薩同名普賢各從普勝世界來此作證住海島之牢山威神亦著華嚴經菩薩住處品云震旦國有一住處名那羅延窟從昔以來諸菩薩衆於中止住大疏云那羅延此云堅牢昔云青州界東有牢山現有古佛迹此應是今之此山靈迹顯著不減清涼時稱普賢所居往往有覩至于豎子現普賢之相孕婦産遍吉之身其慈悲濟度尤為不可思議唐開元初陝西同州界有數百家為東西普賢邑社造普賢菩薩像每日設齊東社邑家青衣以齊日生子於其齊次名之曰普賢年至十八任為愚豎廝役之事後因設齊日此豎忽推普賢像而坐其處邑老觀者咸怒詬罵復加鞭撻普賢笑曰吾以汝志心故生此中今見真普賢而不能加敬何也於是變其身為普賢菩薩相身黃金色乘六牙象飛騰空中放大光明天花綵雲五色相映少頃遂滅邑老方悟示現大生驚慚又西社為普賢邑齊者僧徒方集忽有孕婦臨産竄入菩薩堂內人怒呵之不能禁止遂産一男於蓮座前汙穢狼藉人莫敢提挈深加詬辱忽失婦人所在男孩變為普賢菩薩相好端嚴光明照燭所見汙穢皆成香花乘象騰空漸漸隱滅諸父老自恨愚暗不識菩薩刺目懺悔者十餘人太平廣記由是觀之菩薩變現豈凡人所能識於此足覘大士度生本無方所攀華嚴以證峨眉之住者未免拘墟而別峨眉於普賢之外者更同夢囈也附録華嚴經依普賢願王得生極樂撮要并釋行願品普賢菩薩於逝多林末會發十大願王其一一願皆云虛空界盡衆生界盡我此大願無有窮盡是人臨命終時最後剎那一切諸根悉皆散壞一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛其人自見生蓮華中蒙佛授記得授記已經無數劫普於十方不可說不可說世界以智慧力隨衆生心而為利益乃至能於煩惱大苦海中拔濟衆生令其出離皆得往生極樂世界又下偈云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界道純法師釋曰問普賢行願是華嚴流通何故於世界海中偏指極樂既信解圓宗十方佛剎皆可往生結歸西方必有深旨答普賢為善財海衆說願王已結歸西方者蓋為信解圓宗人入文殊智修普賢行福慧事理皆稱法界此大心人雖妙悟本明頓同諸聖然猶力用未充未及如來出現普利衆生所以暫依淨土親近彌陀海衆直至成佛故經曰親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界即斯意也
