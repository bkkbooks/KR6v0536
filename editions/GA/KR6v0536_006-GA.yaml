body:
  text: 第七王臣外護初歷朝勅賜二護法名文昔世尊以建立正法護持三寶付囑國王大臣誠以三寶雖為人天眼目度世津梁倘無有力大人發心維護則魔外必加摧殘而眾生失其怙恃矣故歷朝來佛法之隆替與夫世運之升沈大可於護法一門卜之故志外護初歷朝勅賜唐僖宗勅建黑水寺賜額永明華藏又賜住持慧通禪師藕絲無縫袈裟一領以黃金白玉為鉤環及諸供器今失宋太宗真宗仁宗勅賜萬年寺亦名白水寺御書百餘軸七寶冠金珠瓔珞袈裟金銀瓶鉢奩鑪匙箸果壘銅鐘鼓鑼磬蠟茶塔芝草之類又有仁宗御賜紅羅紫繡袈裟寶環上有御書發願文曰佛法長興法輪常轉國泰民安風調雨順干戈永息人民安樂子孫昌熾一切眾生同登彼岸又仁宗嘉祐七年御札頒賜經藏經紙俱碧硾紙銷銀書卷首悉有銷金圖畫各圖一卷之事經縑織輪相鈴杵器物及天下太平皇帝萬歲等字於花葉中又有徽宗崇寧中所賜錢旛及織成紅幢後三經回祿無存明英宗勅賜峨眉山靈巖寺藏經勅書皇帝聖旨朕體天地保民之心恭承皇曾祖考之志刊印大藏經典頒賜天下用廣流傳茲以一藏安置大峨眉山靈巖禪寺永充供養聽所在僧眾看誦讚揚上為國家祝釐下與僧民祈福務須敬奉守護故諭天順四年五月初四日明神宗勅賜海會堂金繡千佛袈裟紫衣及丁雲鵬所畫八十八祖像今失惟佛牙一具與頒賜藏經勅書尚存明神宗勅賜圓通庵慈寧宮皇太后手書佛號繡金長旛一對及烏思藏金銀書番經三本今俱失惟九層沈香塔尚存明神宗勅賜峨眉山白水寺藏經勅書勅諭峨眉山白水寺住持及僧眾人等朕發誠心印造佛大藏經頒施在京及天下名山寺院供奉經首護勅已諭其由爾住持及僧眾人等務要虔潔供安朝夕禮誦保安眇躬康泰宮壼肅清懺已往愆尤祈無疆壽福民安國泰天下太平俾四海八方同歸仁慈善教朕成恭己無為之治道焉今特差御馬監右少監漢經廠表白王舉齎請前去彼處供安各宜仰體知悉欽哉故諭萬曆二十七年閏四月二十四日明神宗勅賜峨眉山慈延寺藏經勅書皇帝勅諭四川峨眉山勅賜慈延寺住持本炯朕惟自古帝王以儒道治天下而儒術之外復有釋教相翼並行朕以沖昧嗣承大統迄今已四十年天下和平臣民樂業仰思天眷祖德洪庇良由大公同善之因況國初建置僧錄司職掌厥事蓋仁慈清淨其功德不昧神道設教於化誘為易祖宗睿謨意深遠矣佛氏藏經舊刻六百三十七函聖母慈聖宣文明肅貞壽端獻恭熹皇太后續刻四十一函朕既恭序其端而又因通行印施序其前後勅諭護持所以錫孝類流慈恩也茲者朕嘉善道之可依念傳布之未廣爰命所司印造全藏六百七十八函施捨在京及天下名山寺院永垂不朽庶表朕敬天法祖之意弘仁普濟之誠使海宇共享無為之福先民有言一念思善和風慶雲一念不善災星厲烈夫善念以有感而興無感而懈是以皇極敷言不厭諄懇聖喆所貴善與人同古今相傳其揆一也且善在一人尚萃一家敦穆若億兆向善豈不四海太和此經頒布之處本寺僧眾人等其務齋心禮誦敬奉珍藏不許褻玩致有毀失特賜護勅以垂永久欽哉故諭萬曆四十年六月十五日明神宗勅賜峨眉山永延寺藏經勅書勅諭四川峨眉山萬佛金殿勅建護國聖壽永延寺住持僧福登及僧眾人等朕發誠心印造佛大藏經頒施在京及天下名山寺院供奉經首護勅已諭其由爾住持及僧眾人等務要虔潔供安朝夕禮誦保安眇躬康泰宮壼肅清懺已往愆尤祈無疆壽福民安國泰天下太平俾四海八方同歸仁慈善教朕成恭己無為之治道焉今特差御馬監張然齎請前去彼處供安各宜仰體知悉欽哉故諭萬曆四十二年月日清聖祖康熙四十一年壬午季春在京暢春苑皇上親賜金剛經藥師經心經各一部臥雲庵三大字於伏虎寺僧照裕又賜藥師經一部慈燈普照四大字於光相寺僧普震是年十一月二十五日皇上欽差內大臣海清五哥德其內欽奉聖旨峨眉山降香齎捧御書法寶匾額僧詩頒賜伏虎寺僧照裕金字心經金剛經藥師經各一部離垢園三大字字幅僧詩一軸宿世身金粟初因社白蓮瞻依神八萬接引路三千果結菩提樹池分阿耨泉無生能自悟雨似散花天伏虎寺寓僧德果字幅二句到處花為雨行時杖出泉善覺寺僧元亨金剛經一部大峨寺僧常舒金剛經一部字幅二句洗鉢泉初暖焚香曉更清洪椿坪僧圓瑞金剛經藥師經各一部忘塵慮三大字字幅二句錫飛常近鶴杯度不驚鷗白龍洞僧祖元金剛經一部字幅二句挂衲雲林靜翻經石榻涼毗盧殿僧德敬金剛經藥師經各一部字幅四句釣艇去悠悠烟波春復秋惟將一點火何處宿蘆洲雷洞坪僧慧植金剛經一部靈覺二大字銅殿藏經閣僧照乾金剛經一部玉毫光三大字字幅二句絕頂來還晚寒窗睡達明臥雲庵僧照玉野雲二大字字幅僧詩八句何所問津梁行行到上方天香飄廣殿山氣宿空廊石漱泉聲細林穿鳥路長疎鐘沈夜雨坐定俗情忘峨眉開山近二千年歷代皇帝所有勅書及所賜物多難勝記世遠人亡湮沒殆盡今但摭拾少分以示端倪云爾二護法名文峨眉山普光殿記明朱懷園蜀王普光殿在峨眉山之絕頂峨眉乃普賢大士示現之所也峨眉之勝聞天下其山周帀千里八十四盤於青雲之端有石龕百餘大洞十二小洞二十八又有雷洞坪飛來鐘玉泉石金剛臺之境峯巒倚天彩錯如畫與岷山相對實吾封內之巨鎮也山之上天霽則圓光大現山之下雲開則聖燈夜明誠為佛之境界成化二年舊殿戹於回祿寺之住山了鑑以事聞於予予因憫古佛道場不可廢毀捐資命工重為修建越三年己丑而工畢峻傑弘麗於舊尤加殿中以銅鑄天地水府天君侍者雷電山王之神像以為百千萬年之香火也夫天地之理生生不息成毀也代謝也理勢相因而然後人不繼前人之為而為之則其迹化為草莽之區矣成而毀毀而成亦生生不息之意也斯殿一新因前人之為而為之四方覩佛者登斯山上斯殿當知普賢願王應變無窮而行澤無盡也殿之規制茲不一一焉是為記峨眉大佛寺碑記明范醇敬禮部侍郎西來旨意大空諸有要以超出色界普度眾生即言一已多何有於千言心已寂何有於手目乎然觀世音大士神通設教夫豈其獨具千手千目而並千其心惟其心空故妙於神應所謂一以貫之即萬億可也何千之足云世人紛擾爾心役爾手足四大爾色身即左持右攫必有妨誤前瞻後顧必有遺脫由不能無故不能一不能一故不能千此眾生相也大士心若虛空手目無有惟其無有是以廣有隨應隨妙運而不宰不煩攝持不相罣礙斂入毛孔散滿沙界一切眾生咸歸濟度以方於吾儒萬殊一本之義豈有異耶諦觀大造中形形色色別生分彙果物物而雕之哉又奚疑於大士之多變也然以一覓佛執矣而乃千之以千神佛幻矣而乃象之何以故彼見相尋宗因無彰有下乘不廢而所謂報佛恩者如是寧詎贅哉矧大光明山震旦選佛道場範金櫛比獨大悲缺如事應有待我皇上乘輪覺世德布人天聖母金粟如來褒揚法指宮闈儉素之餘施此名山作大悲果於是知縣臣李應霖臣魏世軫前後奉命來令茲土實司此山仰承慈懿祗襄勝事有僧真法者六塵不著五戒肅如荒度招提謹如願意莊嚴卒業爰壽貞珉小臣不拜手稽首為作頌曰栩栩眾生沈迷苦海生死輪迴與化俱改爾時世尊閔念眾生神通願力惟觀世音顯諸神變現千手眼撐持世界永無增減法際虛空諸相冥杳究竟慈悲萬億猶少白馬之東峨眉大雄不逢曇華曷構琳宮用奉塵剎皈依寶相法力如天功德無量坤維永奠乾運遐昌天子萬年奉我慈皇重修會福寺記明宿進刑部員外漹江寺之顯於世者有以哉水之潤近沃而遠汔火之光近焯而遠微故天下名藍屬都城孔道者得受歷朝恩待既藏且額而又舉有僧行者嗣而尸之其他宗散四遐荒忽之地毋慮數萬則固不能是數數也然一再之非夫寺之真有殊尤爽塏之境嚴苦高卓之僧與諸收肯清葉貴達之門蓋亦難至乎爾也考之令甲宋賜藏書普覺三十福嚴五十景佑二百二十其賜額也梁於廣利八聖者三唐於月華水西能仁大慈者四宋於法雲慧日光孝慈恩寶積菩提普庵覺報明心開福普化興聖景德仙林龍德南禪者十有六國朝列聖累下勅典如故事然寺實祝釐禳熒之有所繄加之意若大天界大興隆大報恩大龍興化正覺寶塔靜海華林普惠永壽光福通善顯通興樂靈聖廣惠諸寺或頒藏經賜御額而至嘉之獲顯於世也雖靈巖天下維四一姑蘇一雁蕩一南安而峨山之靈巖實荷恩待之重也天順庚辰賜藏經若護勅成化乙酉賜額會福豈非以靈巖為峨山第一境耶抑亦以有僧行者出而又得人以張之耶先是隋稱寶掌濫觴是寺第傳之弘義圓通了貴傳之本興本印本興寂本印領祠部牒再嗣之搴禪枝而𣂏定水者四十年遹念寺久傾圮衲麤蔬澹不踰閫以自礪復田若干畝捐資銓度鳩工庀材建天王地藏殿修勅賜經閣大雄寶殿伽藍祖堂庖廥方丈若干楹後殿貌諸佛像又募緇流本欽益崇福容淳泰真裕等為法堂石橋各二穹墉嶢榭聯煇竟爽經始於弘治癸亥八月訖工於正德辛未二月落成通途之屬罔不集觀稱願皆曰靈巖殊尤爽塏之境印師嚴苦高卓之僧其清葉貴達之張之也如萬公安者顧可少乎哉會夾江典史王翼礲石來請記亟辭不獲本印別號理源恭州永川遂碑正德六年辛未春三月既望勅賜會福寺碑文明萬安大學士眉山距峨眉縣西一舍許有山曰大峨眉山山畔有覩佛臺臺右有寺曰靈巖傳自隋唐間創建宋紹興五年太尉王陵朝請大夫知漢州軍事王陟施資重修改曰光林朝奉大夫通判軍事王訪贖田以贍寺用其界東至魚洞山背南至捲洞溪西至𨮂板山坡北過石佛龕嶺中連響水灘下抵高橋河口載在古碑如此元季寺燬於兵國朝洪武永樂間僧弘義圓通相繼主寺重建之仍曰靈巖時佛宇方丈僅存香火庇風雨而已其田半為居民所侵景泰間了貴號寶峯者來主寺事辛勤勸募始建三世佛殿殿前為明玉樓殿東為伽藍堂西為祖師堂凡禪堂齋堂僧房庖庫及賓客之位咸以次成而田至是悉歸寺矣寺之興盛殆非昔比寶峯每顧其徒曰我佛教言悉具藏經不丐於朝曷以得觀天順五年詣闕以請之復荷璽書護持越四年為成化元年寶峯來疏曰聖朝於天下名山古剎俱有錫額竊惟大峨名山靈巖古剎幸一體賜與上念英宗睿皇帝嘗寵賚茲寺遂更名會福明日寶峯謝恩訖乃狀寺始末徵言刻石用侈上賜於悠久予以峨眉吾州之案山亦因以名寺榮荷國恩覃及豈容默默無紀耶夫寺有興替由所主者有賢愚抑亦所據之地有顯有晦也峨眉顯名天下與五嶽伍寺實遠離闤闠又得寶峯戒行精專不私所有者主之寺能丕興良有以焉不然彼佛氏為學者所在往往其寺廟又被海隅曾幾何能永迓恩寵重賁若是耶既謹述寺之始末如右復繫之以詩云蜀江之西大峨崇峙巖巖梵剎實宅其域創自隋唐興於有宋富有贍田助之者眾歷元乃廢今復興之其興伊誰自寶峯師維彼寶峯克振宗風緬懷教旨具載經中迺來懇求先皇時允璽書護持龍光煇煇聖人踐祚爰念先志錫之嘉號恩榮斯極而徒遭值厥慶無疆受斯慶只莫或敢忘而率而徒晨鐘夕鼓心心稱誦孰其予侮上祝國釐下祈民福河嶽效靈皇圖永固大峨山新建銅殿記明王毓宗翰林檢討今上在宥六合誕育蒸人嘉與斯世共臻極樂遣沙門福登齎聖母所頒龍藏至鷄足山登公既竣事還禮峨眉鐵瓦殿猛風倏作棟宇若撼因自念塵世功德土石木鐵若非勝若非劣外飾炫燿內體弗堅有摧剝相未表殊利惟金三品銅為重寶瞻彼玉毫敞以金地中坐大士天人瞻仰眷屬圍繞樓閣臺觀水樹花鳥七寶嚴飾罔不具足不越咫尺便見西方以此功德迴施一切眾生從現在身盡未來際皆得親近供養一切諸佛菩薩共證無上菩提既歷十年所願力有加瀋王殿下文雅如河間樂善如東平以四方多事痌𤸄有恤久之聞登公是願乃捐數千金拮据經始為國祝釐會大司馬王公節鎮來蜀念蜀當兵侵之後謂宜灑以法潤洗滌陰氛乃與稅監丘公各捐資以助其經費已中使銜命奉宣慈旨賜尚方金錢葺置焚修常住若干命方僧端潔者主之庀工於萬曆壬寅春成於癸卯秋還報王命額其寺曰永明華藏寺遐邇之人來遊來瞻歎未曾有登公謁於九峯山中俾為之記惟我如來弘開度門法華會中廣施方便檀相甍雲徧周沙界竹林布地上等色天所以使人見像起信而為功德之母萬善所由生也法界有情種種顛倒執妄為真隨因感果墮入諸趣當知空為本性性中本空真常不滅六塵緣影互相磨盪如金在鎔鑪冶煎灼非金之性舍彼鎔金求金之性了不可得十方剎土皆吾法身一切種智或淨或染有情無情皆吾法性大覺聖人起哀憐心廣說三乘惟寂智用渾之為一然非因像生信因信生悟欲求解脫若濟河無筏無有是處故密義內熏莊嚴外度爰闢廟塔以為瞻禮馨潔香花以為供養財法並施以破貪執皆以使人革妄歸真了達本性而已登公號妙峯力修梵行智用高爽法中之龍象山西蒲州萬固寺僧也讚曰世尊大慈父利益於眾生功德所建立種種諸方便後代踵遐軌嚴飾日益勝如來說法相皆是虛妄作云何大蘭若福徧一切處微塵剎土中塵塵皆是佛眾生正昏迷深夜行大澤覿面不見佛冥冥罔所覩忽遇紅日輪赫赫出東方三千與大千萬象俱悉照亦如陽春至百卉盡發生本自含萌芽因法而溉潤亦如母憶子形神兩相通瞻彼慈憫相酌我甘露乳唯知佛願弘聖凡盡融攝熒熒白毫相出現光明山帝網日繽紛寶珠仍絢爛欄楯互周遮扃戶各洞啓天龍諸金剛擁護於後先既非圖繪力亦非土木功於一彈指間樓閣聳霄漢星斗為珠絡日月成戶牖即過阿僧劫此殿常不毀願我大地人稽首咸歸依一覽心目了見殿因見性若加精進力了無能見者佛法難度量讚歎亦成妄諸妙樓觀間各有無量光各備普賢行慎勿作輕棄我今稽首禮紀此銅殿碑佛佛為證盟同歸智淨海萬曆三十一年癸卯九月峨眉山金殿記明傅光宅四川提學聊城余讀華嚴經佛授記震旦國中有大道場者三一代州之五臺一明州之補怛一即嘉州峨眉也五臺則文殊師利補怛則觀世音峨眉則普賢願王是三大士各與其眷屬千億菩薩常住道場度生弘法乃普賢者佛之長子峨眉者山之領袖山起脈自崐崙度蔥嶺而來也結為峨眉而後分為五嶽故此山西望靈鷲若相拱揖授受師弟父子三相儼然文殊以智入非願無以要其終觀音以悲運非願無以底其成若三子承乾而普賢當震位蜀且於此方為坤維峨眉若地軸矣故菩薩住無所住依山以示相行者修無所修依山以歸心十方朝禮者無論緇白無閒遠邇入山而瞻相好覩瑞光者無不回塵勞而思至道其冥心入理捨愛棲真者或見白象行空垂手摩頂直遊願海度彼岸住妙莊嚴域又何可量何可思議哉顧其山高峻上出層霄鄰日月磨剛風殿閣之瓦以銅鐵為之尚欲飛去榱桷棟梁每為動搖宅辛丑春暮登禮焉見積雪峯頭寒冰澗底夜宿絕頂若聞海濤震撼宮殿飛行虛空中夢驚歎曰是安得以黃金為殿乎太和真武之神經所稱毗沙門天王者以金為殿久矣而況菩薩乎居無何妙峯登公自晉入蜀攜瀋王所施數千金來謀於制府濟南王公委官易銅於酆都石柱等處內樞丘公復捐資助之始於壬寅之春成於癸卯之秋殿高二丈五尺廣一丈四尺四寸深一丈三尺五寸上為重簷雕甍環以繡櫺瑣窗中坐大士傍繞萬佛門枋空處雕畫雲棧劍閣之險及入山道路逶迤曲折之狀滲以真金巍峨晃漾照耀天地建立之日雲霞燦爛山吐寶光澗壑峯巒恍成一色若兜羅緜菩薩隱現身滿虛空嗚呼異哉依眾生心成菩薩道依普賢行證如來身非無為非有為非無相非有相大士非一萬佛非眾毗盧遮那如來坐大蓮華千葉之上葉葉各有三千大千一一世界各有一佛說法則佛佛各有普賢為長子亦復毗盧遮那如來由此願力成就普賢大願即出生諸佛賓主無礙先後互融十方三世直下全空亦不妨歷有十方三世華嚴理法界事法界理事無礙法界事事無礙法界此一殿之相足以盡攝之矣大矣哉師之用心也豈徒一錢一米作福緣一拜一念為信種哉師山西臨汾人受業蒲之萬固後住蘆芽梵剎興浮圖起住上谷建大橋數十丈茲殿成而又南之補怛北之五臺皆同此莊嚴無倦怠心無滿足心功成拂衣而去無係吝心是或普賢之分身乘願輪而來者耶宅敬信師已久而於此悟大道之無外願海之無窮也歡喜感歎而為之頌曰峨眉秀拔號大光明有萬菩薩住止經行普賢大士為佛長子十願度生無終無始金殿陵空日月倒影萬佛圍繞莊嚴相好帝網珠光重重明了西連靈鷲東望補怛五臺北拱鐘磬相和是一即三是三即一分合縱橫彰顯三密示比丘相現宰官身長者居士國王大臣同駕願輪同遊性海旋嵐長吹此殿不改壽同賢聖六牙香象徧歷恆沙威音非遙龍華已近虛空不銷我願無盡峨山修改盤路記明傅光宅峨眉之山四方緇白朝禮者無虛日乃其盤道曲折險峭登陟艱難雖大士神力善士之信力往返上下頓忘其苦而攀援喘息汗溢氣竭有望山而懼半途而止者又有聞而心駭欲行而不果者至於縉紳士夫不能徒步肩輿拽扶為難尤倍布帛米鹽來自檀施負戴顧值浮於本價居山者一衣一食豈能易得則路之當修治改移也審矣顧工劇而費廣誰其任之有覺巖居士者登此山遂發弘願歲在壬寅遇制府司馬王公司禮太監丘公皆乘夙願莊嚴此山始攜資鳩工徧幽深窮高遠而得其捷徑寬衍處修治之起自伏虎寺而至涼風橋解脫坡次至華嚴寺前建坊表之至五十三步次至中峯寺前再建坊表之三望坡建涼亭為憩息所次至白水寺繞弓背山後上頂重修虎渡橋次至黑水寺至麻子壩蕨坪建公館上至雷洞坪合舊路至八十四盤至大歡喜蓋自峨眉縣城至絕頂俱無險峻艱難之苦厥功偉矣夫修險為彝改難從易使步者乘者肩荷背負者咸獲便利使遠者近者居山而上下往來者咸讚歎歡喜使捐一錢施一食移一石伐一木持畚鍤而效力者咸增冥福而消積業使禪者講者誦習者精戒律而苦行者咸於此山發大誓願成大因緣功德又何可量哉惟居士視人之苦猶己之苦故能以己之願合眾之願普賢大士十願尤以恆順眾生為第一路之修恆順之一事也易謂人心之險險於山川夫山川之險人心為之耳持地菩薩但平心地則大地自平故迷則以易成險覺則以險為易居士乃能依大光明山開眾生覺路豈比夫尋常有為功德而已雖然無為者以有為為基有為者以無為為至是不可限也亦不可泯也余登山於未修路之前當春雪未消時身歷其險且難者故於居士功成樂為之記居士姓王名禮由中貴人受戒於達觀尊者道名法經時莊嚴金殿則妙峯師重修白水寺則有台泉師居士皆從之聞法要緣會信非偶云是役也工始於萬曆三十年壬寅秋竣於癸卯冬助緣善信皆勒名碑陰續蓮社序明范文光內江大學道人當以參悟為極則第無始來業緣已深習氣難化念起念滅未易翦除故壽禪師著宗鏡錄百卷深入理奧而首以念佛為事此淨土修持三根普被是出世之捷徑也余在南曹已存心向往與山中諸上人約為蓮社計久矣今登峨頂而殿宇頹廢佛事寥落大不稱願王勝地而聞達大師乃欲續舉淨土社事乞余一言引之余甚喜其發心第事以時遷緣可義起今當為學人酌行之夫入道必須資糧今約入社者凡社中所費或多或少油鹽米豆盡一歲止次歲照約入社中人去來增減各從其便但使山中佛號不斷即是蓮池淨業長存而其地則因寒暑之宜夏在峯頂餘時則在山下堂中而六時之課達觀老人改為四時蓋欲休暇身心以益精進此皆規之可從者故併及之住山說范文光經世出世其事兩不相謀而古之人常兼而行之如張子房李鄴侯經世又復出世陸法和姚廣孝出世又復經世余恆慕其為人而才不及古人竊有志焉中年為南曹尚書郎遂乞身歸蜀得聞達大師欲結茅勝峯之下作終老計而寇亂我蜀大義乃迫奮臂以起裒集義旅以逐逆徒蓋不惟草茅俱憤即山中諸僧亦爭執金剛杵以抗賊聞公亦周旋其間常以慧眼觀其勢而使我大眾三年以來事得少息公有歇心焉復合向巉巖之下結跏趺坐畢此僧臘為余道其事然昔日之余可同公而今余則未能也公且往先於孤峯絕頂處以一莖草始其事而其傍留一蒲團地以待道人錦江公所謂現天大將軍身而為說法者公可以意逆之經世出世皆男子事三世諸佛不過一血性男子錦江公當亦有忻然者矣峨眉山伏虎寺碑記清江皋四川督學龍眠周峨眉山寺以百數由山麓而登則自伏虎始寺踞山之口虎溪環注沿溪一徑折而入山谷盤紆後一山橫枕雄峙高出寺背蹲伏如虎寺因以得名或曰山昔多虎宋僧士性於寺左溪上建尊勝幢壓之虎患遂息寺名其徵也寺創自宋明末毀於兵可聞禪師隨其師貫之禪師來結茅居之漸圖興復垂四十餘年規模始備其建造亦云勞矣先是寺基逼山趾庳隘不稱殿宇僧寮盡委荊棘可禪師鑿山數丈拓其基建大殿一區表山冠林翼以岑樓複閣因地勢高下曲折深邃隨所扳躋人遊其上如置身縹緲萬壑千峯遙相拱揖又闢寺左為藏經閣募僧走江南出瞿塘三峽單舸往返萬餘里得藏經置其上又為長廊廣廡栖十方雲水單寮丈室齋廚浴堂清淨莊嚴為茲山所未有真大歡喜休歇地也然師之所以殫力於斯者有三義焉一曰天啓與緣二曰人弘其願三曰地致其靈非此三者之相需而應則四十餘年之經營規畫豈易觀厥成哉事之興廢各有其機卒然相值若或使之非人力所與則因師之自致也峨眉梵剎之盛經千餘年陵谷變遷蕩為灰燼獨此栴檀片址猶然薙草開林法雲垂蔭從棘榛荒翳中望如兜率天宮自此拈花聚石大振獅音莫不由莖草以倡之此因緣響應豈非天哉世傳普賢願王以三千眷屬示現茲山直欲徧大千世界遊願海超彼岸白毫光中瀰漫普照其願力勇猛固如是也當師之一念堅忍不怵於利害亦既有成揆其所願不盡峨眉之祇林精舍同歸清淨化城不止且山川靈氣因時而發鎮雄峯奠坤維其靈奇清寂多為仙真禪逸之所鍾近則精靈亦稍閒矣於此有人焉栖身巖壑其精神氣魄日與山林相符合安知非英華所結藉斯人以洩其奇哉不然以渺焉杖笠之身際兵戈震蕩之會雖坐冰崖囓霜雪誰為拓給園林鷲嶺耶固知非緣不立非願不成非靈不效也予感茲三者因寺之成而重念師之勞也為之銘瞻彼峨眉乃號佛窟祇樹叢生香滿山谷伏虎始登千峯在抱雙谿潺潺塵迹如掃劫火憑陵琳宮寂滅金粟再來津梁重設發願王心具勇猛力莖草插地香雲變色樓閣陵虛鐘磬振響夕露朝霞盤旋沃蕩爰栖雲水十方雲集龍象威儀蕭然杖笠瑞相光明普徧銀海香象行塵慈容儼在因緣自天應時則合維山萃靈注茲老衲方石淥池實崇相教磨巖不刊過谿長嘯重建峨眉峯頂臥雲庵接待十方禪院記清哈點兵部侍郎海內山之多莫若蜀即山之奇亦莫若蜀千巖萬崿虎踞虯連其為謝屐之所難窮郭經之所未載者指不勝屈要其聳秀特起礙日干霄巍巍屹屹俯羣巒而兒孫之則惟峨眉為坤維具瞻云夫峨眉之名何昉乎考之輿圖記曰兩峯對峙宛若蛾眉或又曰脈自岷山而來至此穹窿突峻其勢峨峨然也二者之說未知孰是然皆取象形之義亦如水之似巴名巴峽之類巫號巫云爾無足深論大約其體勢敻者則神靈必尊其奧窔深者則呵護必遠豈徒仙梵之窟宅實為神皋之重鎮不可得而褻也今上御極十有一年特遣一等侍衛吳公祭告如禮兼命繪圖以進藏之內府不時上備睿覽猗歟重哉余曩者專督陝右時側聞峨眉之勝為域中第一奇觀心竊嚮往久之然地非所轄禮不越境則亦付諸少文之臥閱名山青蓮之夢遊天姥已耳庚申冬峨山伏虎寺藏經樓碑記清傅作楫四川巡道三韓峨眉山麓有剎曰伏虎蓋以山形得名也余雅慕其名勝適癸亥年有採木之役偕撫軍藩臬諸公於倥偬中入寺一遊未遑流覽也至甲子夏又奉檄履繪川西南一帶輿圖叱馭峨眉在所必登及攀躡巉巖舍籃輿而徒步者十之七至峯頂則見大地山河一望收之言旋途復經伏虎寺可聞禪師遲余憩蘭若時維宿雨初晴苔青石澀著屐徐登山門內外徘徊久之陟殿謁普賢大士歷禪堂造方丈觀其殿宇莊嚴自在岑樓遠眺蒼翠紛來飄飄然不啻置身兜率天也師謂余曰此先師貫之和尚所創修而山衲竭蹶以終乃事開堂會講有年矣皆諸檀越之德今寺中所缺惟全經一藏已使徒與峨之金陵購取會至則如願矣遂飽伊蒲臥禪榻翌晨始就道洎事竣歸署拜家慈太淑人前詢遊狀余舉以此因命余曰吾有素願汝知之乎蓋從兵戈搶攘而默有所期許也于焉卜期辦香供往叩願王至則見殿之西偏有若經營始基者知為謀構藏經樓也家慈即命捐俸以玉其成值與峨自金陵負經至矣樓工已竣即以貯之噫寺此樓何異石室金櫃也哉余因之有感云重修光相寺碑記清張德地四川巡撫三韓余性嗜山水嘗覽西蜀峨眉紀謂伯仲崐崙為震旦第一山是以李白詩云蜀國多仙山峨眉邈難匹每一遐想不禁神往坤維憾不能扶筇一探峯頂煙雲之勝也迨今上甲辰歲余奉命撫蜀凡境內名山大川應舉祀典以昭聖天子格百神而及河嶽之意或可藉此以慰夙好但稽考往牒峨之孤據西南也髳盧暱處歷代以來祀典鮮聞雖古今仰止者多而登躋或寡蓋以峨眉高標巀嶭似於山為逸不欲供人耳目近玩若紅塵俗吏吾知其岸然不屑也況封疆肩鉅奚暇遂觀之願逾年餘適有嘉陽閱城之役峨眉處在道左始獲一登眺焉數十年寤寐之思一旦得識面目胸次為之豁然乃攀援奇險徧歷名勝真宇內大觀至鳥道中珠林錯置凡仙掌瓊峯到處營建不下數十百所皆題雕越繪禪棲清潔山雖幽危而不荒寞竊歎化工點染之妙及陟峯頂光相寺高出雲表四維絕巘俯視大千渺如蟻蛭懸巖萬丈彩毫五色是即普賢大士現身法界放玉毫光布兜羅緜之福地也無何而荏苒屢遷寖至傾圮楹桷支離欄柵朽腐予為悵然久之夫峨眉以名勝甲天下匪直巑岏矗起輪尻磅礡培垤太華已也若乃雷霖初霽蕩滌清虛俛仰之間毫髮無隱西瞻靈鷲插天遙對如相拱揖空濛沕杳光怪陸離遂成銀色世界如此神異柰何苾芻僧惟丈室是營而遊人過客亦惟以飯僧莊嚴作果此光明希有之淨域任其頹覆何異子姓蕃昌忍令父祖落寞衫履麗楚岸幘不冠本末倒植源流罔顧莫此為甚余爰捐俸金若干及諸有司相率而助者共若干委峨眉邑令李莊年及縣尉彭昌德督工修葺之閱三月告成重修正殿三楹立門二重各顏匾聯復增禪室以居守僧外置臺欄數十武新建一坊以標覩佛臺之故蹟但見日映璇題雲封雪嶺人天胥有攸賴瞻拜得所皈依此一役也將以彰聖人之德所以格百神而及喬嶽彼峨山者豈能終逸於遐荒異域負沈鬱詭異之概寞處蠻髳而不與諸嶽協供乃職也哉眾請余言以垂不朽余愧不敏爰書所見以記其勝云重修萬年寺碑記清張德地今上龍飛四葉歲在乙巳九秋余因閱嘉陽城垣之役適望峨山處在道左遂一登眺所歷諸剎名勝不一多由新構獨光相萬年二寺一為普賢大士現光之所一為中道止宿前代敕建梵宮實峨山首善之地柰何傾圮有年卒無修葺者無殊乎養一指而失肩背耳余遂捐俸及諸有司共襄約八百餘兩半給光相寺委峨眉尉彭昌德董之半給萬年寺委洪雅尉陳國斌董之閱數月告成光相寺已書數言誌之矣茲萬年寺僧亦以記事請余因而有感焉海內名山如五嶽視三公主以五帝蓋以其吐納雲雨施德廣大有功於民也峨眉山或為仙域或為佛都敷雲渙雨不在五嶽下予獨怪登覽者徒摭其林壑陰森岡巒屼邃以藻繪遊圃而梵剎成毀漠不關情山靈有知亦應所不許況萬年寺適處峨眉之中上而插天奇峻歷八十四盤閱七十二洞登天門石太子坪謁銅錫諸殿由此拾級實為瞻禮階梯下而亂山屏簇兩峯相對黑白二水纏綿如帶豬肝洞牛心寺於此分途又為風氣所團聚是以創自唐慧通禪師至宋勅賜白水普賢寺明萬曆又改為聖壽萬年寺原建有藏經閣旋螺甎殿堅緻絕倫巍峨壯麗甲於天下內有銅鑄普賢騎象像一尊高二丈其前為毗盧殿適當闔寺之主實為普賢下院安可任其頹廢而不修葺耶況普賢大士以法王子守護如來教現身於此以密引世人入光明藏海證菩提覺性其功德關係甚大兹山屹然鎮巨蠏坤維文章滋味之府又為歷代勅建非等閒淫祠者比顧名思義將以祝聖壽於無疆奠磐石於永固豈同怡情山水藻繪紀遊者為哉遂以是為記峨眉山萬年寺真武閣碑記清朱國柱峨眉知縣聞之古君子權輿造化盪移陰陽諸凡耳目所界興廢因之而補燮存焉邇者黃岡梧陽劉公奉命來按西川百廢具舉事竣乃以便道躋峨則癸酉秋日躔矣人謂普賢示現事屬虛渺而余謂不然蓋動念事佛事神如在感應之理誠有不可揜者況峨眉為坤維重鎮插空萬仞拔萃羣峯吐納烟雲蔽虧寒暑所謂銀色世界七重洞天者非盡悠謬使非有神靈呵護法力維持其何以至此憶當戡定之會戎馬生郊烽烟四望老稚殲於干戈村廬化為灰燼有目所不忍觀者而峨山附近何獨保全者尚多乎即以余論方督飛輓于崎嶇鳥道間勍敵在前羽檄嚴迫袵金革而習鉦鼓不遑朝食矣儌惠聲靈功成肆靖得侍太君膝下而尸饔無缺子舍承歡安知非冥冥默佑得有今日哉況吾太淑人天性仁慈喜施樂捐其為願王所篤祐又可知矣閣成請記于予因略敍其事勒之石庶此閣徑永垂無斁也歟海會堂八十八祖真像總讚王僧芥達法非今古傳燈無後先不會如來意安得祖師禪諸祖像貌盡棱棱看來都是無心人法界本無人共我性海誰論妄與真水中月鏡中華認得分明也大差開口驀然成隔礙揚眉早已涉周遮這般關棙子大地無人識除非伶俐漢動著有得失古人振衣千仞岡懸巖撒手獨承當可憐漫覓西來旨不知當下已亡羊過去現在未來迹大火燄中安不得箇箇能操殺活機婆心時露真消息咄玄路絕行蹤翻飛不在翼幻士跨泥牛空手荷鋤立任爾想像百千般到此多應描不出鐵羅漢頌並序宋黃庭堅峨眉山之下蟆頤津之淵有百煉剛鑄成二怖魔開士人物表儀隨世尺度其中空洞不留一物扣之鏗然應大應小香塗刀割受供不二沈之水則著底投之火則熾然水火事息二老相視而笑涪翁曰世人稱鐵人石心吾不信也二老者真鐵石耳乃為之頌曰人言怖魔像非金亦非鐵若作世金鐵開士亦不現禪坐應念往一鉢千家供順佛遺勅故不宣示神通有為中無為火聚開蓮華無為中有為甘露破諸熱魔子自怖畏我無怖畏想或欲壞鎔之為己富貴梯賴世主慈觀虎兕失爪角或得遇佛書文字不能讀罪垢若消滅字義皆炳然卻來觀六經全是顛倒想今世青雲士慎莫疑此解息心所頌明熊過翰林富順我聞普賢菩薩於大光明山坐蓮華藏白象之座普照十方為說以後於閻浮提界有一居士現宰官身了一切法即與善緣與其同學而入此山見諸辟支無學居於一室其室方丈有一長者善為說法息心居士稽首而說偈云善哉諸眾生皆涉有為法菩薩入三昧遮那之願力身相如虛空不涉善惡念是名息心所菩薩方便力憫念於眾生無住而生心遂有種種法流浪生死際唯願諸處者遠離一切覺餘者皆非是峨眉大佛寺落成頌並序明李長春禮部尚書蓋聞震旦國中有道場三曰峨眉曰五臺曰普陀鼎立宇內為人天津梁顧五臺普陀距神州甚邇人士趾錯肩摩朝禮殆無虛日獨峨眉在西南徼非乘軺建旄者與單瓢隻履之衲不能一涉其巔故人望之宛在虛無縹渺間視中土遼邈逖矣邇歲皇上奉聖母慈聖宣文明肅貞壽端獻皇太后命凡宇內名山奧區並頒布大藏以闡揚教典峨眉獨蒙賜金命鑄千手大悲觀世音像特繕殿閣以覆之功德最為鴻鉅於是令尹魏世軫囑比丘真法法主鳩工庀材選地於邑之東關外甫逾年而範冶精好結構雄麗煌煌哉三峨之麓逾益增嚴助勝矣蜀以近西域故佛化漸摩歆嚮恆切茲覩聖人作為咸思檄蔀啓迷刮垢澄濁以無墮障礙沈淪之習而以觀世音力冥扶默相上之斂福宸極綿壽慈闈下之錫祐蒸黎垂庥方域即大千未為多萬劫未為永矣臣忝禮官欣聞茲事乃拜手稽首而作頌曰我聞大士與佛齊肩退處菩薩自貶位權以大悲故發弘誓願閻浮眾生普度億萬事理無礙機相盡融耳觀非哲目聽非聰由音有聞由聞有覺聞實無聞覺實無覺兩目兩臂散為大千心無思慮隨感應焉言觀世人心為形役涉境迷真顛倒思索雖一手目猶桎梏存況乃千變攫攘何煩惟是圓通了無滯累如谷受響如鏡懸視慈悲靈感沙界畢周若光明山尤號神丘於皇聖后為萬姓母坤德攸載乾祚斯久爰乘願力廣度生靈經函法像徧施四溟繄茲峨眉獨沾渥澤範金為容結宇為宅苾芻踴躍龍象懽呼楊枝初拂立現珊瑚稽首大悲願佑我后如月常明如山常壽慶澤誕毓天子萬年熙熙化日蕩蕩皥天乃溉餘波微塵國土聿登春臺共樂寧宇天壤有盡功德無垠敢用作頌永戴皇仁萬曆三十三年乙巳仲冬海會堂募置飯僧田偈明曹學佺四川廉使大峨山萬年寺碑文予友聊城傅伯俊作也序述此經費煩鉅聖恩優渥出內帑金錢無算時惟中貴人料理勿及子民而其時當事地方善於奉行得以告成功者則實仗大司禮丘公少司馬王公之力也寺外有海會堂一區以處僧眾有常住田畝以資供養庶乎居者行者皆獲給足斯知森然備矣予壬子歲與比丘惟淨坐夏具詢之乃知堂眾日增田疇尚闕蓋丘王二公向欲完滿此緣機猶有待予亟合掌讚歎宣揚是役之不容已也竊不自揣度捐資百金使惟淨藉手而乞二公欣然樂成之且令予友伯俊發為至論因述以偈云大方廣佛華嚴經普賢菩薩為上首正覺世間器世間有情世間皆聚會三世一切諸如來國土莊嚴劫次第如是皆於佛身現佛身毛孔發智光其光處處演妙音說法利益無邊際口門放光何因緣普賢長子佛所說普賢品說平等因如來所說平等果往昔無量劫海中願常供養一切佛隨願所行得圓滿桃李先花後果成普慧雲興二百問普賢瓶瀉二千醻凡說一法一切法理事圓融法門中善財童子菩提心五十三參差別盡文殊囑令見普賢法解已圓須行證普賢十願等虛空禮敬諸佛及回向十方三世微塵剎一一微塵皆佛所及有菩薩摩訶薩重重海會而圍繞我以普賢行願力現諸上妙為供養華鬘音樂衣蓋雲塗香末香燒香聚一一燈炷須彌山一一燈油大海水以如是等最勝具皆悉如法而供養虛空眾生煩惱盡我此供養無有盡十願之中功德海一皆綸貫悉無餘所有與我同行者願持諸佛微妙法光顯一切菩提行世間所有眾福業一切皆是佛光照海會堂中福田利所有功德亦如是予今施助一供養悉使修行至於果一法門中無量門無量千劫如是說我以無量音聲海普願功德皆圓滿第八仙隱流寓舊志特闢神仙一門似覺以神仙為高貴其實修仙者不過存想固形多延歲月即真得仙者雖能昇騰變化究是識神作用並非斷惑證真之了生死法但其看空世事浮雲富貴襟懷高尚樂我天真與唯取自適不計其他之隱士同足以鍼砭世俗囂競之風故合志之為仙隱流寓列仙傳周陸通者楚狂接輿也好養生食櫜盧木實及蕪菁子遊諸名山住蜀峨眉山土人世世見之歷數百年也費士戣歌鳳臺記云按皇甫謐高士傳葛洪神仙傳宋劉孝標世說注皆以接輿避楚王聘夫妻入蜀隱於峨眉不知所終也青神志云漢光武時有史通平者自會稽來蜀詣峨眉謁天皇真人得授三一之法及五行之訣廬於縣之北平山頂煉大丹龍虎成形餌之白日昇舉列仙傳丁次卿欲還峨眉山語主人丁氏云當相為作漆以甖十枚盛水覆口從次唾之百日乃發皆成漆也寰宇記瞿君字鵲子後漢犍為人入峨眉山四十年得仙乘白龍還家於平岡治白日昇上神仙傳許碏自稱高陽人周遊五嶽名山洞府到處於石巖峭壁人不及所題云許碏自峨眉山尋偃月子到此紫陽真人姓周諱義山字季通汝陰人也漢丞相勃之七世孫登峨眉山入空洞金府遇甯先生授大丹隱書八稟十訣退登岷山遇陰先生授九赤班符又退鶴鳴山遇陽安君授金液丹經九鼎神丹圖左慈字元放號烏角先生隱峨眉山後遊鄴下曹操出郊慈齎酒一升脯一斤親手斟酌眾官皆醉飽操怪行視諸壚悉亡其酒操怒欲因座上殺之慈卻入壁中或見於市慈眇一目操令人捕之便見市中眇一目者無數後又遁羣羊中旋殺旋活終不能害神仙傳宿山圖隴西人採藥於峨之隴寧山服之仙去陳芳慶漢季好道隱東武山後入峨眉不知所終即子昂始祖得墨子五行祕書通白虎七變法唐天后朝大旱有勅選洛陽德行僧徒數千百人於天宮寺誦大雲經以祈雨澤有二人在眾中鬚眉皓白僧曇林遣人謂曰罷後可過某院既至問其從來曰予伊洛二龍也林曰誦經求雨二聖知乎答曰焉得不知然雨者須天符乃能致之居常何敢自施林固求之二老曰有修道人以章疏達天某始可效力林乃入啓則天發使嵩陽宣孫思邈入內殿飛章其夕大雨思邈亦不自明退詣經筵問曰吾修心五十年不為天知何也因請林代問二老答曰非利濟生人豈得昇天於是思邈歸青城山撰千金方三十卷既成白日昇舉酉陽雜俎唐明皇幸蜀夢孫思邈乞武都雄黃乃命中使齎雄黃十斤送於峨眉頂上中使上山未半見一人幅巾披褐鬚髻皓白一童青衣丸髻夾侍立屏風側以手指大磐石曰可致藥於此上有表錄上皇帝中使視石上朱書百餘字遂錄之隨寫隨滅寫畢石上無復字矣須臾白風漫起忽然不見宋成都府有僧誦法華經有功雖王均李順兩亂於蜀亦不遇害一日忽見山僕曰先生來晨請師誦經在藥市奉迎至則已在引入溪嶺數里煙翠見一跨溪山閣乃其居也僕曰先生請師誦經老病起遲若至寶塔品乞見報師報之先生果出野服藜杖兩眉垂肩默揖焚香側聽而入齋則藤盤竹箸秫飯杞菊不調鹽酪美若甘露飯訖下襯一鍰僕曰先生寄語遠來不及攀送僕即送行僧於中途問曰先生何姓曰姓孫何名僕即於僧掌書思邈二字僧嗟駭僕忽不見凡尋三日竟迷路蹤歸視襯金乃金錢一百由茲一饍身輕無疾至宋天禧中一百五十歲長遊都市後隱不見一說係王蜀時大慈寺僧事並錄俟考王蜀時有僧居成都大慈寺恆誦法華經嘗入青城大面山採藥沿溪越險忽然雲霧四起不知所往少頃見一翁揖之敍寒暄翁曰莊主人欲屈君一往可否僧曰甚願少頃雲散見一宅宇陰森既近翁曰且先報莊主人僧入門覩事皆非凡調問曰還齋否曰未遂焚香請念所業此僧朗聲誦經翁令誦徹部所饋齋饌皆大慈寺前食物齋畢青衣負竹器以香草薦之乃施錢五貫為師市胡餅之費翁合掌送出問人或云孫思邈先生此僧到寺已經月餘矣其錢將入寺則黃金貨泉也王主聞之收金錢別給錢五百貫其僧散施之後嘉州羅目縣復有人遇孫山人賃驢不償直訴縣乞追攝縣令驚怪出錢代償其人居山下及出縣路見思邈先生取錢二百以授之曰吾原伺汝於此何遽怪乎牟羅漢眉山人名安以廂兵隸倅廳如岷山陟上清坡苦饑忽遇髯者顧笑曰汝饑何不食柏子耶摘柏子投其口顧髯者不復見矣遂不火食亦往往通老莊偶一日江水暴漲舟不可行或戲指其笠曰乘此渡可乎牟遂置笠水面趺坐其上截江以濟觀者異之宋陳摶號希夷普州人初隱華山藝祖即位召對後遠遁峨眉自號峨眉真人今大峨石福壽二大字乃出其筆感遇傳宋文才眉州人少時與鄉里數人遊峨眉山上及絕頂偶遺其所齎巾履步求之去伴稍遠見一老人引之徐行皆廣陌平原奇花珍木數百步乃到一宮闕玉砌瓊堂雲樓霞館非世人所覩老人引登萼臺顧望羣峯棋列於地有道士弈棋青童採藥清渠瀨石靈鶴翔空文才驚駭問老人此何處答曰名山小洞有三十六天此峨眉洞天真仙所居第二十三天也揖坐之際有人連呼文才名老人曰同侶相求未可久住他年復來可耳命侍童引至門外與同侶相見迴顧失仙宮所在同侶云相失已半月矣每日來求今日乃得相見文才具述所遇眾異之漢竇誼居蜀峨眉山放浪不羈月夜子規啼竹誼曰竹裂吾可歸矣其夕竹裂遂遁去武帝三徵不起譙秀南充人周之孫隱居高尚李雄徵之不應逃入峨眉山中唐仲子陵峨眉人讀書大峨石通后蒼大小戴禮以文義自怡家惟圖書及酒數斛而已唐胡份不知何許人嘗隱廬山李騰弓旌之逃入峨眉隱九老洞宋杜鵬舉崇慶人喜遊嘗奉親挈家徧訪名山愛峨眉之勝因家焉宋梁鼎字凝正華陽人入峨山著隱書三卷明巖下老人不知姓名宣德間自廬山往峨眉各巖下每一二宿輒遷他所有時微吟以指畫空人咸以巖下老人呼之明韓懋號飛霞道人博極羣書善歌詩遊京師大學士楊公禮重之聞於武宗召見與語大悅時逆瑾有異謀懋為醫藥保御頗有力賜建飛霞宮後乞還峨眉今錦江滸有竹窩乃嘉定安彭諸公以居懋者
