body:
  text: 第十動植物產分十一子目鳥獸花木果竹茶菜藥草附珍異峨眉為西蜀最大之山又為普賢菩薩聖道場地所蘊者深故所發者必勝所積者厚故所流者自光其間動物植物何可勝數凡來山者須得此山一草一木若飛若走皆具普賢智慧德相之眼庶可觸境明心聞聲悟道直下知歸不致當面錯過也故志物產鳥佛現鳥山頂光相寺有二隻絕不見其生育大如雀形似土畫眉佛將放光則鳴云佛現佛現見人不驚每向人手取食山頂餘鳥俱不能到唯此二鳥常報佛現蓋菩薩變化所作發人信心之靈禽也萬年寺以下則羽族俱備矣角鷄大於雉頭有二毛角好鬭或云即鶡黃連鷄五彩俱備類錦鷄而色更爛然腳黃色產黃連處有之王母狀如燕色紺翠尾多而長飛則尾開如兩旗杜詩王母晝下雲旗翻雨道士亦鳥名鳴則天雨連點七山溪有之或曰即鶺鴒有僧問洪杲如何是連點七師云屈指數不及地上無蹤迹護花鳥益州方物略云青城峨眉間往往有之至春則啼其音若云無偷花果髣髴人言宋子京方物略贊曰茜首黑裳黃駁其羽厥鳴嚶嚶若禁若護名而不情盜者猶懼桐花鳳邑志弓背山桐梓坡所產按朝野僉載彭蜀間有此鳥如指大五色備具其冠似鳳食桐花每花放即來花落不知所之巖鷹頭似貓有翼兩耳極大身長二尺一名催生晝昏夜明喜食貓血鳴則人家有喪聞者惡之亦鵂鶹梟鵩之類增山雀觜距俱紅章備五色其聲宛轉悠揚可愛唯冬月有之竹鷄黃䳺鷄獸貔貅自木皮殿以上林間有之形類犬黃質白章龐贅遲鈍見人不驚羣犬常侮之聲訇訇似念陀佛陀佛能援樹食杉松顛並實夜臥高籬下古老傳名皮裘紀游者易以貔貅此獸卻不猛兩存以備考虎豹年年有迹於峯頂不見其形猨麞熊𪊍巖驢山牛巖兔似鼠無尾毫豬禮鼠似鼯毛色深黑馴擾親人投以果實則前兩足捧之立啖若拱揖閒入廚中捕食花桫欏花生峨眉山上數葩合房春開葉在表花在中根不可移故人不得為玩宋子京方物略贊曰聚葩共房葉附花外根不可徙見偉茲世木蓮華生峨眉山谷狀似芙蓉香亦類之一云葉似辛彝木幹花夏開枝條茂蔚不為園圃所蒔贊曰葩秀木顛狀若芙蕖不實而榮馥馥其敷按酉陽雜俎及老學庵所載忠州溪澗及臨邛白鶴山寺俱有之白樂天云木蓮樹生巴峽山谷間巴民亦呼黃心樹大者高五尺涉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色豔膩皆同獨房蘂有異四月初始開自開迨謝僅二十日邛僧云蘂坼時有聲如破竹白樂天詩如折芙蓉栽旱地似拋芍藥挂高枝雲埋水隔無人見唯有南賓太守知又畫圖寄元微之云花房膩似紅蓮朵豔色鮮如紫牡丹唯有詩人解親愛丹青寫出與君看宋周濂溪先生巴嶽觀木蓮詩有云枝懸縞帶垂金彈瓣落蒼苔墜玉杯此又似是白花明王鳳洲載異物志牡丹芍藥草牡丹薔薇紫荊蜀葵木樨花百合杞菊即枸杞蕙萱菊蘭西番菊金錢菊木芙蓉花開如椀大樹高二丈餘鵝毛玉鳳花蓬如釵股秋開不蘤而鬚狀似禽錦帶花長蔓柔纖花葉閒側如藻帶然花開形似飛鳥亦號鬢邊嬌范石湖詩妍紅棠棣妝弱綠薔薇枝北風一再來飄飄隨舞衣吳下嫵芳檻峽中滿荒陂佳人墮空谷皎皎白駒詩錦被堆花即薔薇唐裴說詩一架長條萬朵春嫩紅深綠小巢勻只因根下千年土曾葬西川織錦人范成大詩誰把柔條夾砌栽壓枝萬朵一時開為君也著詩收拾題作西樓錦被堆珍珠蘭俗名魚子蘭海梅高僅三尺冬月開花如小桃花結實如櫻桃月月紅石竹子花竹葉花野蓮華一云野棉外紫內白狀如五臺少林金蓮華杜鵑花山頂最多三四月開良薑花香如梔子秋間徧地有之扁竹花海棠自萬年寺至山下沿山巖壑到處有之名野海棠葉較人家所種者稍大花亦澹紅色頭皆下垂有似深山隱士避人不欲露其形影者按益部方物略海棠有數種又時小異惟其盛者重苑疊蘂可喜無定種也始濃稍淺爛若錦障北方枝強花瘠殊不可玩故以蜀產為天下奇豔云嘉定志云海棠紫錦色者佳餘皆棠棃耳又云海棠樹以棃接之其木堅而多節外白中赤實如櫻桃此皆木本海棠非所尚也余所愛者山中自生草花除前人詠木海棠詩不錄外附錄唐薛能詩一首酷烈復離披元功莫我知青苔浮落處暮柳閒開時帶醉遊人狎連陰被叟移晨前清露溼晏後惡風吹香少傳何許妍多畫半眉鳥疏連水脈庭綻粒松枝偶汎因沈硯閒飄顧亂棋繞山生玉壘和郡徧坤維負賞慙休歇豪吟分失機明年愁不見畱此贈巴兒木枏有二種一真枏作柱棟梁二閏枏止堪供爨具耳梧桐桐油樹白蠟樹椿冬青樟柏檜似柏有刺葉短而動螫人杉有數種油杉鐵杉拋杉層子杉白花槿樹黃楊椶樹見東坡送長老詩敍云椶筍狀如魚剖之得魚子味如苦筍而加甘芳蜀人以饌佛僧甚貴之今以餉殊長老詩云贈君木魚三百尾中有鵝黃子魚子夜叉剖癭欲分甘籜龍藏頭敢言美願隨蔬果得自用勿使山林空老死問君何事木魚烹只為形同無識耳嘉樹在羅目縣東南三十里陽山江溉兩樹對植圍各三二尺上引橫枝亙二丈相援連理陰庇百夫其名曰黃葛號嘉樹蘇子由詩予生雖江陽未省到嘉樹即此野漆樹八九月生子葉如榧樹珠圓玉立霜華掩映朗潤可愛丁樹夏日開花初放白將萎紅羅漢松結實頗肖又名塔松狀似杉而葉圓細生峯頂佛頂青其樹葉碧翠異常生金頂者尤具光彩竹柏生山上葉繁長而似竹修直其幹大抵類柏而亭直贊曰葉與竹類緻理如柏形狀得名亭亭修直萬年松其莖最小藏書帙中經年得水復活果橙橘香櫞指柑香木瓜蜜羅柑桃出綏山者佳今雙飛橋清音閣小而味美梅石橊海棃栗枇杷榛似栗而小葡萄銀杏柿竹龍竹根有二角高節實中可為杖遊山者多採之千歲竹生山南絕壁間盛以竹籃培以砂石懸之檐前即暢茂夏三月開花壅以土則枯死月竹每月一生又名普賢竹對青竹產峨山黃魯直有賦紫竹三年始變紫色荊竹冷竹刺竹桃竹皮滑而黃可為簟席及拄杖今山中又有桫欏樹作筆筒更古樸可愛李太白醻宇文少府贈桃竹書筒詩桃竹書筒綺繡文良工巧妙稱絕羣靈心圓映三江月彩質疊成五色雲中藏寶訣峨眉去千里提攜長憶君杜子美亦有桃竹杖贈章畱後詩慈竹即子母竹性叢產根不外引其密間不容笴筍生夏秋閱歲枝葉乃茂蜀中此竹最多云是岷峨分來元微之詩云慈竹不外長密比青瑤莎予攢有森束玉立無蹉跎纖粉妍膩質細瓊交翠柯亭亭霄漢立靄靄雨露多冰碧寒夜聳簫韶風晝羅煙含朧朧影月泛纖纖波鸞鳳一已顧燕雀永不過幽姿媚庭實浩氣爽天河峻節高轉露貞筠寒更和託身仙壇上靈物神所呵時與天籟合日聞陽春歌應憐孤生者摧折成病疴有賦見藝文茶文選注峨山多藥草茶尤好異於天下今黑水寺後絕頂產一種茶味佳而色二年白一年綠閒出有常不知地氣所鍾何以互更明初賜有茶園在白水寺植茶萬本為雲水常住之用萬曆末為僧鬻去至康熙初年乃以金千兩贖還常住有碑記其事茶為蜀中常產蒙嶺在名山霧中在大邑俱擅古今名品世又謂峨眉味初甘終苦不減江南春採又華陽國志眉州洪雅昌闔丹稜茶用蒙頂製餅法片甲蟬翼味苦而甘白樂天云茶中故舊是蒙山文潞公詩云舊譜最稱蒙頂味露芽雲液勝醍醐菜普賢菜羅漢菜葉似豆苗東風菜生山谷間一名斷續藤行人渴則取汁飲之龍巔菜似椿樹頭有刺白芥菜滿山自生在九老洞尤佳綠菜黃山谷有贊苦菜即龍葵三月生六月花從葉出莖直花紫八月實黑而落其根復生陵冬不枯甜菜岸邊菜嬾菜即黃連顛蕨菜瑯嬛記云猨啼之處蕨乃多有每一聲遽生萬莖此物根可為粉為餅飥苗可為蔬李太白詩不知行徑下初拳幾枝蕨東坡送蜀僧去塵詩拄杖挂經須倍道故鄉春蕨已闌干黃山谷亦有蕨芽初長小兒拳之句真珠菜生水石上翠縷纖條首如真珠可蔬醯煑可攜千里虀菜開白花春時廣有高力士詩兩京作斤賣五溪無人採花葉夏雖殊氣味終不改馬蘭菜葉似三漆而小花開似小菊澹紫色春時嫩葉曝乾可代旨蓄巢菜葉似槐而小子如小豆夏時種以糞其田苗可作蔬入羹即薇菜也氣味似豌豆蜀人巢元修愛之故名巢菜東坡贈詩云彼美君家菜鋪田綠茸茸豆莢圓且小槐芽細而豐公在黃州日為元修寄巢菜感賦也以上諸菜峨眉山頂徧地有之歲在戊子己丑蜀避亂山頂僧眾絕糧徧採山中草根樹苔食者有團土為丸嚥取延命者獨不知採蕨法余修志時凡山頂有南方野菜可救饑者皆為入之若論諸菜中蕨味濃氣厚少食不饑住山人尤當以此為返魂續命耳此外山中尚有薯蕷南星石苔石花菌蕈木耳可食木耳皮厚似羊肚石迥勝他處山頂在處有之其餘過萬年寺以下薑芋瓜豆稻麥黍蕎始可種蒔稍上地寒種多不生山頂止可種菜山峯石廣土少不能多種也芋有青紫白真連禪野六種唯野不可食連禪即赤鸇最佳一名蠻芋古記云大饑不饑為有蹲鴟漢卓氏致富以此藥石瓜生峨眉山樹端挺葉肥滑如冬青椹似桑花色淺黃實長橢殼解而子始現以其形似瓜故名煑為液治痺紫荷車藥名范石湖有詩云綠英吐弱綫翠葉抱修莖矗如青旄節草中立亭亭根有卻老藥鱗皴友松苓長生不暇學聊冀病身輕黃精峨山產者甚佳韋應物詩靈物出西川服食採其根九蒸換凡骨經著上世言云云是也又宿進游峨詩寂寥山寺停輿處豁落風花到手時亂石窟中翻素雪碧雲堆裏臥青猊巖龕鳥拜珠瓔佛碑閣苔箋冰柱詩拾得黃精須爛煑飯儂明日上峨眉何首烏南星山中歲饑掘得連蒸三晝宵可以為糧天門冬蒼朮王不畱行威靈仙山藥龍膽草益母草茱萸夏枯草煎水盥面不皺白荳蔻黃連三七五加皮蒼耳梔子常山茵陳金毛狗芍藥馬蹄香升麻川烏紫菀沙參吳茱萸獨活半夏桔梗草烏青木香草普賢綫樹上苔鬚蔓引而成長數尺或言深谷有尋丈者煎湯服治心氣疼痛有效方物略曰仙人縚即此物贊曰附陽而生垂若文絛大槩苔類土石所交余觀峨眉山是樹俱生綠苔又有緌綞翿綴垂至數尺者其樹亦根蟠石上藤蘿窅絡不辨木石又有一樹兩葉異命同生者總之山靈變釀不可方物如此壁竇草葉如螢光或隱或現赫日不掩金星草葉似萱背有點雙行相偶黃澤似金星故又曰金釧草可治疽創及丹石毒喉生乳鵝搗水飲之瑞草長生草山陰蕨地多有之修莖茸葉色似柏檜而澤經冬不凋故曰長生碧雲草似孔雀尾山中石上多有之附珍異不可常有故名珍異本草經嘉州峨眉山出菩薩石形六棱銳首色瑩白明徹若泰山狼牙上饒水晶之類日隙照之有五色如佛頂圓光俗謂菩薩光明所感即今所謂放光石也在峨眉山後百餘里外始產此石彝人拾之鬻與山僧以備遊客之覓峨山中無此石也蜀郡草堂閒話雷威斲琴多在峨眉無為霧中三山又益部談資世傳雷威斲琴不必皆桐遇大風雪之日酣飲著蓑笠獨往峨眉深松中聽其聲連延悠揚者伐之斲以為琴有愛重名以松雪嘉祐雜志峨眉雪蛆治內熱陸游云亦產茂州雪山嶺谷中雪時得之能蠕動雪消蛆亦消益部談資云雪蛆產岷峨深澗形如蝟而無刺肥白長六寸腹中唯水能伸縮取食須在旦夕否則化矣范子計然曰空青出於巴郡本草空青生益州山谷久服輕身能化銅鉛作金又云蜀名山縣有銅處空青出其陽青者銅之精也又云空青生越嶲山有銅處銅精熏則生空青其腹中空梁江淹空青賦曰夫赤瓊以照燎為光碧石以葳蕤為色咸見珍於東國並被貴於西極况空青之麗寶挺山海之不測於是寫雲圖氣學靈狀仙寶波麗水華峯豔山陽谷之樹崦嵫之泉西海之草炎州之煙曲帳畫屏素女綵扇錦色雰鬱綺質蔓延點拂濃薄如隱如現山水萬象丹青四變咸百鑑而可珍亦千金而不賤故淹作扇上彩畫賦有空青出峨眉之岨雌黃出嶓冢之陰今無所見矣第十一蔣編志餘志餘一篇係蔣虎臣輯全志之外所錄之文事寬泛而理確鑿勵法屬而警愚頑如蓮池法照數段洵長夜之慧炬苦海之慈航嚴武代巡等之狂悖饑饉刀兵等之慘悽皆足以警醒癡迷啓牖良善誠為不可缺者悉備存之閒有考據失當評論欠圓之處特為刪削俾成完璧又將舊志不便列于各門者數段附之于後註明起訖兩不相參以期閱者不復致疑故志志餘蜀山岷嶓蔡蒙為最大古今聞人洽士考覈最詳然究竟不知何山為峨眉也古云北山皆嶓南山皆蒙峨眉當為冢首然考禹貢蔡註蒙在蜀郡青衣縣蔡在雅州嚴道縣二山上合下開沫水出焉則冢另是一山非峨眉所為不肖曾聞之先君子云川西皆岷岷北流為洮入黃河南流入川為大江此知岷峨總是一山只橫障西南二處為異耳今江水果隨岷峨至嘉眉直下中間如嶲州之大渡沫水夾江之青衣犍為之漢水無不湊集至嘉定為一都聚合之禹貢岷山導江一語地勢愜合不應又牽引冢山作首尾也總志載峨眉在威州至西五里廣輿記載峨眉山在眉州城南來自岷山延袤三百里至此突起二峯如蛾眉然又曹公楷遊鎣華山記云此山連峨岷嶺為兩戒山河之首足知二山相連即一山也古云天下名山太華險絕峨眉神奇又云望遠則峨眉登高則太華此二山余皆親躡其頂嶔崎塊異無從優劣但華山窮日之力尚可至頂峨眉非兩日不能至則論高又當推峨眉耳唯是峨眉山凡遇懸巖峭壁處俱有木棧鋪墊躡之而行兩傍樹木周遮密如欄楯又山多陰雨白霧瀰漫人過險處俱坐不知只重嶺傑驛層見疊出雖有壯夫賈勇亦嗟力竭華山四圍無路險處俱就山壁上懸鐵繩下引遊人挽之而上往往繩斷即壓殺百數人繩傍雖微鑿孔窞僅容半足緩急何濟於事昔人稱直行如上壁橫行如騎牆良不虛也余遊二山妄斷二語云峨眉高而不險華山險而不高同行一友又增二語云峨眉比華山高而加遠華山比峨眉險而加峭亦確論也古今名勝之地仙佛住現傳至數世亦有互相消息不可測臆者如五嶽俱天真道場近來唯華山無僧寺其餘四嶽亦駸駸乎解珪剝墄矣峨山自黃帝問道天皇真人時未有佛祖與分席也今則琳宮梵剎布滿巖壑至問羽流乃無一人宋皇坪軒轅觀全成虛莽唯純陽一殿為明代巡衡陽赫公所建載有碑記欲為天皇存餼羊之意然今住持仍是緇流中塐彌勒願王等像純陽特一寓公耳竊意聖賢隨時度世或為仙或為釋原無定迹今日禪道盛行諸天仙眾必是棄捨本法趨向真如如彌遮之事提多商那之嗣迦葉一音闡化接物利生皆不可知也蓮池大師竹窗隨筆云遊五臺者曰文殊在遊峨眉者曰普賢在遊普陀者曰觀世音在獨不曰西方極樂世界有彌陀在乎又不曰三大士者徒仰嘉名阿彌陀佛現在說法親炙休光之為愈乎跋涉三山累年月而後到信心念佛一彈指而往生失此不為大可歎也考淨土資糧稱有人修西方淨土者臨命終時見二大士隨彌陀接引則誠心頂禮願王西方亦決可至大師言此特為虛頭衲子假借朝山為名奔走乞食者作鍼砭耳又云或謂五臺峨眉普陀三山劫火不壞遊者能免三災此譌也三災起時大千俱壞何有於三山若必遊此免災則瞽目跛足不能登歷者縱修殊勝功德終成墮落而居近三山者即愚夫皆成解脫耶當知無貪乃不受水災無瞋乃不受火災無癡乃不受風災三山之到何與願念念開文殊智行普賢行廓觀音悲則時時朝禮三山親近大士不達此旨而遠遊是務就令登七金渡香水何益按大師此語凡在峨眉遊居者皆當日誦一徧以當聾鉦瞶鼓至三災之說遠不能料以目前論獻逆流毒西川所在屠戮人類幾絕峨眉一山賴菩薩慈力護持四眾安般如臥袵席雖謂之三災不壞可也又云先德示眾云汝等出家未曾立腳得定忽已過三四十年吾聞此語真懇痛切心戰毛豎乃有都將青春壯色勤勤作有為事業或奔南走北言我參禮名山或裝塐修造曰我興崇三寶或聚眾起會曰我助揚法化此雖名色好事非同賞玩麴糵等比至其為空過一也一朝猛省前非已是龍鍾衰朽悔無及矣古云少年不努力老大徒傷悲嗚呼更有終身安然而不傷悲者按大師此語言言熱血審知朝山作福非修行第一要務然如今人假外勢以塞中道疊人我以隔聖途得法傳法總非戒定慧之由生施醫施藥悉同饕餮仯人之輩縱有達道者亦莫如之何也已不肖嘗聞古德云諸上善人若能持六度修萬行了了如一箇避塵之珠萬物不相滯礙然欲出一頭地先發一決了漢的心決了者諸惡莫作眾善奉行所以云順信佛語天神衛護倘或身寓法扉心運魔行必是六師之再來寄語明眼慎心防護欲修無上菩提者須從實地修行不致墮身業海猶為彼善於此也古偈云修慧不修福羅漢應供薄修福不修慧象身挂瓔珞凡事不可執著謂朝山接眾齋僧造佛為非功德固不可謂此等即是修行極則亦不可耳中峯大師有云一心為本萬行可以次之至哉言也世人競稱文殊在五臺普賢在峨眉此是俗見如今朝廷設官各分疆界各有職掌者然其實菩薩神化周徧法界何嘗以某處為我道場某處為彼道場耶蜀父老相傳宋時有僧禮五臺不覩文殊光相忽逢一老翁云菩薩出遊蜀矣今以旃陀羅身寄笮橋南乃其化現非有二文殊也僧因歸謁屠人石長者忽化文殊其刀化為如意飛出屋去蜀人異之因即所居為文殊院焉此文殊之在蜀也讀廬山東林及衡嶽志唐法照大師故事曾詣五臺親入竹林聖寺文殊普賢東西向坐此又普賢之在五臺也總之二大士志同道合如無著天親無時不相往來聚會又皆發願欲生極樂國土故彌陀所至同來接引所謂娑婆良弼安養親臣耳法照大師大曆三年止雲峯寺慈忍戒定為時所宗嘗於僧堂食鉢中睹五色雲中有梵剎當東北有山澗石門復有一寺金書其題曰大聖竹林寺他日復於鉢中見雲中數寺池臺樓觀萬菩薩眾雜處其中師以所見訪問知識有嘉延曇暉二僧曰神聖變化不可情測若論山川面勢乃五臺耳師遂與同志遠詣五臺見寺南有光貫日師緣光而至徘徊四顧一如鉢中所見東北行五十里有山山有澗澗北石門傍二青衣一稱善財一稱難陀引師入門北行見金門樓觀金榜題曰大聖竹林寺方圓可二十里皆有金地寶塔華臺玉樹入講堂見文殊在西普賢在東踞獅子座為眾說法菩薩萬數共相圍繞師於二菩薩前作禮問曰末代凡夫未審修何法門文殊告曰諸修行門無如念佛阿彌陀佛願力難思汝當繫念決取往生時二大士同舒金臂以摩其頂與之記曰汝以念佛力故畢竟證無上覺文殊復曰汝可往詣諸菩薩院巡禮承教師歷請教授至七寶園復回至大聖前作禮辭退向二青衣送至門外師復作禮舉頭俱失所在後與五十僧往金剛窟即無著見大聖處忽睹眾寶宮殿文殊普賢及萬菩薩佛陀波利師方作禮舉首即失夜於華嚴院見寺東巖壑有五枝燈師曰欲分百燈既而如願復曰願分千燈數亦如是光徧山谷又前詣金剛窟夜半見佛陀波利引之入寺謂之曰汝華臺已生後三年華開矣汝見竹林諸寺何不使羣生共見之師因命匠刻石為圖於見處建竹林寺既畢謂眾曰吾事畢矣數日別眾坐逝推波利之言果三年矣當大曆七年也師於并州行五會教化人念佛代宗於長安宮中嘗聞東北方有念佛聲遣使尋之至太原果見師勸化之盛遂迎入禁中教宮人念佛亦及五會見柳子厚南嶽碑云峨眉多火災所以前人改華藏為黑水普賢為白水牛心為臥雲中峯為集雲華嚴為歸雲以為二水三雲可禳此戹明末代巡黃岡劉公梧陽又於萬年築真武祠壓之究竟祝融原未斂戢嘗竊私議山中寺宇上下俱鋪厚板又好作樓閣連椽接棟而上下止靠一梯往來香信禮佛好燒紙錢山高寒重暑月圍鑪自然易與祖龍作緣今不在此等處講求趨避之法多造祠廟及改題雲水何益於事海內名山不論遠近若欲遊歷須視宿世因緣不可勉強如王右軍生平欲遊峨眉誓墓之後猶云奉使關蜀無不從命可見心馳汶嶺如此其至然終不能遂此願也杜工部避地成都元白俱官巴蜀未得一登光相畱題碧落已為欠事至東坡家眉州去峨眉最近其至峨與否俱不可知唯白水寺有題絕句或少年曾一著遊屐耳觀其寄黎眉州云膠西高處望西川興在孤雲落照邊在湖州送人河滿子詞云見說峨眉悽愴還聞江漢澄清秋來但覺歸夢好西南自有長城公雖離蜀而垂老畱連殊有生入玉門之感三蘇唯老泉歸葬故山公兄弟俱隨地窀穸亦可哀也或傳公讀書嘉定州蘇稽寺在州西二十里地名尖山查寺乃唐蘇公頲遷謫於此非東坡也峨山坡公筆墨最少唯縣南龍門洞有石刻龍門二大字又云富春孫公雙鉤唐太白久居峨眉與丹丘因持盈法師善蘇公頲為益州長史薦之因入長安官翰林載魏顥李翰林集序其後往來齊魯吳越不能即歸觀其渡金門詩仍憐故鄉水萬里送行舟送人之羅浮詩汝去之羅浮余還憩峨眉又淮南臥病懷蜀中趙徵君蕤詩國門遙天外鄉路遠山隔朝憶相如臺夜夢子雲宅皆寓懷鄉之意不能終老故山客死采石命也唯范蜀公景仁六十致仕遨遊峨眉青城下巫峽出荊門凡期歲乃還真是高人奇遇也峨眉山覩佛臺往往有捨身者大約離三四年即有之前歲有喇嘛僧年五十餘沐浴齋戒一躍而下此去懸巖萬丈無從蹤迹其遺骼然亦有捨身不死者楚人年少至巖端坐不死垂絚救活事在辛亥夏余在天台石梁橋聞一老僧捨身死時頭目不損亦無血暈武當山昔有孝婦姑病發願捨身代姑至山攛身巖下如履平地後遇伊姑攜手同歸余與寺僧覶縷此事忽有同行一友云如我不然剛在山下已捨身久矣眾以為知言書以紀之然雖如是非至人之所為欲入般若之戶扃必投大覺之極地恐名捨身終成虛語不為佛聖之援猶恐墮落於枉死漂沈矣唯祈達人再思可也峨眉山頂遊人一到即患胸腹脹滿人云水泉為祟余謂不然聖泉龍池水極甘洌所苦者寺僧不暇遠汲止將大木桶或古鐵鍋注天雨水煑飯食人此水累月停積安得不病亦且山至絕頂嵐氣蒸人暑六烘衾亦有莫測如水一法當如華山峯頂鑿方石坎四處雨水引注坎中其味渾是醍醐沆瀣華山羽流壽多至百歲以外坐此故也再或不然山頂流泉頗多多為埝堰瀦蓄以資汲飲亦易事耳峨眉佛地遊山者自來不敢以葷酒溷香積近來閒有縉紳攜具登頂者幸而無恙便謂普賢大士境界毫無憎忌不知明末有代巡劉光沛登山川南道李一鼇與州守馮某特舁一豬至頂屠宰以供廚傳刀未下時庖人忽被雷風擊倒暈死竟日甦時問之云一大神身披鎧甲威勢無比大喝一聲未知所事想即韋馱金剛護法諸神也豬亦逸去諸人駭然虔誠悔過至夜雷聲暴發猶傾海嶽一眾懇苦籲禱方止自此無敢攜酒肉入山者審歷來有犯五逆者登陟不洗心者多至雷殛但既有心入山理宜小心謹慎不可以雷霆偶霽遂弛敬意也峨山老僧樹共知為晉遠公禪師弟慧持近閱嘉州志又云持遊峨山入定於州之道即徑山寺古樹中又萬曆某年陳畱取土掘出一缸中有定僧云即是持師出定余鄉常州奔牛鎮相傳宋高宗時亦有枯樹老僧入定故事三處未知孰是以生平好尚論持愛清淨不似今人鋪茵放鉢人前定帳貪圖利養則其在峨眉絕頂無疑或云圓寂在成都龍淵寺然至人應世神化不一妙在凡人莫測矣樵陽子者蜀灌縣青城山樵子也本大足縣人姓雲氏方誕有踞而募於其門者其母因以化緣呼之甫二歲父若母死安縣民陳和養為子十餘歲陳父母亦死化緣孱然託足青城山下童翁家童翁又貧無所得食則入山斫柴售灌縣人以活灌縣人持升米或盌許來市樵子柴盡一挑樵子不計也一日入山天大雨雪迷失道入山益深雪盈六七尺許所見唯高巖萬丈古木架陰壑飛鳥都絕忽一老人鬚眉皓白手執拂子招樵子坐頃之又一老人貌頎腹便便衣大袖紫衣亦來共坐如是累月並有所指授其語祕不傳已乃導樵子大樹下指而曰是中爾前身所託也坐樵子石上設十二拜禮恭甚號之曰樵陽子以故皆稱樵陽子云二老人既去樵子徘徊巖谷間隱隱聞隔巖彈琴聲或人聲及迹之無有也結跏趺坐樹下凡百數十日敗衣揜形頹然槁木采藥人遇而怪之不知佛耶仙耶因以語灌縣人灌縣人轉相語羣走物色識為童家兒是兒陷雪窖一年久矣曷不死寒餓死虎狼相與神其事聞灌縣令令景某駕至山中問狀所對班班應占記非童子口吻也自言吾前身在樹中令便使人斫樹樹轟若雷震者火發其腹劃然開現委蛻焉髮重覆領指爪繞身其貌相則樵陽子也令驚歎追尋蛻坐處掘得一石匣匣有卷卷有文字亦祕不傳有布衲有鐵冠縧樵陽子以自隨有劍劍柔繞指今失所在其時令下教製龕奉樹中蛻築庵居樵陽子於是名一時而傾動州郡士庶競來瞻謁能談人未來事又能已人疾來者愈益多樵陽子避而匿安縣之天池士庶則亦走天池趾相錯也其鄉縉紳以迨官長車蓋相望而獨石泉有令某憯墨吏也問外丹何居樵陽子笑謂令廉而仁是官人外丹也令疑誚己嗾某弁以妖人上變告臺司下成都張丞某逮治樵陽子朴野至則箕踞而誶丞大恚罵何物囚敢爾榜之繫囹圄三月獄成王觀察某特廉其非辜白艾中丞得解久之譚中丞來檄所司即向所築庵建大通觀迎還山厥後凡開府及鎮藩臬至者率召見樵陽子樵陽率一再往不拒也顧其意忽忽不自得會常郡參知吳公以捧表過家謀挾之江南樵陽子灑然從焉來則止常之永慶寺亦數過錫止龔方伯城南別業稍一遊武林西湖就而徵未來事若丐已疾者麋集初不甚應閒露一二語往往奇中在山專餌黃精出山乃火食食止蔬素終歲廢便若良有絕異者晚自名曰思道亦出山後事相傳其大父孔文進士也與內江趙文肅同榜友善父鳴春大足人為樵陽子言如此畱未一歲歸蜀贊曰昔東老云有僧定峨眉樹中七百年既出求復定去今青城樹中身託樵陽子是兩也張紫陽因折瓊花事推明陰陽性命之變以為必得金丹乃稱上乘余不解為二氏言幸獲樵陽子其人沖彝恬穆不界人我教人只於心地上領宗旨雖以通儒者言不謬嗟乎余不能極樵陽子所詣矣傳為孫伯潭先生作峨山有兩茂真尊者一是隋時人日遊神水夜宿呼應一是宋人號茂真禪師豫知舒王有誕仁宗之慶今中峯寺是其重修唯云與孫真人弈棋往來呼應庵者乃隋之茂真尊者也明太祖亦嘗遣僧至西域取經行至岷峨見普賢丈六金身乘白象現大圓光中語僧云西域遠甚汝安能至吾有真經一卷得此可復汝主遂手授一經僧拜謝歸見祖述此語祖以為欺己欲殺之開經則祖親書求經疏文宮中獨對佛前焚化者祖大悅厚賜此僧載金陵梵剎志中峯寺由明果大師除蟒始改道觀為寺今寺僧俱能言之但開縣志亦稱神仙山迎仙觀有異僧除蟒事唯不載果師名號耳世間奇事相同者固不止一二也峨山又有二孫思邈一是唐則天時人一是宋人與張乖崖善峨眉山無窮和尚從師通天一生苦行汲水肩糧忘身為眾遷化之後人皆知其託生嘉定為楊氏子名展字玉梁明季丁丑武進士毛洛鎮副總兵當甲申乙酉之時獻逆鴟張蹂躪蜀地展率義勇竭力抵敵賊鋒屢衄展收拾殘疆賑濟饑溺不論緇白戶給米麥牛種若干川南數郡賴以延喘後誤撫土寇袁武待以心腹反為所殺遠近惜之是年春入山禮大士忽作偈云四十九年別普賢今朝又到白雲巔非我有心辭佛去只緣身世涅槃間寺僧初不解其意未幾難作適符詩讖果是無窮再來當歡喜領受償還宿債不以孫龐餘耳為恨也峨眉有伏羲女媧等洞乍見疑之久思開闢聖人半起東北且上古無三教之分聖賢仙佛隨處示現接物度生理或有之如佛經稱伏羲為寶應聲菩薩女媧為寶吉祥菩薩須彌四域經辨正論又云太昊本應聲大士老子為迦葉仲尼即儒童菩薩顏回為淨光童子又道家真誥稱孔子為太極上真公治九嶷一云廣桑真君顏回為明晨侍郎後為三大司直一云與卜商俱修文郎聖賢分身教化神變無方故自不拘一時一地耳峨眉為軒轅問道處所謂天皇真人即廣成子又云即鬼容區近閱一書老子在上三皇時為玄中法師下三皇時為金闕帝君伏羲時為鬱華子神農時為九靈老子祝融時為廣壽子黃帝時為廣成子顓頊時為赤精子帝嚳時為綠圃子堯時為務成子舜時為尹壽子夏禹時為真行子殷湯時為錫則子文王時為文邑先生一云守藏史則廣成即老子也夫子不語怪然論語中得神仙二人其一為楚狂其託諷夫子語載莊子約百餘字固不止鳳兮鳳兮數語也附錄莊子鳳兮鳳兮何德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之世僅免刑焉福輕乎羽莫之知載禍重於地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行卻曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也其一為申棖即施存修長生之術壽百餘歲後人誤以申為施耳孔門弟子子夏百三十歲子思亦近百歲此又大德必壽不得以神仙例視之附考施存春秋時齊人孔子弟子自號婉盆子人稱胡浮先生師黃盧子得三皇內文遁變化景之道役御虎豹之術先居南嶽石廩峯每出則乘白豹時步還山豹即迎之或隱或顯後嘗在中嶽少室有云壺公者即其人也晉永康初乘白豹昇天宋徽宗重和元年賜號沖和見素真人舊志載鬼谷子嚴君平白玉蟾張三丰俱在峨眉曾見神仙真誥云鬼谷為太玄師治青城山嚴君平尚在峨眉然未著為何秩也考峨眉志亦無君平所住處三丰在明初與夔府開元寺僧廣海善臨別畱詩云深入浮屠斷世情奢摩他行恰相應天花隱隱呈微瑞風葉琅琅詠大乘密室晝閒雲作蓋虛亭夜靜月為燈魂銷影散無何有到此誰能見老僧畱草鞋一雙沈香三片而去後海獻與永樂以一玉環千佛袈裟答之蜀惠園為張像贊云南遊閩楚東略扶桑歷諸天之洞府參化人而翱翔長縧裋褐至於無邦吾不知其甲子但見毛髮蒼蒼知是久從赤松之徒類圯上之子房味此則三丰遊蜀無疑知來峨眉耳一云有扇硯竹杖畱巴嶽寺白集徧查無峨眉隻字傳記止云得道之後過江東憩龍虎山遊九公自洪都入浙被逮放還臨江躍入江中有人見於融州老君洞度桂嶺踰羅浮紹定己丑冬或傳真人解化於盱江逾年人又見於隴蜀莫知所終今峨眉縣南三十里有玉蟾灣緣巖躡磴上有玉蟾洞可容千人洞壁石色如雲母彷彿見肩背衣縧相傳為玉蟾尸解處峨眉縣志載葛洪為求丹砂乞為勾漏令入蜀取雄黃於武都山色如鷄冠喜曰吾丹成矣至洪雅之花谿居巖洞存神養無往返峨眉峯頂間考胡閣老譯峨籟及川南道張公所修峨眉新志並無葛名或因二峨有葛仙洞內江有大葛小葛真珉存焉遂並及之但不知舊志亦有葛姓氏否附錄備考宋峨眉令奉議郎王湘因觀太上感應篇焚香誓行數十事臨危更衣而臥男女環泣覺身在半空少頃有人曰王湘欲行太上感應篇真樂善者宜速放還已而遂甦出陰騭錄明弘治間山東翰林王公諱勅督學四川至峨眉縣羅目街知有異物掘地果得呂仙親書紫芝洞三字公之奇迹非止此也讀張公鶴鳴傳載公少有仙骨為諸生時偶見一地夜有燐火發之得石匣一函書二冊讀之通慧能知未來休咎御風出神如同僧扃門入山採杞僧歸公已在屋內為河南四川督學時諸生見鎖院窗廡各各有一公危坐監視一日較士忽見白雲一片起公遣騎追至雲落處得白石如雪細切爛煑以徧食諸生其甘如飴在輝縣山麓忽令人掘地得一大石玲瓏蒼翠今尚置之白泉山下又於道傍古垣開出紫石硯二枚各有鴛鴦一隻雌雄相向其家至今寶之又採杞僧臨終公問何欲僧曰欲富貴兼之公曰不能但堪作一藩王耳因批其背曰蜀王比王產第二子背上隱隱有公批筆公預知死期怛化時四城門皆見公羽衣鶴氅而去又深曉天文曲折王陽明先生極信服之唐西川節度使嚴武少時與京師一軍使女有私因竊以逃軍使奏聞乃醉其女子解琵琶絃殺之沈於河明日捕使至搜武船無迹乃已及武為節度時得疾甚忽有一道士至前云從峨山來欲謁武武異之及階呵叱若與人論難者道士曰適在階前冤死者見某披訴某初謂是山精木魅遂加呵責彼云被公枉殺已得請矣武叩頭請解道士乃令灑掃堂中徹去餘物焚香舁武於堂門內令清心具衫笏畱一小童侍側東偏閣內亦令灑掃垂簾道士坐於堂外含水噴噀又以柳枝蘸水灑地卻坐瞑目叩齒須臾閣中有一女子呼嗟而來曰吾訴於帝三十年今始得報期以明晚見取武與道士許以經功贖冤不得道士謝去明日武卒陽平謫仙不言姓氏初九隴人張守珪仙居山有茶園每歲召採茶人力百餘人男女傭工者雜處其中有一少年自言無親族賃為摘茶甚懃愿了慧守珪憐之以為義男又一女子年二十亦云無親族願為義男之妻孝義端恪守珪甚喜之一旦山水泛溢市井路隔鹽酪既闕守珪甚憂之新婦曰此可買耳取錢出門十數步置錢於樹下以杖叩樹得鹽酪而歸後或有所需但令叩樹取之無不得者其術夫亦能之因與鄰婦十數於堋口市相遇為買酒一盌與婦飲之皆大醉而盌中酒不減遠近傳說人皆異之守珪問其術受於何人少年曰我陽平洞中仙人耳因有小過謫於人間不久當去珪曰洞府大小與人間城闕相類否對曰二十四化各有一大洞或方千里五百里三百里其中皆有日月飛精謂之伏晨之根下照洞中與世間無異其中皆有仙王仙官卿相輔佐如世之職司有得道之人及積功遷神返生之士皆居其中以為民庶每年三元大節諸天各有上真下遊洞天以觀其所為善惡人世生死興廢水旱風雨預關於洞中焉龍神祠廟血食之司皆為洞府所統二十四化之外青城峨眉益登慈母繁陽嶓冢皆亦有洞不在十大洞天三十六小洞天之數洞中仙曹如人間郡縣聚落不可詳記旬日之間忽失其夫婦峨眉山高自萬年以上五穀不生即有瓜豆蕎麥等類多遭山獸竊食寺僧終夜干掫為難居常贍給止藉桐果茶葉易米為糧然茶苦不多桐果售遠亦難所以各寺閒有畜養孳生規圖蠅利昔緜州淨慧寺傍有池居人爭來捕魚為業寺僧慧寬勸云爾輩不當如此吾能令汝等所得不失於舊因指池畔菌蕈令人採販得利略與魚同今山頂茶筍蕨蕈無所不有若設法烘製轉售遠近亦可資生何為與俗人一例作屠伯為也峨眉自乙酉丙戌以來饑饉荐臻莖蔬粒米如同拱璧寺僧有尋山中野菜瀹煑延命者有團黃泥為丸囫圇嚥食者遷延無術十死八九今蒙國家蕩平之賜佛祖垂慈法筵重啓遠近香信往來既有施䞋之及僧家亦自出己力刀耕火種漸有生氣但屢經樂歲粒米狼藉少年僧雛飽食暖衣不知撙節余遊山頂見各寺廚下腐渣菜葉委棄滿地曾幾何時不思昔年饑荒之苦身同薜荔萬死一生今復暴殄如此恐菩薩雖慈仁加被決不肯再度此一種無記性人也據云豆渣菜葉畱之無用余將江南叢林製虀菜及藏渣之法示之附錄於後而火種刀耕傷生害物實宜免之各樣菜葉洗淨先將水煑滾後投菜下鍋一過即收起以瓦盆盛好入米湯水養之放置暖處或竈邊或鍋內釜板蓋好一宿成虀如菜少入竈內溫養之冬月菜多入大鑊內滾水一過收起養法如前候虀冷以大缸收之上用石壓可用至夏月不壞豆渣用熱鍋炒熟放桶內臭七日放時用手輕輕糝下務令虛鬆勿致築實待發過後以手揉捻成餅不拘大小擇晴天大日色內曬令極乾用綫穿懸風口臨食時入醬油或油鹽少許飯上蒸熟屢歲不壞一云罈收亦佳附雲棲大師腐渣歎水溺其體兮磨碎其骨拔其精華兮剩其滓質勞人力而成兮人復厭之而不食暴殄天物兮是誰之責不如炒作豆豉兮物不損而人益蜀郡草堂閒話載峨眉有松樹雷威取以製琴號為松雪今峨眉嘉樹鬱若鄧林唯松獨少聞乾谿溝高家林閒有數株寺僧珍重若三珠然余遊武當羣木參天亦不見有松樹唯金頂數株離立高不過一丈而輪囷離奇酷似獰龍老玃此為異耳書傳中載地方所出方物亦有不可盡信者如峨眉舊志云山出貔貅雪蛆放光石余詢寺僧皆云無之據舊志云貔貅不猛好誦佛號見人不驚今行人往來如織何無一遇之者雪蛆治痰火內熱今蜀人豈無肺渴如司馬相如者未見有賈人射利採此售人若放光石山中絕少寺僧每奉上臺檄取重價至蠻洞中購以應命聞什邡縣鎣華山及雅州招討司洞中實產此石官此地者不可不知此苦耳相傳瓦屋山出角端不肯傷人但食虎豹寺僧養之以資衛化恐亦峨眉貔貅之說耳江淹彩扇賦云峨眉出空青亦屬荒唐不可信為實事雪蛆放光石空青等前物產門云珍異亦已說明不常有蜀中饒硯材新繁有寫經臺石硯鞏州有西門塞硯邛州有蒲江石硯嘉州志云東坡遺硯在尖山蘇稽寺後為督學王公勅取去清賞錄亦云犍為人得楊子雲草玄硯如今製但無圭角耳黃山谷鏡硯銘云瀘川之桂林有石黟黑瀘人不能有而富義有之以為硯則宜筆而受墨唐安任君從𥳑有硯面為鏡而背三足形駭天下若山林不若而不得訪諸禹也松煤泛之若玄雲過魄月而竚也筆胥疏其上則月宮中之兔也握筆之指若蛙爬沙欲食物不能而又吐也公自註云任君宗易從𥳑寄烏石鏡硯及屏乞余銘余沒其屏歸其硯更求烏石為屏烏石視萬州之金巖中正砦之蠻谿兄弟中白眉也按峨眉即古犍為郡中正砦去縣止百十里峨眉出硯材無疑但今時無良工為之鑑別追琢耳聞近來虎谿龍門洞石俱細潤確可為硯人無知者山志脫稿後偶遇新安汪生光翰者乃上川南道胡公恆門客公死獻賊之難光翰棄家冒死藏匿孤孫避榮經山中事平控各憲給批送公孤孫峨生還楚省事載四川總志其人樸訥不識文墨而能行世間意料外事極可異也翰言酉戌之間親見蜀中官紳士女死難最多總志率多遺漏其言三僧誓死守戒尤為可敬事在順治甲午年姚黃至榮經擄僧數十婦女數千至蓮華寺褫衵服迫令行淫有不從者盡殺之內唯三僧誓不肯為三僧逸其名一云是峨山寺僧賊令眾僧勸之又驅諸婦女巧言引誘不從賊怒將三僧寸磔其眾僧婦女亦盡殺無遺又有雅州一婦亡其姓氏為袁武賊目楊某所擄罵賊不屈楊愛其姿美百計勸誘不從於州城十字街三天使者廟前裸辱之婦閉目低首披髮至地三日後賊臠斬之又開縉紳士民死難姓氏雙流縣令李公甲蒲圻人陞任建昌至黎州獻賊破省城公捐資起義陣亡馬踹如泥榮經縣令黃儒福建福州人城破被擒罵賊不屈剮於城中開善寺丁應選海棠堡指揮使首倡大義保守上南血戰兩年兵敗死時年七十五歲馬京馬亭黎州宣慰司土官倡義守城與賊相持兩年兵敗死楊之明碉門天全招討使司土官倡義討賊半載陣亡李華宇黎州富莊義士年八十倡義與賊戰雅州對岸兵敗死同胡公死難男女姓名夫人樊氏成氏馮氏子之驊妾周氏少僕京兒弩來義女二女俱死媳朱氏守節生一子名峨生現存即光翰所撫孤也同翰撫孤義士鍾之綬字楷士景陵伯敬先生猶子胡公邀同赴蜀遊峨山不歸至八月賊陷成都綬從瓦屋至榮經亂兵營中遇翰同撫胡氏孤兒凡八年始遊滇至昆陽死葬州城山下有碑紀其事以上蔣編原有以下另為附入附書畫聖積寺𥳑板為范蜀公書半天開佛閣平地見人家其寺樓舊有峨峯真境四大字乃宋魏鶴山書縣北二里飛來岡上家慶樓亦有魏書樓係唐懿宗敕建高九丈寬十二丈香枏木柱兩人手不能圍飾以金碧覆以瑠璃制度工巧比西華嶽門尤為壯麗樓上四壁皆唐人名畫一壁繪海棠一株花葉繁盛枝幹錯綜雜出明目者莫能理其端緒四圍畫飛蟲羽類最多人常見花叢中有小青鳥往來亦仙筆也樓下西壁有呂純陽題詩云教化先生特意來世人有眼不能開道童只接雲遊客不識終南呂秀才明弘治丁酉督學王公敕遊此以刀剜其數字俱透壁今餘字尚存觀者旁午魏公楷書遠近爭來摹勒嘉靖十二年樓燬扁存西坡寺壁有仙人畫蘆鳧按寺僧某與一道者相好有年偶風日和麗晨餐訖邀同遊漢嘉之烏尤山僧以八十餘里跋涉殊勞道者令閉目攜其左手俄聞水聲呼之張睫已在烏尤對岸矣取箬籜兩片泛水上令躡渡僧懼不敢承道者遂躡渡倏望其躋巔江雖隔數十里道者遙與僧話聲最邇少選復見其泛箬至仍攜之還西坡寺矣時方幾午僧始知其異乃跪叩之道者謂本欲度汝柰緣淺何汝欲富貴乎欲壽乎當副汝願僧曰得壽足矣富貴非所願也道者於領內出藥與之服遂曰余不可復畱矣幼嗜丹青當作二幅贈汝僧出紙撥墨少頃成蘆鳧各態妙有生趣囑以毋置水器畫下因別去後沙彌不戒盥面右壁畫底即扃戶出逮歸見數鳧就盤飲叱之輒向外飛去顧視壁畫止蘆存而鳧盡亡矣便異之不敢復置水器左壁下後督學王公勅至此寺見之即訝其左半邊有仙氣叩所遇僧告以故王遂攜左壁鳧畫並存蘆去此僧百歲乃終其孫徒親述其事井研胡閣老有詩紀之山頂普賢殿簡板為宋太宗書天皇真人論道之地楚狂接輿隱逸之鄉載在碑目又一板云崑崙伯仲地震旦第一山則劉公阜題也龍門洞龍門二字蘇子瞻筆一云富春孫公雙鉤羅目街紫芝洞三字呂純陽仙筆牛心寺唐畫羅漢見范至能紀嘉州志楚狂接輿像古繪於三峨館歌鳳臺中益州畫錄李昇山水之妙每含光素必有新奇所繪青城峨眉山圖好事者得之為箱篋珍大聖慈寺羅漢閣上有峨眉青城羅浮霧中四山圖四堵中和年間畫不記姓名黃居寀蜀人當淮南通好日命與父荃同時畫青城山峨眉山春山秋山各圖用答國信畫繼眉人程堂字公明常登峨眉山見菩薩竹有結花於節外枝者茸密如毬即寫於中峯乾明寺壁宛有生趣畫評蜀人高文進於相國寺後門裏東西二壁畫五臺峨眉文殊普賢變相宋太祖嘉其能官以待詔宋元祐四年峨眉禾異畝同穎又禾登一百五十二穗
