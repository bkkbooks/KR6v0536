body:
  text: 第九古今藝文附賦詩文具載道傳心承先啓後之據則文之所在即聖賢佛菩薩道之所在否則縱令詞義華美亦屬無益于身心世道之閒言語矣舊志藝文門備載遊山諸作今取其要者歸于外護等各門而擇其有關事實者數篇為此門賦與詩悉附焉然祇存十之三四以表聖境故志藝文譯峨籟自序明胡世安大學士井研歲閲己未甲子己卯峨遊者三所雜著彙成帙題曰譯峨籟蓋一家言也每思自有此山有前余游者有後余游者其有目擊不過陰晴之變態祠宇之廢興而斯山真面目不隨蓬海三淺高明廣大伯仲崑崙所從來矣人具手眼領略各殊即余三游且不能比而強同固知山靈富蘊資取日新茲秋季入夢者更超宿賞陳子實庵津津臥游至欲竭力筆墨不令山有逋美且囑余述所已經此何異逸少馳想余不憚覼縷顯概先之以范紀竊附於逸少今昔之感又博採茲山藝文及余舊近稿未入前録者復彙是帙集衆解以貌峨以庶幾一得以無負陳子津津臥游之志憶昔癸酉春陳明卿先輩過余叩峨眉之勝為述移時促膝竟聽不覺撫掌大叫曰奇哉真宇內大觀君贈我以峨眉我當酬君以雁宕亦述移時臨別仍訂各驅副墨子卿以助臥游竟未果今遂能副實庵之命筆墨因緣祕闡有候亦斯山之有以神詔與題曰譯峨籟續集續之靡窮不敢薄待後來更無一得者志竹變胡世安峨山竹品甚繁龍竹月竹千歲竹詳方物矣有所謂紫竹者生三年而色全墨竹色如點漆俱可充器具桃枝竹皮滑而黃可簟亦可書筒太白桃竹書筒綺繡文是也棕竹幹實有文理可杖濮竹節長孟竹以孟月苗萌鳳尾竹畫眉竹以形似簳小葉茸細娟媚筋竹堅韌鋒之以桐油淬煉可代矛用筍欲籜時可揉作弩弦箭竹一名石竹中實若老藤小者可矢大者仍可扶老凡此産各有所至若斑竹慈竹苦竹冷竹束竹淡竹白夾竹類處處有之以故峨筍富於他山僧人乾之餅之以供餉遺崇禎元年之春峨山上下周遭竹大小各種一時俱䈙求一菉菁者不可得至次年枯笴盤根漸就腐朽人競薪採幾盡入望寒沙蕪莽而已不復冀籜龍包絲直節返魂斯亦物理之有據者三年春斤斧未赦之區忽射地叢出自蜩腹蛇蚹至尋丈其興也勃焉雖園畝移藝不若是之迅以齊抑有冥司之不介而孚與其幽巖邃谷所存枯竿盡浮筠矣再越歲蓊林還昔觀僧復無怏怏餉遺之資噫黃楊厄閏豈亦此君陽九所罹不可逃之數耶徵所聞志竹變題喻廣文峨眉山志胡世安己卯之峨索山志舊著罕有存者有友人以喻廣文山志脫稿見示搜羅博而未精考核詳而不要去取臆而附會多前九卷得失參半猶可節取莫劣於山史一卷其言曰自有天地已有此山於普賢何與願以峨眉還峨眉普賢還普賢倏而陽排陰又詭其說謂佛教原空一切普賢亦不願人以此歸之辨駁多端不越斯旨夫峨眉既不以普賢顯亦何必黜普賢以顯峨耶今有第宅氏甲則甲氏乙則乙昔曰天真皇人吾與之為天真皇人今曰普賢吾亦與之為普賢而峨眉自在初未嘗易名曰普賢山也又何必坐普賢以獨據信其說遇匡廬茅山焦山類將作何攻擊耶至物産有昔無而今有或顯於前而蔑沒於後者何可勝紀如卞玉楚珩魯璠璵以及劉寄奴丁公藤虞美人草諸屬生植雖不識所始而名至今存未聞廣文有所糾正今於菩薩石普賢茶普賢竹普賢線之稱謂欲一手以障道路口何恕古而苛今乎善乎侍御馬訥齊如蛟有云記遊可也記峨眉不可也而況乎僅駁普賢以志峨然峨眉當文獻凋殘後有以鏡往昭來討論什一則廣文之用心勤而功亦未可盡泯矣書以貽見廣文胡江石同年他時晤喻廣文面訂之喻同郡內江人名志祥己卯孟秋既望日遊峨眉山記清丁文燦乙丑進士四大名山峨居其一其山高聳奇特曲折回環攀援而上約有百里餘沿途琳宮瓊觀絡繹不絶水從崖谷中千支百派而出澎湃汹濤如長虹如瀑布奇矯異常及至危巔峯巒疊翠扼要崢嶸令人目不暇賞東望則嘉陽陵雲二川溶溶形如長帶盤繞於山麓南則羅目馬湖諸山鬱鬱葱葱回環擁護西則雪山挺峙半插雲天嶙峋峻拔有迥乎其不可上之勢北則錦城翠屏若隱若現令人慨然想見諸葛武侯之忠義杜子少陵之氣節焉豈非宇宙間一大觀哉且一日之內俄而陰雲密布時而氣爽天清佛光偕紅日齊輝聖鐙與明星並曜風從地起聲吼如雷濛雨連朝寒巖幽谷即炎天酷暑亦凜栗不能久留豫聆前賢所傳疑信參半今身歷其境以所見印所聞洵不我欺也然吾因而感之夫峨山發脈崑崙其靈秀之氣鬱結磅礡誕生賢哲為王國楨者政不乏人而騷人逸士遊覽於茲覩此精英霞彩與夫百鳥之奇聲雜出煙雲之變化無窮其有裨於詠歌文章之妙者又不少矣他如仙侶高僧棲真洞府通玄徹奧白日飛升悟道參宗因成正覺稽古前代何時無之豈真有仙則名抑亦地靈人傑耳故其神化所洽廣敷遐邇上自王公大人下及愚夫愚婦皆不憚登山涉水敬禮願王即不肖之徒一詣靈臺舉平昔魑魅魍魎之狡習不知消歸於何有是峨山靈秀之氣因乎人之類而默啓之而人亦各得其轉圓之妙用以為身心之助山靈歟人心歟其理一而已矣人之登斯山者豈徒快遊觀而已哉乾隆戊子中秋朝峨眉山記清釋徹中諸作皆言遊唯此言朝遊則忽主而重賓朝則略境而尊德一字之間心志全彰功過自判欲培福慧者不可不注意焉此篇末後記伏虎寺現鐙三夜為最希有之事因備録之以為朝山者鑑大峨之勝甲天下余每泛舟平羌江上遙矚雲端咨嗟不克赴者草載乙丑春自成都昭覺寺發足專禮普賢至嘉陽舍舟即陸望峨而趨顧騷人墨客往來言遊四方緇素懷瓣香重繭遠進則言朝余為老衲言朝不言遊三月二日壬戌自嘉行出瞻峨門十五里渡雅江又十里許宿蘇稽東坡亭故為蘇頲讀書處即眉山始祖後人建東坡亭於上今廢有茅剎癸亥行四十里宿峨眉縣東郭大佛寺甲子過邑城經十方院望西坡寺至了鴇樓有銅鐘銅塔甚精工實名聖積寺昔禪僧寶公所建人呼為老寶樓因訛了鴇再進為會宗堂復二里關聖堂進抵伏虎寺山基於此樓閣四達殊壯麗憩乙丑丙寅二日故事登山者多倩籃輿約伴侶輿夫捷足上下迅速遇佳境目不再盼或欲尋幽則以險辭侶不同心行止齟齬多弗盡興余力不能倩輿亦不欲倩適乏侶僅偕一侍僧二傭人戴輕笠衣短褐策杖躡履而上緩急去留咸自由得以盡山之性情形體一木一石不輕失之三月七日丁卯自伏虎登陟初欲雨少頃霽過解脫橋上解脫坡或謂自山出者從此解脫險阻明曹能始先生曰余烏知乎入解脫出解脫耶余則過於斯解脫塵勞才得登山耳稍上為華嚴寺進為純陽殿過五十三步昔蜀獻王於此下車行因即所行步數名之俯瞰澗中有石如船名普賢船進為大峨石郭青螺先生大書靈陵太妙之天六字每字一碑左為神水出石穴中匯方池澄潔可愛陳希夷先生大書福壽二字呂洞賓真人大書大峨二字俱在石進數十武為歌鳳臺楚狂接輿故廬前數武道傍有石形類雞公進為中峯寺古明果道場滅妖蟒於此又傳黃帝於此問道廣成子進為方廣院俗呼龍神窟下數百武為雙飛橋兩虹並峙每橋各受一水急湍奔流溜入石渠數十丈聲震山谷至前會合有石狀如牛心砥柱中流因名牛心石近有豎碑更名洗心石者地極幽異此處分二道一上萬年寺造頂一循溪入洪椿坪余徘徊於兹欲先往洪椿坪遇一僧謂曰宜及晴明達頂覩佛光余然之遂上古德林林木皆楠別傳和尚手植以培風水如法華經字數每唱一字一禮拜始植一本誓勿翦伐老僧苦行如此明直指馬公如蛟賦詩於石曰鬱葱佳樹拂慈雲幻出槎丫避斧斤老衲得知山是佛令人同誦法華文過林為白龍洞剎亦新潔稍上即萬年寺寺之輔翼曰慈聖庵海會堂白衣殿其後殿曰雪螺結甎為之形如螺一名甎殿再後為新殿即古之白水寺此地稍寬衍諸剎若簇錦然余宿海會堂戊辰晨起睹佛牙炷香禮諸剎上觀心坡山路紆徐至萬年寺止山路陡峻自觀心坡始一名頂心坡謂登壁之狀足膝齊心也直上數千武才得隙地名息心所舊有庵今廢緣山脊而上如行馬鬣中寬者丈餘狹僅數尺左右皆峻坂賴竹樹蓊鬱蔽行者目得無畏行十里許為初殿一說乃鷟殿訛稱又二十里許為蓮華石有石如蓮剎即在左以鐵為瓦自此始復下數十武乃山脈斷續處始再上號鵓鴿鑽天蛇倒退其險可知此際踵無停步息無停喘傭者掖余如升天然上為洗象池相傳普賢浴象於此又數十武為上象石再數里許為木皮殿蓋以木為瓦云實名化城寺謂普賢於此設化城同大衆三千人居之余窮日之力抵是暝色亦至遂宿寒甚擁爐而坐夜分乃寐己巳上梅子坡積雪深數尺進為雷洞坪懸巖萬仞不可俯視相傳雷伏洞下聞人語輒震舊有鐵碑禁語今廢巖下傳有伏羲九老諸洞人迹罕至再進為接引殿遂上八十四盤俗呼三倒拐盤盡為太子坪回龍寺至此陡峻既訖紆徐達頂過沈香塔即敕賜護國草庵寺通天大師舊棲也閲老僧樹樹空昔僧入定其中進天門石巨石劈開如門深廣丈許至七天橋謂峨山為七重天故名至此值濃霧咫尺不見人物寺僧留住擁爐火距頂僅數百武寓此有二便清流引廚所飲水優於絶頂風不甚猛遂因其留而留之庚午大霧竟日至夜雪降辛未晨起玉山照人溼甚不能出戶有數僧持楞嚴相質為之解說是日晚霽壬申晴明上頂進香過天仙橋首詣光相寺禮普賢寺前為覩佛臺倚欄俯眺無際右為金殿殿以銅成高二丈五尺廣一丈四尺深一丈三尺重簷雕甍繡櫺鎖窗中坐大士傍繞萬佛滲以真金極人工之巧四隅列銅塔四座有銅碑紀事文字悉佳其碑可鑑鬚眉稍下數武為藏經樓前為銅瓦殿再前為錫瓦殿楞嚴閣臥雲庵並列於光相寺之後藏經樓之右峨頂如箕形東為懸巖絶壁西為斜坂光相寺臨巖而東面餘剎皆西面是日煙雲盡淨西望瓦屋曬經象嶺雪山諸峯如在几席實則相距或千里或數千里東望平疇渺茫山如垤川如白練或有雲覆處如人有物蓋足然自太子坪以上草木竹石與下界大異有桫欏花遍山谷紅白相雜地多細石極潔無蛇虺蚊蚋蟻蟲之屬稍有穢物雷電輒掃除之洵稱佛境自華嚴寺至頂蓋一百二十里云午餘有兜羅綿雲布滿巖前號銀色世界雲中隱隱現一圓相寺僧曰此名水光尚非正光仍歸宿七天橋癸酉晨飯後復由天門石沈香塔至學士堂謁通天塔蓋通天大師肉身存此趺坐塔內身皆貼金林中多靜室為住靜之僧所居左行二里許為淨土庵傍有白龍池源泉清淺沙彌攜銅盤盛水舉手於石下取置盤中云白龍子細視似蜥蜴是日各剎進香畢仍上光相寺人云佛光曾三現悵然而返甲戌天陰上光相寺默禱普賢祈三日內賜晴示光是日濃霧寒風謖謖遂於普賢座右禪定半晌少頃持筆楮向金殿側露坐録銅碑文忘寒忘霧乙亥望日大晴詣光相禮普賢倚欄立或邀茗飲余卻之必候覩光近午初現於巖石閃爍不定漸移虛空現兜羅綿雲上其圓似鏡紅紫緑白數層僧鳴鐘觀者雲集如堵惟見己影在光中舉手動身無不相映並立者彼此不見其影謂之攝身光光上有白虹謂之金橋僧屬賀謂有候至旬餘不遇光而去者蓋非有緣弗現云時沒時現自巳至未各作禮而退余旋七天橋沙彌報光現於此往視較覩佛臺之光大數倍中有小紅鏡外列五色七層金橋高布至酉始沒志稱張無盡至清涼山佛光隨之而現余何人斯獲此奇遇耶丙子下山宿海會堂丁丑憩雙飛橋戊寅上後牛心寺昔孫思邈修真於此下壑循溪行十