樹冀應熊成都太守樹以僧為心僧將樹作體樹且借僧生僧豈依樹死僧樹不相離生死若相倚久經春復秋飽歷風和雨千年面目存萬古靈光起不滅亦不生老僧自知止病中贈離指和尚明楊思聖四川布政病廢苦奄然來求避世方峨眉何處是為我散清涼險路巴山遠塵心旅夢長皈依如不棄瓶鉢任徜徉步題伏虎寺文峯回文韻清程仲愚西巖疊翠聳高峯谷邃回流墜葉紅題就白雲飛靉靆畫成鋪雪積虛空棲烏夜起猿聲遠落照晴留樹影重犀劈玉胎蟾挹潤溪澄蘸筆彩嵸巃感貫之和尚與虎臣太史同席於蘿峯作而致感程仲愚元亮何緣兩薦馨雲巖覺到資多情夜猿哀月猶三嘯曉磬鳴泉起九京鉢裏楊枝開次第庭前柏樹語分明靜然歇滅還支遁買得名山風日清登峨眉張注慶巡按萬疊憑虛上塵坌悉可捐穿雲睇白水側足倚青天幽咽泉聲遠陸離樹色鮮光明徹下界盡日坐危巔直入萬山去身心好棄捐亂峯疑拔地層閣只窺天松駁僧眉老夏寒石髮鮮願王無私照巖月自娟娟丁卯春覲旋泛錦江瞻眺峨眉張官紀敍州別駕棹籜飛來自錦官峨眉隱隱出雲端身經雪浪流光疾心嚮琳宮世網寬禹帝導江丹嶂豁願王說法彩霞盤塵勞可許歸蓮座化境神光飽一看夢登峨山作望峨吟張官紀欲乘五嶽最高岑偶到三峨意轉深名勝有緣天巧合風塵無礙佛同心桫欏燦爛空還色梵剎輝煌雪作琛若論聖凡真妙諦山靈應笑我知音天門石何永駿牧伍靈根分劈自崑崙並峙巖頭獅象蹲不是願王開覺路何由此處說天門解脫坡何永駿偶過山間尋勝蹟忽從坡上發深思縱饒解脫虛空外終是塵緣未了時蓮花社何永駿蓮嶽曾經詠削成如何僧社亦擅名祇因菡萏峯頭見泰華雖高不與爭石船子何永駿隱踞雲溪障紫瀾高呼船子渡溪難可知普濟當年行留得慈航待我看佛光清何式恆鳥語初來報雲綿幾度鋪佛從當面現光向半空盱色相何嫌有聲聞豈礙無臨皋徒復臥殘墨未能濡佛燈何式恆梵王棲息地向夜寶燈懸一點初疑葉紛熒竟似蓮辟支成古供勝蹟賴今傳冉冉靈巖下光明徹大千贈與峨上人金陵請藏回山房星著峨眉令萬里歸來道已東千函貝葉一帆風須知遊戲仍三昧方信靈修具六通飛錫疑從天上落曇花應向篋中窮西川自此聞真諦不憚時時謁志公出勝峯門道中望聖積伏虎諸剎樊星煒策蹇窮高廣衍中雲煙罨藹隱花宮好將一派符文水洗卻十年塵土胸伏虎流淙聲㶁㶁騎羊往蹟事計程幾頓登山頂光相臺前禮大雄老僧樹偈楊其光宛平縣令四大身軀皆幻毛髮爪甲自長老僧化去樹生僧樹是一是兩本來一物不存豈向無情滋養蟬蛻已付槁木肉皮不相痛癢漫道樹為僧榮色空空色非相啐一腳躍倒虛空打破沙鍋自䁛桫欏花彭元吉縣尉桫欏原是佛前花開遍峨山爛若霞不信佛身常住世見花如見佛無差登峨山楊維孝梵宮開勝地紺殿結殊因校飾兼三品莊嚴化億身洗池神象浴飲鉢毒龍馴不是靈山子誰乘大願輪銅塔王曰曾江左進士明萬曆陳皇后購青銅鑄成計十五層每層內分五層每一層金佛數百尊共計萬尊每層俱刻金字經卷諸經畢備峨眉山門一座山頂七座一塔陵霄會萬靈經傳大藏又分身劫來不礙無邊法各現慈悲度世人巨鐘王曰曾萬金鎔鑄自何年長作龍吟散曉煙留鎮三門開覺路聲聲震醒世沈眠過伏虎寺贈可聞和尚王曰曾靈山隨地起覺路自天開客興披雲到梵花促雨來有僧翻貝葉攜我上蓮臺正擬登峯去偏留話劫灰解脫坡王曰曾誰教伏虎接飛虹天半峨眉路不窮解脫欲歸何處去看來還在此山中祇樹林舊名古德林王曰曾萬壑雲空祇樹林霜天長見緑陰深偶來一憩聞清籟領略禪門自在心銅殿王曰曾皇家崇勝事法象得輝煌玉局三霄誥金宮百和香塔鎔大貝乘鐘吼老龍王碑篆風霜古規模起晉唐還憩伏虎寺王曰曾浮沈宦海無歸著天半峨眉覺路寬忽過山腰探伏虎從登峯頂欲栖鸞經聲直向層霄徹雪色長留羣玉看我亦前身緱嶺客憑誰指點得心安千手佛明吳昌求願王法力果如何指點迷津念普陀人向蓮臺齊合掌羡他益善是多多銅塔吳昌求洪爐巧鑄現精靈寸寸金剛不壞身十五浮圖經萬卷功成還賴世間人萬年寺竇絅中州風回蘿磴散幽芬幾處勾留已夕曛出嶺暮鐘邀客屐洗關花雨靜塵棼四圍煙繞山腰寺一面窗收谷口雲白夜試尋明月畔此中清景許誰分桫欏花竇絅老幹何年種空靈自作花助妝應有雪棲樹已無鴉豔冷穿雲出英繁帶月斜七重天上見猶覺是飛霞聖鐙竇絅煙鎖高臺望不分流光冉冉破氤氳螢飛亂點千巖火星墜輕搖萬壑雲祇合梵宮窺色相未應人世照塵棼我來峯頂窮奇幻故把靈膏夜夜焚大佛殿丁文燦乙丑進士巍巍大佛鎮峨城丈六金身慧眼明放大毫光看世界色空空色兩無名伏虎寺即事丁文燦無端牽惹果何因百感紛紜亂性真大道原從靜裏得毒龍怕向鬧中親一塵不染方為寶萬象歸源即是珍銀色兜羅成世界靈心返照屬誰人彌勒殿樓頭訪志靈和尚見壁詩依韻和之丁文燦層層疊疊萬重山識透禪機不許關一點慧心常自照源頭活水非人間贈伏虎寺瓶水禪師丁文燦劈開迷障作沙門一信無隳是有根六欲頓除拋幻海七情淨盡悟宗源泥塗軒冕慧心遠補衲袈裟道念純徵夢已知仍佛器師先太夫人夢大士賜花瓶而生機關莫向俗人論觀心坡丁文燦心是菩提覺是路澄觀返照性流通眼前高下非空境常守靈珠不語中息心所丁文燦觀心坡上息心所朵朵雲飛意甚閒天籟無聲沈百慮俗情多欲苦千般放懷著眼看將去特地返躬復轉還我語世人休妄戀坡前回首自牢關佛光丁文燦雲成五色現奇光形似尼珠不可方更有一樁奇異事人人影在箇中藏觀聖鐙丁文燦山南山北盡雲煙忽見聖鐙飛萬千仰望峯巒同月耀俯觀巖壑勝金燀合來朵朵朝蓮座分去飄飄向普賢此是靈山真妙諦阿誰領悟在機先峨山頂二首史在篽峯頂高千仞嘉邛指顧中側身鄰日月倚杖破鴻濛玉壘寒光逼羌江樹色空謫仙人去後遊興有誰同金氣孤峯結坤維獨鎮雄崖松無歲月人語逼蒼穹老雪凝千古殷雷起半空超然塵世外直欲御天風藝文僧詩贈密印安民首座入峨眉中峯宋釋克勤圓悟休誇四分罷楞嚴按下雲頭徹底參莫學亮公親馬祖還如德嶠訪龍潭七年往返遊昭覺三載翱翔上碧巖今日煩充第一座百花叢裏現優曇聖鐙釋心誠伏虎寺僧飛自峭崖東飄來點點紅回翔分遠近掩映入空濛焰冷千年火光搖半壁風夜深人靜後挂滿梵王宮寄虎溪可聞清釋海明破山瓦礫石頭皆放光無偏無正絶商量有時變作巖前虎威距峨眉白象王覩光臺清釋行密淡竹覿面明明猶不識馳求象外亦非真白雲幾度空撈摸杜宇頻啼春草深送華陽山人遊峨眉清釋通醉丈雪萬里瞿塘杖挹春峨眉天半一閒身俯觀沙界如棗葉猶是遊人眼上塵觀心坡釋通醉行人雙眼幸圓明下視閻浮等一塵到此一步是一步灼然何必更觀心臥雲庵釋通醉七重天末號峨眉樹裏老僧下榻遲八十四盤行欲盡青山涌出象王兒過太子坪聞達和尚舊隱釋通醉杖藜午日蹈龍池無限青山展笑眉瓦上曬經乾也未令人常憶達聞師山居釋行喜雲峨雲埋絶頂幾經霜懶與願王較短長秋至但觀黃葉落春來唯覺白花香罷遊猿止洞中臥爭食禽宣嶺外狂篤愛山居閒我老從他塵世利名忙雙飛橋清釋長白宗正寒響下高巔孤橋斷復連龍分雙澗壑雲散一溪煙眺聽聲光外徘徊翠影邊塵心從此盡擬證四空禪山居清釋永宣化機九日柴門雨亂飛禪心無住客來稀西風不管黃花夢林鳥山雲各自歸洪椿坪釋永宣穿蘿覓徑入椿坪樓殿層層鶴篆清因共雨花看貝葉漫隨山色聽溪聲慈鐙冉冉金沙映寶月團團梵響沈開士幽居成古剎祇今龍象話三生牛心寺避雨釋永宣幽徑荒苔寂千嶂古木橫雲來迷洞口雨過溼流鶯殿僻涼生遠溪深霧到輕松陰聊對座返照起新晴古德林清釋性藏紫芝近日生涯興漸闌了無箇事足追歡但將一柄竹笤帚古德林中掃破煙偶題清釋廣善別潭懶散疏狂一拙僧年來老去百無能雖然有箇閒身在喫飯穿衣似未曾贈天峯禪師隱靈巖清釋海與克成荊秀蔚藍巔幽人避地偏茶烹松吼淥香藹鶴騰煙危坐消陰劫清眠樂梵天從教深立雪無物與君傳宋王坪回文清釋性通機微西窗緑映錦屏空早挂殘霞帶日紅題筆綵傳新賦客耀臺靈繪巧圖工棲鸞鳳處溫山繞出聖賢時協氣通畦半落星明月夜溪清倒影現玲瓏峨眉早春清釋海源可聞茅廬清淨地幽深景對晴巒數點新疏壁嘗留穿月徑垂楊偏送隔牆春止居不過三間屋坦率惟捐一點塵慙愧溪山無箇事虛窗高臥一閒人別鄉友釋海源多年未覩南來鴈影落峨眉下翠微三笑虎溪留不住乘風又望海天飛登峨清釋元溫瓊目不到崇高處安知壁岫懸路頽山霧接橋斷野雲連秀目青松柏清心冷澗泉半輪秋夜月千古照巴川山居清釋照裕與峨山中長快活久已遠塵囂桃李開晴露松筠擁翠條雲光羣卉滿鳥語萬峯饒多少榮枯事如何到寂寥峨嶺秋釋照裕西風瑟瑟暮雲寒歸鴈高飛鬭羽翰松吐清聲遲洞壑池含素影蕩欄杆虛窗挹取林巒瘦午夜哦成星斗殘黃菊籬邊秋意淡空花不肯借人看送友之峨眉絶頂清釋福旵禪明欲上峨眉頂化城可憩心千年冰度冷五月火難禁樹老煙霞古僧閒花木深象王今說法子去好知音峨嶺雲釋福旵去則似無心歸來全不昧補完萬壑煙淡點千山䨴橫洞鎖龍眠依僧息犬吠恍如道者心卓出名場內山居次韻清釋元英肖白抱拙林泉下安貧任意閒無絃琴易操有韻句難刪雨過雲初曉夢回戶未關故人何處見梁月轉青山登峨清釋普佶靈樞陟彼清幽處浮生萬事捐琳宮非色相紺殿逼諸天絶壁苔痕古懸泉漱石鮮遙瞻西嶺雪清淨杳無邊懷峨清釋覺知屢生謁罷峨眉嶺常懷第一峯臺高常見月山靜獨聞鐘古雪搖瓊蝶飛泉挂玉龍何時重躡屐散步倚雲松伏虎寺清釋德堅岷樵登峨先向虎溪遊策杖雲深步更幽一徑鐘聲瞻玉殿萬杉煙色繞瓊樓石礄水隔紅塵杳臺榭花飛緑樹稠入室幸聆空妙諦繽紛華雨孰能酬井絡泉釋德堅濛濛雨潤空山夕浩浩泉聲走白石流向人間大有功從教萬物霑膏澤隱峨自眺釋德堅最愛眉峯秀偏煩車馬過層巒連瓦屋衆水合羌波鶴迹餘古雪猿聲出緑蘿曠觀村廓裏煙霧晚來多
