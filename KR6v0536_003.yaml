眠峨眉為震旦第一山天皇授道普賢示現之所神奇靈異非復人間先大夫昔宰峨眉七年豫自童子侍側時即聞之神往今得奉王程親歷其地可不一探其勝乎嘉州校士畢四月戊戌往問道焉既入縣拜先大夫祠遂同友人蔣子潛伯孫子育卿攜兒圖舁筍輿出城南門過勝峯橋轉儒林街雨陌春犁緑疇風偃隔澗有西坡古寺今荒廢不可尋矣前為十方院華嚴樓又四里許聖積寺傑閣一區懸銅鐘於上細鏤華嚴經字老僧慧寶所建曰老寶樓題額峨峯真境四大字魏了翁筆也內銅浮屠七級雕鏤佛像倍極莊嚴前渡普安橋沿瑜伽河行溪流曲折漸入山徑舊名大光明山荒址佛座猶存望羣峯環抱招提高峙木末伏虎寺也石梁跨澗松徑陰森可聞禪師擁錫來迎登佛閣少憩飯齊廚出寺左折而上至涼風橋橋傍石壁有洞風從洞中出忽石磴陡絶高百餘丈拾級而登名解脫坡坡上有僧結茅以居自是路益嶮峭山巖壁立層坡數折始達華嚴寺寺有旋螺殿極奇古宋紹興碑猶豎寺中日斜未及登覽寺左為青竹橋望娟娟秀出林表者玉女峯也峯頂有池深廣四尺歲枯不涸相傳為天女浴器由橋北折為楠木坪青蓋童童掩映數畝俗呼木涼傘左上為純陽殿側有千人洞授道臺即黃帝訪天皇真人授道處右十字洞相傳呂仙遊此以劍劃石而成昔人建此以峨眉仙家道場欲存天皇一脈然今守祠皆緇流無黃冠也祠前山下一石橫溪中長丈餘若浮槎俗號普賢船豈寶筏津梁於此示現耶沿巖俯石壁陟五十三步歷馬鞍山峯巒回合水聲琤琤鳴澗中下坡為萬福橋石色蒼然巑岏如削臨橋一池清泠澄碧大石插池中上鐫陳希夷先生福壽二字下鐫大峨神水四字石罅宛轉互相遮映有小穴注泉一勺泉脈涓涓透石底出清響鏗然如戛琴瑟坐池畔小亭汲水飲之寒沁心脾塵氛盡滌矣上大峨寺舊有聖水閣福壽庵今廢有僧葺之未成也遙聞大聲起巖壑林樾蕭森疑廣陵濤三疊泉震撼山谷然水之去來蹤迹杳不可覓或曰山潮以之驗雨晴卜豐歉也峯麓片石如臺蹲踞林莽中曰歌鳳臺楚狂陸通舊廬在焉前由鳳嘴石西上為中峯寺衆峯螺髻旋繞白雲一峯中峙故名一名集雲本晉乾明觀明果禪師除毒蟒改觀為寺宋茂真尊者重修昔孫王宋三真人羽化於此又黃魯直習靜處也歷層岡越三望坡路險峻行人三望乃至下坡山境幽深夕陽下舂林壑返照煙雲舒卷中蒼翠鱗鱗牛心寺址也雙流飛注小橋跨其上勢若雙虹水聲搏激如殷雷起地底石峽一線灌木蒼藤層層遮覆驚濤噴沫惟潺潺足下疑挾風雨窺之不見僧云左一水從雷洞坪繞白水寺來右一水從九老洞繞洪椿坪來至此巉巖深束鬭捷爭雄勢不相下盤渦一石怒當其衝則牛心實為砥柱矣石根圓尖鋭若牛心然左右亂石環峙盡與水勢爭奇溪上舊多亭臺今圮為榛莽矣雙飛橋左一徑可達洪椿坪聞有繡頭和尚住洪椿坪石洞中四十餘年將百歲矣髮垂覆身每昏夜赤足行山徑中無所怖人多異之橋北緣磴道而上徑稍平山花夾道香氣襲人剎竿隱隱出青靄僧云白龍洞也前經古德林緑雲四垂萬株濃翠別傳和尚手植楠也相傳數與法華經字等真不啻檀林祇樹矣林盡由山口望層坡高峙丹楹飛棟聳出層霄則大峨樓也越石門直上入萬年寺寺址甚敞古稱白水寺創自晉唐慧通禪師重修即廣濬禪師彈琴處宋初敕建銅殿歷太宗真宗仁宗俱有御賜寶供明萬曆間改聖壽萬年寺內殿凡七層一甎砌旋螺銅鑄普賢乘象金身高丈餘今亦漸就荒落矣寺門外近左有海會堂藏佛牙一具明萬曆敕書一道尚存夜宿僧寮山雨空濛萬籟俱寂已覺身在雲霄登峯頂猶未及其半也閲二日己亥曉聞梵音朗朗起出萬年寺後山雲四起半籠峯頂霧雨霏霏溼衣上頂心坡一徑高懸石磴蜿蜒下縋舉步則足膝點於胸以布繩曳輿牽挽而上巖畔一石森豎名太子石為登者所憑藉焉經十數折至觀心亭稍平憩白衣庵詢住僧知為先大夫所建曾捐俸置香火田石碣猶巋然道傍也由此扳援曲折山益高徑益險有鵝嶺脊仙女橋石碑岡皆陡巖深洞石壁巉絶下臨無地荒叢蒙密中側視不知幾千仞也仄徑沿巖為大小雲壑終古雲氣鎮之深淺不可測又前長老坪右過駱駝嶺數里為初殿登一板樓望山形如鷲鳥一名鷲殿昔漢蒲公採藥遇鹿處下有蒲氏村皆蒲公後也前兩山攢逼石間一線陡仄不可躡足名蛇倒退巖左有徑通九老洞出巖直上一坪老樹叢遮緑陰蔽日木石苔衣纏結紛披下垂長十餘丈巖風拂之縷縷如線曰普賢線又曰仙人絛亦山靈變幻之奇也又前蓮華石茅庵深閉荒寂無人道傍一石細蕊層萼類青蓮華前顧亂峯層逼箭筈通天若臨絶境仰指青霄微茫鳥道高不可扳行者咋舌十數人挽一輿如猿猱升梯移步躡空則防顛墜磴皆斬木層覆危棧齒齒蓋冰雪高寒石則愈滑此登山最險俗呼鵓鴿鑽天倣佛似之上嶺意稍適叢篁翠篠中有方池久涸亂葉覆之曰洗象池嶺畔有初歡喜亭以歷險至此前路漸平志喜也踰滑石溝直下深峽數百丈古殿一楹覆以木皮化城寺也山中氣候至此迥異四時霜雪寒氣森森逼人瓦屋經凍輒碎多用木皮代之少憩炊飯僧廚細雨斜風栗栗如初冬時肌骨凜然急挾纊擁裘由寺左沿危壁歷絶磴策杖攀藤直上梅子坡峻坂高巖昔有胡僧縛木梯架石以引行者今名胡僧梯過梯為白雲殿峭壑憑虛石根雲氣冉冉瀰漫深谷素濤銀海變幻頃刻殿後瀕巖一徑徑左虛無所倚亂木虬藤連蜷蓊翳俯視重淵深洞岞崿崚峋萬狀森列則雷洞坪也坪有雷神殿路豎鐵碑禁人語巖下為神龍所居聞人聲則風雨暴作疾雷驚電倒射山足靈異如此輿人疾趨過之曲折數里盤旋紆轉則八十四盤矣度桫欏坪正值花時四山如翦綵樹高六七尺葉長深碧花一萼十數朵叢出樹頭殷紅粉白望之微類芙蓉性宜寒移植山下則枯蓋優曇寶樹不作人間近玩也稍折有接引殿板屋供佛身峨然丈六亂後寺僧募造者今殿宇傾圮漸為風雨侵蝕名山荒寂誰為布金長者耶轉觀音巖上太子坪陰巖積雪與野草幽花相間經回龍庵松杉環蔭一徑寬平無復危巖險磴矣又前圓覺庵內沈香塔七級高丈餘層樓覆之雕鏤金彩工巧天然僧云明萬曆時奉慈詔特製者瞻禮而出左折過老僧樹古幹數圍蒼皮剝落相傳昔有老僧入定於中樹裂復合上天門寺兩石雙峙劃然中分如排閶闔名天門石多遊人題詠半蝕蒼苔矣又轉七天橋以峨山為第七洞天也上天啓庵直度天仙橋飛梁架壑泠泠流冰雪聲左折已登峯頂矣崚嶒萬仞忽焉平坦心目頓開瑞星石高倚寺門銅鐵錫瓦三殿巍然次第相接豫炷香殿上默禱於大士前專為國泰民安家太恭人祈壽忽淡日微明雲霧初斂內殿鐘鳴報佛光現矣急趨覩佛臺憑欄俯視兜羅綿雲布巖下漸滾滾與巖平閃爍飛動銀浪千層橫鋪玉地有光若車輪從雲頭涌出圓暈數重五色炫射中如懸鏡虛明朗耀觀者攝身光內止各見本身毫釐無隱雖數百人比肩並躅不能見也移時漸沒風捲雲馳更相磨蕩若扶桑初日吞吐懸巖光華倍皎光外復現一銀橋垂虹橫亙光旋轉其下晃晃靡定食頃方沈霧中隱隱而散臨臺為光相寺左向層梯有滲金銅殿高二丈五尺廣一丈四尺梁棟簷楹鏤金錯秀中坐大士傍繞萬佛窗櫺上下雕飾雲棧劍閣及入山道路險阻崎嶇之狀制極工麗四隅環列銅塔高六七尺有銅碑高六尺闊三尺古色蒼翠其光可鑑左王育宗記集王羲之書右傅光宅記集褚遂良書萬曆癸卯九月立記建殿事甚悉右下臥雲庵有老衲募修工未竣僅板屋數椽耳山風大作霧雨空濛登藏經閣擁爐坐僧榻日已昏黑聞山有佛燈至夜則現僧云燈現必風止雲散今濃雲漫空恐不能見耳豫輾轉不能寐披衣步光相寺前見山月將升薄雲微掩忽一燈從山外飄空而起漸至十數點爭相上下頃刻數千百點如傾萬斛珠璣歷亂山谷大風振林壑吹人欲墮不能久立遂登閣宿焉閲三日庚子曉日初晴萬山雲淨登巖眺望遠近諸山星拱羅立巖後岷山萬重真兒孫培塿耳少近一峯平覆如屋與峨頂相對瓦屋山也又方正若案高出天外者曬經山也青城玉壘或拱或揖火焰蔥嶺隱現縹眇遙相映帶諸山之後銀色插天日光注射如瑤峯瓊壑晃耀奪目西域雪山也延亙天竺諸番不知幾千里望之儼在几席高寒之氣逼人天地冰霜萬古如斯矣遙睇平川三江如帶白雲片片或籠罩峯頭或平鋪大壑俱飄飄起足下始知身在虛空覩佛臺左有金剛石穿空壁立色如積鐵倚石下窺亂石㟏岈疑千門萬戶幽奇莫測真神仙窟宅也僧指隔溪有不到寺刺竹坪棋盤寺紫芝玉蟾諸洞迥絶人境遊蹤不可問山頂有泉曰井絡炊米粒粒成沙不能熟豫從神水以大竹貯水攜登二日已盡勢難更留飯罷出寺左行下繞山坡過澗尋白龍池池方廣數步水深尺餘沙石縈帶中有物蠕蠕出水底僧以鉢盛之長數寸四足蜿蜒居然蜥蜴也僧云冬寒池水不冰或時有風雷起池上豈亦龍種耶右折出深坳有淨土庵供通天沙門肉身於塔僧云沙門自萬曆甲戌居此不下山五十年將百歲矣而化今遺蛻端嚴如生是亦茂真繼業之流也尋舊路過雷洞坪四望諸峯漸為煙雲挾去坐臨巖片石下瞰幽巖邃壑人迹罕到最奇則九老仙人洞有皇人遺迹焉遠溯伏羲女媧鬼谷諸洞層層倚伏若相鱗比惟指點虛無無從御風而遊也下坡以繩縋輿縮身如蝟石角藤梢鉤衣刺目輿懸空際前人蹲伏後人挺立互相牽掣稍縱則如片葉陵風飄空直墮矣較之攀躋而上險且十倍逡巡至木皮殿喘息稍定溼雲含雨幽花匝樹枝上始聞鳥聲峯頂二日鳥迹麋蹤寂無所見惟二青鳥每佛光將現時飛繞殿前呼佛現佛現仙翼靈禽非凡鳥所能接羽至白水寺日已亭午望鉢盂峯虎跳橋山壁峭立屈曲十二盤而上有八音池黑水寺相隔二十里屐齒不能及趨雙飛橋徘徊石畔不忍去僧指左徑達洪椿坪由寶現溪入石筍溝數折後牛心寺即古延福院有白雲青蓮二閣乃孫真人栖隱地遙望大峨石左中峯寺後即呼應峯茂真與真人奕棋處景物幽深倉卒難遍惟付之夢遊耳暮入伏虎寺宿可聞禪師丈室索山志閲之讀范石湖胡菊潭諸先生記殊歎茲遊之草草也笑謂兒圖曰俟豫十年後芒鞋竹杖呼老衲於古雪堆中更作臥遊以酬夙願此時僕僕塵鞅山靈自不肯以全身示現也附録慈雲懺主往生淨土決疑行願二門序維安養寶剎大覺攸贊三輩高升夕孕金華列宿猶慙於海滴晨遊玉沼世燈彊喻於河沙良以十方爰來四生利往雖騰光而普示終稽首而偏求故其竺國皇州自今觀古彼則巨賢至聖咸舒藻以為盟此則覺德鴻儒盡摛毫而作誓自兹回向綿續唱和相尋誠為道德之通衢常樂之直濟者也但世多創染割截未識方隅忽遇問津靡慙濫吹或攘臂排為小教或大笑斥作權乘以其言既反經人惑常典易不云乎居其室出其言不善則千里之外違之況其邇者乎遂輒述往生淨土決疑行願二門詞愧不文理存或當視菽麥而且辨挹涇渭而俄分翦伊蘭之臭林植栴檀之香幹信解行願原始要終不數千言而能備舉者實兹二門矣
