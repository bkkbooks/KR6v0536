body:
  text: 第三全山形勝附峯巖臺石岡洞坡坪溪河溝池泉井山道水道形具特拔之象勢標嚴峻之儀其鍾靈育秀涵賾蘊奧之致誠足令住者遊者睹境明心觸機悟道況登峯造極蒙光見燈曠觀宇宙之大俯視天下之小者乎故志形勝峨山高出西南禹貢梁州之山岷嶓蔡蒙西山皆岷北山皆嶓南山皆蒙峨眉之在禹貢則蒙山之首也任豫益州記云峨眉在南安縣界兩山相對如蛾眉張華博物志以為牙門山郡志因謂此山雲鬟凝翠鬒黛遙妝真如螓首蛾眉細而長美而豔也山有大峨中峨小峨中峨即二峨古綏山一名覆篷方輿記云綏山廢縣在峨眉縣西四十里高半大峨形如覆釜雄據南方上有天池葛由洞下有豬肝洞魚洞小峨即三峨一名鏵刃山在縣東西六十里距二峨九里高半之兩山耕作可得數千人其間草木茶菜豆芋蕃膴豐熟足當田疇十分之五又眉州山川志亦載峨眉在州城南二百里五代時眉州即嘉州及唐析嘉州別置眉州宋明既因之紀志者猶以峨山屬眉州今實屬嘉定而峨眉縣以山得名亦舊名云按名山記峨眉周匝千里高二百二十里石龕一百十二大洞十二小洞二十有八南北有臺名勝記云前之岷江大出而尾小背之瓦屋上正而平章遠之雪山纖浮而汩沒峨山志云後有曬經瓦屋青城天竺雪山屏峙環列前即二峨三峨然二山俱以大峨得名大峨高峻既極足以兼二山也從光相寺佛殿西望見三峯插天皆積雪如銀每日下峯頭則殿中然燈相傳此即西域昆崙山即雪山也每日月掩映相為晝夜夏日從北峯西下冬日從南峯下惟春秋間從中峯下不爽云西域去此尚遠恐目力難及今省城西望亦有雪山晴明時可見疊茂才三百里爾宋白詩云不知立處高多少但見星辰在下頭宋田錫云高二百里作一盤八十四盤青雲端豈以至高求至高耶東坡亦云峨眉山西雪千里今峨眉當省城東南三百餘里而城樓登望不及則言八十里六十里者近是唐太宗詠秋日詩有云還似成都望直見峨眉前此語極盡山川形勝太宗未至成都但嘗遙領益州神相所矚耳國憲家猷云峨眉山在蜀為最高峻蓋衆山盤礡而成齊之泰岱楚之武當皆不及也李太白所稱峨眉高出西極天羅浮直與青冥齊者非妄三峨云在縣東西六十里恐東西二字抑係東南或西南二字之誤舊志圖說形勝皆作東西故今亦仍之峨眉後周所置青衣平羌舊理此按峨眉縣即古隋之綏山唐之羅目二縣入焉縣西四十里即綏山址葛由賣木羊處縣南三十里即羅目址本羅蒙山訛為羅目也今之木羊鎮羅目街是李膺益州記云隋開皇九年立峨眉縣以山為名縣在南安之西峨眉之東唐乾元間獠叛移就峨眉觀東今縣理是酈道元水經注峨山東北有武陽龍尾山并仙者羽化之所於其處得遺詠雖神栖白雲屬想芳流藉念泉鄉覽其餘誦匪直邈想遐蹤愛其文韻可念故端牘抽札以詮其詠略曰登武陽觀樂藪峨嶺千尋洋湖口命騑螭駕白駒臨天水心踟蹰千載後不知如凡游大峨者自縣勝峯門出至華嚴院十五里前代于峨山創寺六所惟光相居山絶頂為游山之底極華嚴居山之前峯為游山之嚮導而白水寺居其中自白水歷線徑六十里至頂即普賢示現處屋皆以板代瓦今庵寺數十倍於昔矣峯十三峯附四頂三山香爐峯在龍升岡轉身回龍山羅漢寺東寶掌峯在大峨石後呼應峯在白雲峯左中峯寺後下有茂真尊者庵庵前有溫涼泉三仙洞雄黃石玉女峯在玉女橋上華嚴寺左峯上有池相傳為天女浴器深廣四尺歲枯不涸宋邛州守馮楫結茅峯下諷誦華嚴天女饋食於此池畔有飛龍庵庵旁一石有龍蟄焉一夕雷神劈石石開龍飛去故名左又有鳳嶺庵今俱廢白雲峯即白巖峯在中峯寺後十七峯在萬年寺前四圍環繞一云即寶掌峯鉢盂峯在萬年寺前平地突起如盂石筍峯在萬年寺前雙飛橋石筍溝黑龍潭又名玉筍峯一云在長老坪左翠竹峯在長老坪右十二峯尖在九老峯上近後牛心寺天池峯在山頂下即洪椿坪齒牙峯在山頂天啓庵下蓮華峯在山頂呼應庵東上有不到寺木蓮華四季俱開一云即青蓮峯與大尖峯也蓮華頂在初殿九嶺岡上又華嚴寺上有古心坪亦名華嚴頂千佛頂在山頂即千佛巖下多高人隱此牛心頂在雙飛橋後頂亦峯類故附於此弓背山即木皮殿賓山馬鞍山在五十三步下太平橋前花山即四峨山其形棱瓣如花以上山以形得名故亦附峯後巖四巖象鼻巖在後牛心寺觀音巖有二一在後牛心寺進洪椿右手一在八十四盤大歡喜亭下光明巖在天仙橋側一云即覩佛臺臺六臺授道臺在純陽殿後宋皇坪上相傳軒轅訪道於天皇真人授九仙三一五牙經處舊有道紀堂幽館別室三百五十間臺右有千人洞名虛靈第七洞天又有呂仙劍畫十字洞升仙臺在呂仙十字洞右後漢漢安元年為瞿君武字鵲子入峨眉師事天皇真人得仙乘白龍往來每繫龍於彭山黃龍鎮灘上龐籍詩巢鳳閣邊勞遠夢繫龍灘下認前題是也灘即寶磬洲即漢綏和五年犍為人得寶磬十六上獻處歌鳳臺在大峨石前楚狂舊廬明弘治間督學王敕改今名覩佛臺在鐵瓦殿前一名光相臺小覩佛臺在山頂觀音閣前七寶臺在山頂金剛石下一名獨尊臺巖下有石臺石樞刻有鬱儀引日精結璘致月神得道處石二十六石太湖石有二一在無量殿左此石煎湯服之可療心氣疼痛一在太湖庵下宛轉石在黑水坪普賢石在楠木坪下從純陽殿望之可見大峨石在神水側有呂純陽書大峨石三字陳圖南書福壽二字鳳嘴石即雞公石在歌鳳臺牛心石在雙飛橋下明瑩照人眉目雄黃石棋盤石俱在呼應庵後太子石在頂心坡中升象石在洗象池側蓮華石在初殿上善財石在接引殿後觀音閣巖下象王石在太子坪下天門石在山頂老僧樹旁兩石如削中通一線深二丈許為天然門戶此處石壁凡三折始達山道至七天橋尋常圖畫皆不能似瑞星石在山頂通精泉下錫瓦殿側金剛石有二一即七寶臺下有石室石樞在覩佛臺巖左峭削六棱見者赫然一在天柱峯自此可至後牛心寺磐陀石在七寶臺下石筍聖鐘俱在九老洞下仙人面仙人手俱在山頂觀音巖絶壁人不能到蓬萊三島石直下有無縫塔飛雲霞俱在千佛頂下以雲射朝霞得名東坡石即龍門洞石壁題額處岡五岡九嶺岡在初殿上黑水岡白水岡俱在本黑水白水寺前龍升岡在雙飛橋下中峯寺上飛來岡在縣北大廟後有飛來殿殿內有唐時家慶樓呂純陽仙筆詳古蹟洞二十二洞風洞有二一在涼風橋一在萬松山大小深坑上十字洞在宋皇觀右呂純陽以劍劃之此洞深廣叵測水自龍門對山飛作瀑布嘗見竹籜隨水流出白龍洞有三二在古德林此處分上下二洞上洞淹沒下洞今填築為庵一在雙飛橋北磴道上白巖石刻白龍洞三字不知所在丹砂洞洞旁舊有祠祠板羅漢乃張僧繇畫甚著靈異孫真人洞與丹砂洞俱在後牛心寺左孫思邈煉丹洞也藥爐丹竈現存巖石皆碎裂無草木說者以為丹氣薰蒸所致方士多取此石煮服以為能助精養神云張方平有詩載後無懷洞在黑水寺前惠續尼院旁三仙洞在呼應庵後羅漢洞在木皮殿下僅石罅數尺九老洞在九嶺岡初殿上相傳有九仙叟居此故名洞深窈莫測舊有入者然炬行三十餘里聞雞犬鼓樂音蝙蝠如鴉撲炬乃出中有觀音水一勺可資掬飲巖下即卜應泉也伏羲洞女媧洞鬼谷洞俱在雷洞坪巖下鬼谷於此著書名珞琭子葛仙洞在二峨山白巖溪上周成王時羌人葛由騎木羊處詳神仙上有天池與李仙洞相對李仙洞在二峨山玉蟾洞在二峨山口仰天窩下白巖溪旁相傳白海瓊隱處龍門洞離縣西十里在石家壩即雙飛橋下二水合流至此兩山相對如合水從中出紺碧無底兩巖卓立色如碧玉刻削光潤入峽千餘尺有兩瀑布各出一巖頂巖根有磐石承之激為飛雨濺沫人過其前衣皆沾溼絶壁有圓龕去水可二丈即龍洞也峽中石寒水清非復人世境人亦不能久留也昔人云聞峨眉雙飛不減廬山三峽及至龍門雙飛又在下風天下峽泉之勝推龍門為第一有東坡大書龍門二字遊者乘桴而入援梯而上道極險峻壁上刻古今文人詞翰極多紫芝洞一名豬肝洞在羅目街對門明督學王公敕過洞前羅目街知有異物掘地得石碣上有紫芝洞三字旁注一山五口道人書今猶豎道左爛柯洞在紫芝洞上一里洞口刻爛柯二字魚洞在縣南三十里二峨山下其水混混夏涼冬溫下即冷水河河畔有乾洞元和志謂有穴初才容一人行數里漸覺平坦有蝙蝠大如箕至此止而難進坡六坡解脫坡在涼風橋上三望坡在中峯側金剛坡在雙飛橋洪椿坪大路象牙坡在白龍洞上觀心坡在萬年寺上梅子坡在木皮殿上坪十七坪華嚴坪在純陽殿後相傳赤城隱士舊居一名赤城山有古心和尚開建靜室亦名古心坪宋皇坪孤峙於伏虎寺左乃天皇授道於軒轅處詳授道臺洪椿坪即千佛庵在牛心寺後詳寺觀聖水坪有泉三冬不涸在響水壩一云在山頂學士堂後太子坪在三倒拐上即萬行庵大峨坪即冷竹坪對門山九龍坪即蓮華石對面寶掌坪在洪椿坪右黑水坪在黑水寺前大坪在洪椿坪左長老坪在大小深坑上雷洞坪在梅子坡下有雷龍居此凡七十二洞軟草坪在山頂思佛亭前大佛坪在錫瓦殿門前下坡桫欏坪在千佛頂後每見前賢游山記俱以八十四盤大歡喜亭上為桫欏坪詢之山中耆舊云坪在山後非初登頂即有此坪也如以地有桫欏樹擬之此樹遍滿山頂無處不可名桫欏坪也羅漢坪在山頂與桫欏坪相連梵僧於此出沒獅子坪近羅漢坪景最幽雅溪十一溪附一潭虎溪在伏虎寺前上通馬家溝下通瑜伽河溪內石子細潤梁渡溪在雙飛橋後此可至後牛心雙溪有二一即雙飛橋舊名雙溪橋二水從橋下出溪中有五色石白質青章朝日射之光彩煥發名大士小現一在青龍場對門觀音庵上虎跳溪一名虎溪橋晉僧慧通禪師初游黑水因水暴漲良久俄有虎伏於前師因騎而渡故名寶現溪在牛心寺前宋僧三藏師繼業自天竺歸來登峨眉至此橋見兩石鬭溪上攬得其一眉目宛然以為寶故名洗腳溪在山頂思佛亭軟草坪上黑龍潭在石筍溝上九老洞下白巖溪銅官溪俱在二峨山下黃沙溪在高橋上過橋即靈巖寺種玉溪在龍門洞下怪石刻露如玉河三河附二水羅目河出峨眉山麓右溪自小天池以東左溪自黃毛坪以北至羅目廢縣界合二溪之委為江水石甚奇怪峨眉山有濛水即大渡河也水發濛漢東南流與涐水合徑汶江道呂忱曰涐水出蜀許慎以為涐水也從水我聲南至南安入大渡水大渡水又東入江一云大渡河出嶲州界經羅目縣東南入龍游界瑜伽河在普庵橋前三一庵上彝惜水在羅目縣東北五十里源出嶲州界中有嘉魚長三尺每年二月隨水而下八月逆水而上入穴蜀都賦云嘉魚出於丙穴是也符文水二水出大峨山北曰白水南曰黑水或云此水即流至雙飛橋者又二水俱東南流成大河故附河後溝四溝馬家溝在伏虎寺後乾溪溝在伏虎寺前母家溝在麻子壩上石筍溝在洪椿坪前池十池附溫涼二泉神水池在大峨石旁即玉液泉相傳隋智者大師住荊州玉泉偶患病有神女取此水供養故名玉女池在華嚴寺左詳玉女峯明月池在萬年寺後洗象池在歡喜亭溫涼二泉在後牛心寺隔溪即呼應庵八音池在黑水寺過虎跳橋遊人拍一掌則一蛙鳴餘蛙次第皆鳴數皆合八後一蛙復大鳴一聲衆蛙乃止聖水池在十七峯下天池有二一在大峨頂臥雲庵右名半月池又名觀音泉即井絡泉也池上一窪日飲千