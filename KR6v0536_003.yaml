未果大霽遂登上峯自此登峯頂光相寺七寶巖其高六十里大略去縣中平地不下百里又無復蹊磴斫木作長梯釘巖壁緣之而上意天下登山險峻無此比者余以健卒挾山轎強登以山丁三十人曳大繩行前挽之同行則用山中梯轎出白水寺側門便登點心坡言峻甚足膝點於胸云過茅亭嘴石子雷大小深坑駱駝嶺簇店凡言店者當道板屋一間將有登山客則寺僧先遣人煮湯於店以俟蒸炊又過峯門羅漢店大小扶舁錯歡喜木皮殿胡孫梯雷洞坪凡言坪者差可以託足之處也雷洞者路左深崖萬仞磴道缺處則下瞰沈黑若洞然相傳下有淵水神龍所居凡七十二洞歲旱則禱於第三洞初投香幣不應則投死彘及婦人衣彝履之類以掁觸之往往雷風暴發峯頂光明巖上所謂兜羅綿雲亦多出於此洞過新店八十四盤桫欏坪桫欏者其木葉如海桐又似楊梅花紅白色春夏間開惟此山有之初登山半即見至此滿山皆是大抵大峨之上凡草木禽蟲悉非世間所有余來以季夏數日前雪大降木葉猶有雪漬斕斑之迹草木之異有如八仙而深紫有如牽牛而大數倍有如蓼而淺青聞春時異花猶多但其時山寒人鮮能識之草葉之異者亦不可勝數山高多風木不能長枝悉下垂古苔如亂髮鬖挂木上垂至地長數丈又有塔松狀似杉而葉圓細亦不能高重重偃蹇如浮圖至山頂猶多又斷無鳥雀蓋山高飛不能上自桫欏坪過思佛亭軟草坪洗腳溪遂極峯頂光相寺亦板屋無人居中有普賢小殿以卯初登山至此未申後初衣暑綌漸高漸寒到八十四盤則最寒比及山頂亟挾纊兩重又加毳衲駝茸之裘盡衣笥中所藏繫重巾躡氈靴猶凜栗不自持則熾炭擁爐危坐山頂有泉煮米不成飯俱碎如砂粒萬古冰霜之汁不能熟物余前知之自山下攜水一缶至才自足也移頃冒寒登天仙橋至光明巖炷香小殿止木皮蓋之王瞻叔參政嘗易以瓦為雪霜所薄一年輒碎後復以木皮易之番可支二三年人云佛現悉以午今已申後逡巡忽雲出巖下傍谷即中雷洞山也雲行勃勃如隊仗既當巖則少駐雲頭現大圓光雜色之暈數重倚立相對中有水墨影若大聖跨象者茶頃光沒而其傍復現一光如前有頃亦沒雲中復有金光兩道橫射巖腹人亦謂之小現日暮雲霧皆散四山寂然及夜燈出巖下遍滿彌望以千百計夜寒甚不可久立丙申復登巖眺望巖後岷山萬重少北則瓦屋山在雅州少南則大瓦屋近南詔形狀宛然瓦屋一間也小瓦屋亦有光相謂之辟支佛現此諸山之後即西域雪山崔嵬刻削凡數十百峯初日照之雪色洞明如爛銀晃耀曙光中此雪自古至今未嘗消也山綿亙入天竺諸番相去不知幾千里望之俱如在几案間瑰奇勝絶之觀直冠平生矣復詣巖致禱俄氛霧四起混然一白僧云銀色世界也有頃大雨傾注氛霧辟易僧云洗巖雨也佛將大現兜羅綿雲復布巖下紛郁而上將至巖數丈輒止雲平如玉地時雨點猶餘飛俯視巖腹有大圓光偃臥平雲之上外暈三重每重有素黃紅紫之色光之正中虛明凝湛觀者各自見其形現於虛明之處毫釐無隱一如對鏡舉手動足影皆隨形而不見傍人僧云攝身光也此光既沒前山風起雲馳風雲之間復出大圓相光橫亙諸山盡諸異色合集成采峯巒草木皆鮮妍絢蒨不可正視雲霧既散而此光獨明人謂之清現凡佛光欲現必先布雲所謂兜羅綿世界光相依雲而出其不依雲則謂之清現最難得食頃光漸移過山而西左顧雷洞祠山復出一光如前而差小須臾亦飛行過山外至平野間轉徙得與巖正相直色狀俱變遂為金橋大略如吳江垂虹而兩圯各有紫雲捧之凡自午未雲物淨謂之收巖獨金橋現至酉後始沒丁酉下山始登山時雖躋攀艱難有繩曳其前猶嶮而不危下山時雖復以繩縋輿後梯下輿夫難著腳既嶮且危下山漸覺暑氣以次減去綿衲午至白水寺則綌絺如故聞昨暮寺中大雷雨峯頂夕陽快晴元不知也食後遊黑水過虎溪橋奔流急湍大略似雙溪而小不及始開山僧自白水尋勝至此溪漲不可渡有虎蹲伏其傍因遂跨之亂流而濟故以名溪黑白二水皆以石色得名黑水前對月峯棟宇清潔宿寺中東閣秋七月戊戌朔離黑水復過白水寺前渡雙溪橋入牛心寺而後斷路白雲峽水方漲碧流白石照人肺肝如層冰積雪中籃輿下行峽淺處以入寺飛濤濺沫襟裾皆濡境過清毛髮盡竦寺對青蓮峯有白雲青蓮二閣最佳牛心本孫思邈隱居相傳時出諸山寺中人數見之小說亦載招僧誦經施與金錢正此山故事有孫仙鍊丹竈在峯頂又淘米泉在白雲峽最深處去寺數里水深不可涉獨訪丹竈傍多奇石祠堂後一石尤佳可以箕踞宴坐名玩丹石寺有唐畫羅漢一板筆迹超妙眉目津津欲與人語成都古畫浮屠像最多以余所見皆出此下蜀畫胡僧惟盧楞伽之筆第一今見此板乃知楞伽源流所自餘十五板亡之矣此寺即繼業三藏所作業姓王氏耀州人隸東京天壽院乾德二年詔沙門三百人入天竺求舍利及貝多葉書業與遣中至開寶九年始歸業詣闕進所得梵夾舍利等詔擇名山修習登峨眉北望牛心衆峯環翊遂作庵居已而為寺業年八十四而終出牛心復過東峯之前入新峨眉觀自觀前山開新路極峻陡下冒雨以遊龍門竭蹶數里歘至一處澗溪自兩山石門中湧出是為龍門峽以一葉舟櫂入石門兩岸千丈巖壁色如碧玉刻削光潤入峽十餘丈有兩瀑布各出一巖頂相對飛下嵌根有磐石承之激為飛雨濺沫峽舟過其前衣皆沾溼越數丈半巖有圓龕去水可二丈以木梯升之即龍洞也峽中紺碧無底石寒水清非復人世舟行數十步石壁益峻水益湍急回櫂舟人云前去更奇以雨大作加飛瀑沾濡暑肌起粟骨驚神悚凜乎其不可以久留也昔嘗聞峨眉雙溪不減廬山三峽前日過之真奇觀及至龍門則雙溪又在下風蓋天下峽泉之勝當以龍門為第一然其路嶮絶亂石當道將至峽必捨輿躡草履絶營傾步於嵯岈兀嵲中方至峽口蓋大峨峯頂天下絶觀蜀人固有罕遊而龍門又勝絶於山間遊峨眉者亦罕能到非好奇喜事忘勞苦而不憚疾病者不能至焉復尋大路出山初夜始至縣中己亥發峨眉晚至嘉州登峨山道里紀明胡世安大學士井研峨眉縣治南出郭即古勝峯橋今名儒林橋稍前轉儒學街隔右澗有西坡古剎溪水縈折柳柳帶緑過聖宮前合三山流為泮澄波千頃樂蓮香亦多雅致右行對後嶺洪範庵沿本山迂行度凹則十方院又里許華嚴樓接大悲庵再前興聖庵梵舍歷落皆延憩遊客邸又四里許聖積寺門對古慈福院中衢傑然一閣志載了鴇樓以鴇淫鳥況僧至此了絶淫念俗又叫老寶謂老僧慧寶所創額顏峨峯真境魏了翁書自樓而西有普賢殿又前普安橋舊有普安院八卦井今廢過橋西折而上經楊家岡平疇沃衍嘉樹陰濃自此沿澗紆行寒玉淙琤名瑜伽河有三一庵前則白水莊獨村店依山逆行上有石碑處舊名大光明山又前坊曰會宗近改問宗庵在山腰原風道人募建今就蕪二里龍神堂堂外豎石幢名尊勝塔再上古柏森森飾徑高峙隔虎溪即伏虎寺踞山之口沿溪而入一徑紆回因虎肆虐行僧建塔鎮之患遂息焉故名左有西域和尚靜室其和尚年九十七康健甚言西域事頗悉右室龍鳳庵以地形稱也此皆引睞賓岑者再進為無量殿至涼風橋其右峭壁有洞風颼颼自口出為涼風洞橋以此名谷口舊有震旦第一山坊經茶庵稍進過解脫橋危磴直上約高百丈名解脫坡坡上有觀音堂下有仙人會舊傳有一池入山者於此沐浴今廢左行跨山蹊依兩壁左右之旋行凡十數折層級而上過小橋延不數尺名玉女再上華嚴寺今名歸雲節梲盤螺轑蓋佛座名雲篆殿制甚古大蝠託廬按碑宋紹興間建嘗掘地得一小碣鐫華嚴堠左刻至縣十五里右刻至巔七十里今豎寺中由寺左行為青竹橋橋上左望秀出者玉女峯頂上有石池深廣四尺歲旱不涸相傳天女浴盤僧云宋邛州刺史馮楫結庵於此日諷華嚴經感天女饋食之異即此處前有鳳嶺庵今廢右有飛龍庵轉西由青竹橋折北行為楠木坪樹偃蓋堪避暑雨俗呼木涼傘坡昔陡滑今修成路旁建一庵自庵前左上為呂仙祠祠前重樓瑰瑋奉大士於上彌勒居中嗣又增修新殿及靜室香廚以棲僧衆於是仙佛同宗祠後為華嚴坪相傳即赤城隱士舊居古名赤城山昔有香煙羅漢白雲三寺今廢自祠東北望為宋皇觀舊址古有道紀堂幽館別室合三百五十間左有千人洞授道臺虛靈第七洞天之蹟即黃帝訪天真皇人授九仙三一五牙經處右有十字洞相傳呂仙遊此以劍劃石成此洞延袤廣丈許深不可測人以石擊鏗然有聲水自龍門對山飛作瀑布常見竹葉籜隨出即洞旁叢篁遺墜也又右升仙臺昔有瞿武一云瞿君武或稱皇人弟子或稱後漢漢安時人能騎龍乘雲上下遊彭山犍為間至今二處有繫龍遺迹按莊子瞿君字鵲子長梧子之弟子也又周人未知孰是由祠左里許望山下溪中一石類艅艎順浮水中名石船子俗號普賢船舊有藏舟於壑坊豎道左又里許沿巖行人呼五十三步上有天慶庵由庵稍下過太平橋上馬鞍山又稍上距那庵路左上有龍泉庵順路過小石橋右為天台庵下坡為萬定橋古名萬福橋橋頭一大石方廣當途即大峨石界左方一石蹲小池間體側上刻陳希夷草書福壽字呂純陽書大峨字又先達神水字俱鐫石上石後隔尺許又一石扆之上刻浴衷字又神水通楚小碑豎其上中間止容一人下觀水穴中聲汩汩自上舂下透前大石底而出池中沙水晶瑩內貯圓石一塊形若磨軸脈理旋轉宛然圖中太極分兩儀象池水前溢終歲不竭才數武便滲去從無澗路莫知所之池左上新創一坊題水竹居又上小亭題竹月松風正面方亭題宗漏字池右在昔渠九曲資遊人泛觴今廢止豎小亭題一卷一勺池後有小石塔塔後有聖水閣又進為福壽庵庵前一海棠大數圍高數丈幹直上二尋餘始敷枝葉春夏交紅英爛放甚可愛也此間去西南山遙聞有聲淜湃疑挾風雨而來移時乃息及履其地全無水蹤土人名曰山潮久晴必雨久雨必晴此其驗也至潮之遲暫大小又以卜歲入盈縮亦異矣登靈文閣望別墅深處有勝峯彌陀立禪諸庵曹溪閣諸峯錯落如螺髻前咫尺竹林蓊蔚為神水庵再進則歌鳳臺楚狂遁迹所側湧一泉四時不涸又前過百福橋俗名響水以聲潺湲故水中石光碧映帶游裾又前鳳嘴石西上為中峯寺今名集雲明果大師道場昔有孫王宋三真人羽化於此在宋有乾明觀黃魯直習靜其中登普賢閣羣峯周遭茲獨中峙故得勝名左行為三望橋又上茶庵庵前即三望坡以路險峻行者三望乃至或云軒轅帝曾三舉望祭於斯上有龍神殿亦古蹟坡下若舂聲杳入深谷又三折下過樟木牛心二嶺至前牛心寺路口下坡則雙飛橋周望丈人兒孫垣霍競秀有兩巒對出牛心嶺自中亙垂如貫珠左一水從雷洞坪繞白水寺而來右一水從九老洞繞洪椿坪而來至此路界作雙虹跨澗僧云左橋始軒轅游勝峯時右則自漢至宋不知幾重修當兩橋間有清音閣其上小阜一亭舊名接王亭俯帶傍溪有同佩委始望碧涓馴逝於斯峽深勢束褊急性成偶逼風磯輒恣豗奮環岸樹木斜抱僂生上突乳峯高臨兩水建有白衣觀音樓兩水迸出互望遂爭雄怒搏意不相能賴石丈人為魯連誘之一氣漸就平衍僧指盤渦尖鋭有微瓣者牛心石也石左右各有石如雞冠馬鬣碧膩漣漪亭於合溪之上曰琉璃水亭後數武創一大樓名洗心臺白衣閣左少進灣內為廣福寺乃前牛心別院溪名寶現即宋三藏師繼業得鬭石處由廣福左入數里石筍溝有寶珠庵溪上一峯名天柱聳立閣後上有小庵名異華峯右由閣緣巖而上遇缺陷棧以木皮踰金石凡數折至後牛心寺繼業所創今名臥雲即古延福院孫真人思邈修鍊於此所遺鐵臼銅罐質朴色古今隨婪吏去矣寺左丹砂洞洞旁舊有祠寺壁相傳有張僧繇畫羅漢一板甚著靈異壁今毀自寺遙望大峨石左中峯寺後尖秀插空者名呼應峯下有茂真尊者庵相傳茂真與孫真人集寺後奕棋於此呼應有棋盤石方廣丈餘有庵名呼應庵前左右有溫涼二池今廢庵後有三仙洞及雄黃石相傳唐玄宗幸蜀夢真人乞武都雄黃後遣使齎送至此煙雲相隔使者呼應因得造焉見一叟幅巾被褐危坐手指磐石曰致藥於此上有表録上皇帝中使顧石有朱書百餘字就録一行則其行滅去呼應之名又或以此由寺前下坡舊路自觀音巖上瓦廠新路順溪至積善橋皆可達洪椿坪此路多熊狒猿虎之類由牛心寺越雙飛橋北遵磴道而上為白巖石色皓潔刻有白龍洞字不知洞所又前一望濃翠蔽嶺別傳和尚手植楠也株與法華經字數相等今號古德林樵蘇不敢輕犯再進象牙坡以山石形得名小庵二所俗呼上白龍洞下白龍洞皆白水寺下院至山凹處望樓閣矗空拾級纍百乃達四會亭有接引銅像左則慈聖庵接引閣上為大峨樓再上左豎祇樹林坊稍轉為海會堂藏有佛牙一具及丁雲鵬所畫八十八祖像御賜紫衣出堂直上則古白水寺即唐廣濬禪師彈琴處寺甚敞居僧常至數百宋初敕建銅殿大士銅像亦高十餘丈歷太宗真宗仁宗三朝御賜寶供最多三經回祿盡付煨燼明世廟重修亦就毀萬曆間奉慈詔新建萬年寺普賢一殿螺結甎甃頗稱精固乘象金身峨然丈六祝融稍戢峻焰惟是寄木穴頂導霖直注大士髻中頃僧建閣四層高幬其上自縣至此歷峻坂已四十餘里說者謂登峯頂此猶其麓也寺直右肩有淨業堂古泉清洌足供千萬人傳云龍窩左逆行穿經樓舊址東望有萬松庵少進不能通輿馬矣從雙棕樹直上頂心坡一舉足膝輒平心巖畔有太子石形甚肖遊人手摩幾平又數百級凡十三轉稍平敞一亭名觀心自亭右行曲轉有妙觀庵庵側有空庵禪堂俱據高臨下寥曠欲騫自亭仰躋箭括通天左峙石丈餘右小石結土阜小遜俗名鬼門關又前石子雷單亙一脊左右陡巖名大小鵝嶺脊將盡其下空洞梁度俗呼仙女橋又上數轉山坳微敞結小庵名息心所由庵左順山斜行過峽復上升甚陡為石碑岡一碑屹然字迹漫滅不可讀不數武履仄徑而下沿巖行過峽路不盈尺則有大小雲壑俗名大小深坑又前順巖而上歷數十折皆仰登下視石壁如削不知幾百仞所恃灌木叢篁層纍蒙翳不欲示人以險又前長老坪舊庵就圮近有結茅以應乞漿者由坪出山肩駱駝嶺漫行數里許為初殿昔漢蒲公採藥見鹿處後人立此殿或云山形類鷟名鷟殿或云簇店下有蒲氏村居無他姓皆蒲公後也又前上舊有小石坎水清不涸不溢俗呼一碗水又前九嶺岡劍脊直上左峯劖出羣岫名華嚴頂又前蛇倒退又兩折稍下左巖口有小徑通九老洞又前右坡下有九龍坪度巖直上一坪道傍枯幹頑石皆衣苔蘚此地因名木籠鬆又前蓮華石建有庵榜蓮華社道左一石蘂劈肖芙蕖又前過峽望一陡徑直上層霄左瀕危壁名鵓鴿鑽天上有石砌小池僅丈許僧云菩薩洗象池傍一石僅二尺僧云升象石自白水至此游蹤稍適因名其嶺曰初歡喜又曰錯歡喜以前去尚有險在今建庵名初喜亭然遊者必增衣易巾斯有以制寒再上數百級石碑亭又百餘級羅漢洞僅石罅數尺不審何以冒茲名或以舊有一石類應真歟又上數百級滑石溝過此坪行里許危磴直下數百尺有化城寺殿舍皆用木皮覆椽易以瓦霜雪所薄輒碎也寺碣紀昔有昆明施紹高太和王藎台來此遇白猿獻三果各啖其一仙去由寺左迂行前峻坂亂石直上三里梅子坡攀援而上有猢猻梯崱屴百轉素雲冉冉不絶道傍一殿曰白雲從此仰望山脈作三支自初喜亭至是晦明風雨時時與山椒山足絶不雷同氣候攸判矣自白雲殿順行古木連蜷荒煙岑樾中殷殷作砰訇聲者雷洞坪也風雨雷電自下倒射宮巖萬仞路絶夤緣巨石阜列岫塗曲通瀕巖有雷神殿路豎鐵碑禁人語相傳下有七十二洞雲濤布濩色妒羅綿茲洞其聚族處耳洞傍仄徑從九嶺岡巖左螺折而行至此與洪椿坪相望其下多石龕古蹟最奇者莫如九老仙人洞昔黃帝訪廣成子天皇真人遊此遇一叟洞外詢有侶乎答以九人今名以此巖棧曳練石首崴盤如象鼻右衽洞扃從闑左入必然炬乃諳道聞昔有結伴欲窮其勝者入洞內里許巖水滲滴成泉僧名觀音水窩止一盂取不竭不取亦不盈再行十餘里路少狹怪石森列若虎豹魍魎勢欲攫人忽一溪斜逝噴薄作聲疑鳴吠樂音從遙遞耳蝙蝠如鴉競來撲炬氣且寒冽刺肌遂逡巡不敢度而返巖下一泉久雨將晴久晴將雨前一日取供炊白粲必赤餘日不然名卜應泉洞前回瞻絶壁云即化城寺後山與雷洞坪共一山脈其峯多木蓮四季葳蕤若續從此遡伏羲女媧諸洞當不遠鬼谷子於此著珞琭子亦有洞但閜壑陵虛迹絶人鳥徒遐矚而已由雷洞坪曲折沿巖亙數里過新殿則八十四盤名桫欏坪桫欏樹高可三五七丈葉似枇杷花備黃紅紫白諸色叢蘂並蒂大可尺許三四月最盛第性喜寒不耐暄燥移下方多不育俗輒詭其說謂菩薩私玩此界多此花故名稍折有接引庵再前路分兩歧從左陡上為舊路一巨石橫巖下名觀音巖直至大歡喜前至回龍庵與新路合從右平行里許危巖仰登凡數百丈名三倒拐復沿坡上為太子坪再前圓覺庵庵左有小徑可達山後諸庵自庵右轉上行為登頂通途右有居庵洪範庵左有法慧庵又上觀音庵又左回龍庵與舊路合又前圓覺庵由左折而上老僧樹大數抱