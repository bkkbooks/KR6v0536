body:
  text: 峨眉山位於四川峨眉縣西南山脈由岷山伸展而出岡巒疊起氣勢如虹蜿蜒三百多里周圓一千餘里直逼峨眉縣境突起三主峯稱大峨中峨小峨一脈相連兩山相對如峨眉又此山狀若雲鬟凝翠鬒黛遙妝真如螓首峨眉細而長美而豔也故名三峨中之中峨即二峨古綏山一名覆篷上有天池小峨即三峨一名鏵刃山距二峨九里高半之大峨周千里高二百二十里南北有臺前即二峨三峨然二山俱以大峨得名峨山在蜀為最高峻蓋衆山盤礡而成李白有詩峨眉高出西極天羅浮直與青冥齊宋人有詩云蜀山天下奇三峨壓岷石誰謂孤劍下名出嵩華後世人尊之為中國佛教四大名山之一也峨山本普賢菩薩應化之道場也歷代王臣悉從事於建設致使琳宮紺殿棋布雲巖草舍茅篷星羅幽岫其寺之較著者有光相寺聖積寺伏虎寺華嚴寺中峯寺黑水寺後牛心寺萬年寺靈巖寺等七十餘所菴堂殿院閣更不計其數蔚為佛國明代末年胡菊潭著譯峨籟清康熙十一年一六七二蔣超據之並增益四川總志峨眉縣志蜀中廣記等之所載為編峨眉山志康熙二十六年一六八七曹熙衡重加修飾民國二十三年一九三四釋印光重修四大名山志峨眉山志即據蔣超舊志加以訂正釐為八卷分門十一星野圖説菩薩聖迹全山形勝寺菴勝概感應靈異歷代高僧王臣外護仙隱流寓古今藝文動植物産蔣編志餘唯多據蔣超舊志為之訂正耳於有清一代之此山名德及新建寺庵概不闌入茲據民國二十三年一九三四排印本景印重修峨眉山志流通序普賢菩薩道證一真德圓兩足住寂光而興慈運悲輔善逝而帶果行因具遮那之全體示居補處結華嚴之大義指歸西方雖盡十方法界無非所住真境而此大光明山實為應化道場溯其立名之意蓋以佛光晝現聖鐙夜來亙古今而無或隱滅盡來際以啓牖羣生由是之故致此峨眉寶山亦稱大光明焉一以形勢立名一以聖迹取號固無別種因緣也而一班不知菩薩德相者欲借經言以見重謬引華嚴經菩薩住處品云西南方有處名光明山從昔已來諸菩薩衆於中止住現有菩薩名曰賢勝與其眷屬諸菩薩衆三千人俱常在其中而演説法夫如來在天竺之中摩竭提國成等正覺説華嚴經凡歷七處而有九會初會即在菩提場説二會七會八會皆在普光明殿説此殿亦在菩提場中菩薩住處品乃第七會所説之一品先説東南西北之四方次説東北東南西南西北之四維方位次第井然不亂彼見有光明山三字遂謂此西南方指震旦國之峨眉在中國之西南於現有菩薩名曰賢勝妄加注曰即普賢也普賢亦名遍吉未見又名賢勝也援經而深悖於經是欲令人生信而反致人起疑也不知普賢之德相以如來智慧窮劫莫宣華嚴經八十一卷其發揮普賢菩薩神通智慧道德功業者有十餘卷經若稍加研究則何肯謬引譬如輪王駐處即是王都光明到處了無黑暗由是今志特立菩薩聖迹一門於中分為六章一釋名略釋普賢名義二修證節録悲華楞嚴二經以明菩薩因地修證工夫然據如來不思議境界經則菩薩久已成佛其本地非佛莫知也三德相略引華嚴經稱讚菩薩不可思議神通道力四法要略明菩薩所説法要而普賢行願品以十大願王導歸極樂普勸善財及華藏海衆一致進行回向往生西方極樂世界以期圓滿佛果而為華嚴一經之歸宿是知此一卷經大開淨土法門實為十方三世一切諸佛上成佛道下化衆生成始成終之總持法門三根普被聖凡齊攝末世行人皆當依止故録其全文以期同登蓮邦焉五利行節録法華經觀普賢菩薩行法經略明菩薩衛護行人之事六應化明菩薩證窮法界故於十方法界隨類現身應以何身得度者即現何身而為説法故十方法界皆可作菩薩道場然欲衆生投誠有地故特於峨眉山示應化焉須知菩薩應化有普有專普則大衆咸得親見專則唯己自心明了例如雲端現相衆目同觀圓光攝身縱齊肩並立有許多人而人人各見己身不見他身於此二者可知菩薩神應無方非凡夫二乘所能測度具此不思議義又何必謬引經文以自誣而貽人笑柄耶舊志所載殊多訛謬如千歲寶掌於卷二諸經發明云漢永平癸亥之前已住此山蒲公見鹿迹如蓮華徑投寶掌問之掌令往洛陽問摩騰法蘭二師蒲公于甲子往洛陽謁二師不知甲子即明帝七年始遣蔡愔秦景王遵等往西域尋佛法至十年丁卯二師隨諸人始來洛陽按傳鐙録本傳云東漢獻帝建安二十四年來中國魏晉間入蜀禮普賢留大慈舊志本傳只略東漢獻帝等一句何不以此證前之訛而竟兩存之亦不説其孰是孰非耶於一生不至西蜀之智者大師亦為立傳且日與茂真尊者孫真人奕棊於呼應峯下之棊盤石上又建呼應庵以居均以相呼相應以奕棊為峯名庵名作此説者不但不知智者且絶不知佛法智者一生以身為法作後學模範何得日與間僧曠道常行犯佛禁戒玩物喪志之事乎玄奘生於隋文帝仁壽四年甲子其兄長捷法師令其出家居洛陽淨土寺十五歲因隋室喪亂至長安時唐室初立尚事翦削無暇弘法遂與其兄往成都求學未幾聲聞遠著武德五年於成都受具思欲入京以期聞所未聞為兄所留遂私遁由三峽達漢陽至相州沿途求學弘法後至長安欲追法顯智嚴之迹結侶上表往遊西域求所無經斯時世始太平中外尚未交通故詔不允許衆咸退心師獨不屈乃於貞觀三年八月私去歷一十七年始回中國及至于闐即遣使上表太宗太宗優詔答之且令沿途有司各為護衛迎送師聞帝欲問罪遼濱恐稽遲不遇遂兼程而進由流沙至沙州是由甘肅而來者帝敕有司備儀仗相迎忽至京城之西漕有司莫知所措以按程備儀師兼程而進故致有失此後日事翻譯未及卒業而寂何得有履西域至峨眉九老洞值聖真説偈授經之事乎但以世遠人亡屢經滄桑志乘軼失無所依據遂致以訛傳訛無由考正故致然也當明季時胡世安公好遊山而信佛未息心以研究故其博採藝文輯譯峨籟實為清蔣虎臣山志之權輿虎臣自謂於譯峨籟一字不遺然其所録總以敘述山峯之聳峻巖壑之幽秀風雲之變態寺宇之興廢而已至於普賢興慈運悲四衆竭誠盡敬之所以然尚不能稍為形容況菩薩之本地風光四衆之心契覺海者又何能一為形容耶又此山昔有道教自大法昌明後漸次歸真明果滅妖乾明作中峯之寺羽流感德黃冠為緇衣之僧自後一致進行歸依三寶道教絶響已千餘年舊志於普賢及古高僧有經傳可考證者尚多錯訛況於絶響已久之道教事實能無訛謬乎黃帝往空同山問道於廣成子載於莊子在宥篇何得又往峨眉復問道於天皇真人乎天皇真人即廣成子黃帝係有天下之責任者非間曠僧道隨意雲遊者比空同已去兩次而有所悟即廣成子移居峨眉黃帝何得又往峨眉況蜀道之難今尚興歎當黃帝時不比今更難百千倍乎故知此諸記載悉屬虛設即的確之極亦無關緊要以此所説之法乃佛法中人乘天乘兩間之法峨眉道教久已絶響又何猶立此法以致後世惑於兩歧莫知去向乎故將此種記載多為刪去揭佛日以普照三根亦天皇真人之讚許者印光一介庸僧何敢妄充通家修輯四大名山之山志但以挂搭普陀三十餘年民十一年定海知事陶在東公倡修普陀山志請邑儒王雅三先生主其事王君於儒可稱博洽於佛未涉門徑志成而山中耆宿命光重修光以近來刻排各書了無有暇至十九年掩關蘇垣始得出書一弟子李圓淨熱心公益謂普陀五臺峨眉九華為中國四大名山師既將普陀志修妥印行五臺峨眉九華三山志亦不得置之不理於是特祈前著觀音菩薩本迹感應頌及歷史感應統紀佛學救劫編之江西彭澤皈依弟子許止淨居士標示綱要光但任其割貼安頓與印行校對則歸於現遙領贑州壽量寺住持德森法師與陳無我居士五臺志去年已出書峨眉志不久亦可付印九華志或於明年春夏間可出四山舊志唯五臺最嘉普陀次之峨眉又次之九華最居其下良以三山志皆屬不通佛學之儒士所修故致買櫝還珠敬卒隸而慢主人只在山之形勢變幻處致力不在菩薩興慈運悲拔苦與樂處形容志山而不志佛顛倒行事雖有其志不能令見者聞者增長善根種菩提因此今志之所深致意者故為略示其意然以未曾親歷其境之人不能詳加詢訪故只按舊志及諸經傳而為證訂至於近來名德及新建築概不加入以免逸軼名德之咎挂一漏萬之譏具眼知識當能諒之民國二十三年甲戌孟秋古莘常慚愧僧釋印光撰峨眉山志舊序一嘗讀冀越通云地脈向中國來者三支南絡發昆崙迤東南而行至大峨山直南折而東為五嶺復折而東北大盡於建康其支絡於吳閩越是峨山為昆崙之次明矣故有伯仲之稱又讀書記洞詮云三峨高出五嶽秀甲九州震旦國第一山也顧其山不入五嶽而列於四大名山之一其初為天皇真人即廣成子所居軒轅黃帝問道於此授三一五牙之經繼為普賢菩薩道場設化城居大衆三千人有佛光聖鐙之現而琳宮梵剎踵事增華遐方瓣香重繭遠進遂化而為釋氏區宇矣要之峨眉固自峨眉也善乎胡菊潭先生之言曰斯山真面目不隨蓬海三淺知言哉然往古來今事迹變幻如騎牛而仙歌鳳而隱刺蟒以救黃冠跨虎而渡溪漲人之異也龍子可掬桫欏燦爛雷鳴於山腰雪積於盛夏物之異也洞傳伏羲鬼谷徑險鵓鴿鑽天空樹老僧定數百年兜羅綿雲鋪幾千丈景之異也其他幽奇奧邃莫可殫述題詠記讚纍案盈緗不有山志烏乎稽考自明代己卯菊潭先生遊峨已云索山志舊著罕有存者唯喻廣文志祥有山志脫稿菊潭謂其搜羅博而未精考核詳而不要去取臆而附會多尤劣於山史一卷經菊潭評駁其書遂不傳矣乃菊潭先生三次登峨著譯峨籟後三十餘年金陵蔣太史虎臣寓峨山始取峨籟稍加增益為山志然太史被二豎相侵草草卒業倫次欠楚未付剞劂而捐館因是尚闕焉有待其稿藏於可聞禪師之笥余以今上之二十有五年奉命分巡建南峨眉乃吾隸也念境內名山大川不有以表彰之不可況修廢舉墜尤關職業失今不志後將無述爰取虎臣太史脫稿與宿士商訂重加修飾分條析項淆訛者正之紊亂者清之繁蕪者裁之迹無與於茲山者去之事可紀於近今者增之一筆墨間而峨之山水形勝宮觀殿剎人物古迹詞翰藝文暸如指掌燦若列眉可以備窮搜可以供臥遊蓋自是而峨乃有山志矣亦以成菊潭先生虎臣太史二公未竟之緒而余且得邀靈於名山以逭曠事之譏云爾清康熙二十六年歲次丁卯季夏之吉中議大夫分巡建昌道按察司副使今升貴州等處提刑按察使司按察使錦州曹熙衡素徵題峨眉山志舊序二西蜀之有峨眉坤輿一巨鎮也北控三川南界百蠻井鬼之所照臨神仙之所窟宅雖祀典不在五嶽之列而功實過之禹貢紀載而後常璩任豫張華酈道元輩表章精奧不一其人宜矣余奉命撫蜀職在奠安常懼一物失所貽山靈羞甫下車值有採辦楠木之役單騎邛郲探尋運道因得一登初地而軍務旁午信宿言旋其中溪谷之幽異風雲之變幻恍惚一寓目耳然以險遠崎嶇繕疏陳請蒙恩罷採民獲休息雖皇仁覃敷不可謂非茲山之靈默相而呵護之也余性耽山水而拘牽官署每憑欄送目覺三百里外雪光雲影遙遙襲人襟袖欲尋古人紀載以當臥遊而兵燹之餘燬失殆盡一日川南憲副曹君持峨眉山志相示則憲副啓其事而余首閲圖説出近代胡菊潭相國手修志凡例斷自蔣虎臣太史嗟乎茲山之在西南詎止比肩於嵩岱衡廬武夷雁宕之勝登茲山者詎無有好遊如尚平康樂其人者乎往哲無聞歌詠中絶河山之變增人悽感然所載古迹勝境若光若鐙若臺若榭以迄於藝文志餘列諸几案綽然如陵嵐霧之幽深沆瀣之芬洌也宗少文曰豎劃三寸當千仞之高橫墨數尺體百里之遠余無俟筍輿筇杖而坐收茲山之奇秀焉又為之一快矣抑峨眉有屏翰之功於蜀而禋祀遜五嶽説者以為名山之隱逸者也清康熙二十七年戊辰歲仲春之吉賜進士第通議大夫巡撫四川等處地方提督軍務都察院右僉都御史楚黃姚締虞撰峨眉山志舊序三昔逸少先生志遊峨而卒不果恆太息緣之未足衲每服膺其言及成峨志而益感慨係之夫山之於人與人之於山洵有緣也哉太史虎臣蔣先生木天顧輔一旦塵視軒冕扶舁來峨止蒲榻於山寺出其奚囊所貯峨山志稿與衲訂以見聞風雨晦明兩易寒暄成帙一十八卷而志餘一卷尤叮嚀旨趣言言金石字字醍醐起茲山從前之所未有而一一開其面目山顧於太史有前緣耶不然太史初未涉於峨而乃斂其散逸以集其成寸寸而纍早已脫稿於燃藜天祿度日花磚珥筆不遑之秋且卒如其意來止欣欣也觀其回首一偈謂茲山之老衲再來而前緣為益信矣嗟乎衲昔當蜀經灰劫餘吳帆萬里來禮願王山水羈人若逢吾故于伏虎古迹不惜頂踵剃草開林為願王廣大行數十年間未敢少懈招提大概始觀厥成溯洄壯遊曾幾何日而今且倏近桑榆質衰蒲柳矣讀太史遺編兢兢然唯恐以緣為太史羡者徒亦以緣為太史謝之也幸荷護法諸大檀越善太史之勝因覓以棗梨授之剞劂俾與山靈同貞不朽竊幸太史有願克諧矣然則太史豈僅與山為緣而山又豈僅與太史為緣哉今而後後戒禪身廣象教力者欲有以各證其緣即以斯志為龜鑑也可清康熙二十八年己巳菊月穀旦伏虎寺住持海源謹識修山志説名山可以神會不可以目窮可以心契不可以言傳言傳者其迹耳而山之精靈不與焉要其迹亦不可以不傳則言固未可廢也肄樟棲霞飲谷方外自遣素奉教於梅莊何先生一旦先生以憲副素徵曹先生之命舉峨眉山志下商樟愧譾劣罔所識知然聞工人之治器也遇大器必專心致志畢思殫慮以治之故器可成而不憂其窳敗峨志之役大器也於是細加參考字斟句酌釐正倫次汰黜影附分別條項校訂訛舛增益新聞每條以小序數語引其端俾便省覽凡以敬慎厥事庶幾以言傳者不至言之過而流於溢言不及而失於隘焉耳古戎後學宋肄樟謹識補遺峨眉山志記峨山為坤輿具瞻昔人言之詳矣豫幸承乏斯邑得以循其麓而躋其巔陟險窮幽登峯造極真極天下之大觀然而名山形勝以心契不以目窮公餘之暇嘗取志書而卒讀之神之所遊不啻足之所履惜乎書多脫簡不能遍觀而盡識也爰博訪都人士得家藏舊志一部悉心校閲間有後人添入詩章錯訛殘缺者舊本不載未敢妄增仍闕以待補焉其餘字迹之模糊書目之失次篇章之遺亡悉照舊本一一更訂增入統計原板及添刻共三百二十六塊刷印成編俾後之遊峨山者可以按籍冥搜即不遊峨山者亦得開卷而攬全勝也是為記清道光十四年甲午四月之吉賜進士出身知峨眉縣事粵東胡林秀識峨眉山舊志凡例修山志與郡邑志不同是編凡關係山中形勝僧家典故雖細必書其有高山大川琳宮寶剎不係峨山地界者一概不敢妄入是編原本井研胡閣老譯峨籟兵火之餘山中片紙隻字俱無其書所載不忍一字遺失所輯前人詩賦俱經壽梓其餘憑仗別集網羅及各寺僧抄録名賢題詠者僭妄刪去十之一二非敢立異亦以成美云爾志以徵信不可貪圖怪異捃托成編如上林橘柚芳洲杜若取快一時貽譏千古是編凡禪宗仙伯非確在峨眉修真養性及投筇飛錫過化此方者不敢妄入其餘土産方物除茶筍之外如雪蛆空青放光石雷威琴之類古有是名今無是物必後人傳訛襲響重為地方纍特為剖白纖悉識者辨之是編除原本譯峨籟外止據四川總志及嘉定州峨眉縣志蜀中廣記等書取裁不廣考訂不精止可為名山留一影像耳峨眉山道前後名賢遊記開載甚詳然亦有蠟屐所過親攜筆札登記者亦有事後默識記一遺十者又有旁詢住僧及輿徒皂侲者言語錯亂頭尾倒置或將歸路認為去路或即一處指為兩處今皆一一咨詢考訂詳明以後登山如聚米書裙免致車中指視頗稱快事舊志遺史無從考訂謹據峨眉縣志所列山水無多至山中老僧傳説半多附會如一青蓮峯分為二峯曰大尖曰蓮華一井絡泉稱為五處曰聖水曰觀音曰通精曰半月又名賢遊記中有本無是山偶憑耳食又登掌記者如大歡喜亭八十四盤上有桫欏坪查桫欏坪在千佛頂後與師子羅漢等坪同列若初登頂時並無所謂桫欏坪者如以桫欏得名此花遍滿山頂如秦廬粵鎛何處無之華嚴閣圓通庵全無影響今皆一一改正前人有知想亦喜稱起豫耳山中舊有庵堂寺院名目極多滄桑後金璧瓦礫楩梓梧丘不敢盡為淹沒僅留虛名於楮墨間在愚見不問孤居侶處現前佛屋連椽接棟儘可為容衆棲身之地不必又拘興復之説再圖募化徒費精神是在高明毅然作一豎剎竟義也可志成每苦上臺檄取為往來應酬之用僧家拮據楮蠟供給工匠酒食之類轉成大纍今當預啓當事凡欲取志乞攜紙墨及工匠飯食入山自行印刷似此功德勝比尋常供佛飯僧十倍也清康熙十一年壬子仲秋望後四日華陽山人蔣超謹識新訂凡例四則舊凡例第一條謂山中形勝僧家典故雖細必書是矣唯普賢菩薩為此山之主僅於形勝門列諸經發明半紙餘其中多係臆説訛傳唯楞嚴圓通章為實録殊多遺憾故今略引華嚴法華各大乘經及僧傳所載確實可據者將普賢菩薩本迹感應表彰出之為聖迹門俾閲者得生信仰而有所遵行以獲受用實益耳山中形勝舊志將峯巖臺石等分類録之絶少貫串令人茫然於前後上下各位置求之遊記中又嫌過多且各人所記不同莫衷一是今於卷首列新增圖説閲者按圖探路恍如身入其境足增臥遊之興而原有遊記酌加刪削免繁多寡味峨眉雖非必為華嚴之光明山而光鐙示現之奇特實為諸名山首屈一指誠如觀音大士所謂現種種不思議色淨光明網攝取衆生者豈非普賢之大願力有以致之歟故特闢靈異一門將遊記中之見光見鐙及其他感應事迹彙入之示所以尊仰菩薩而導引衆生也山志求閲者身心獲益以宏揚佛法為主要形勝寺院已為餘緒至於藝文益末矣宏揚佛法首重高僧而王臣護法使僧衆安居修道即俾黎庶消災得福亦最當崇飾為後人矜式故舊志藝文內僧家塔銘概改入高僧內而皇家頒賜及建修寺廟各記另闢外護一門收之以示此等紀載關於三寶非徒以文字見長也總目上册卷一十九頁一星野圖説卷二二十九頁二菩薩聖迹分六小目一釋名二修證三德相四法要五利行六應化卷三二十八頁三全山形勝卷四十一頁四寺庵勝概五感應靈異下册卷五二十九頁六歷代高僧卷六二十一頁七王臣外護八仙隱流寓卷七二十五頁九古今藝文卷八二十一頁十動植物産十一蔣編志餘大方廣佛華嚴經普賢菩薩行願品節要普賢菩薩告善財言善男子如來功德假使十方一切諸佛經不可説不可説佛剎極微塵數劫相續演説不可窮盡若欲成就此功德門應修十種廣大行願何等為十一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恆順衆生十者普皆回向若諸菩薩於此大願隨順趣入則能成熟一切衆生則能隨順阿耨多羅三藐三菩提則能成滿普賢菩薩諸行願海是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切衆生悉應供養又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界
