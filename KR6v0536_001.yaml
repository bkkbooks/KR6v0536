body:
  text: 第一星野圖説初星野次圖説星則在天成象野則在地成形郡邑諸志皆以星野定方位況峨眉乃普賢菩薩應化之聖道場地為全省之巨鎮作人民之具瞻其廣踞數百里其高聳數千仞乎山不能一目遍觀覽圖則即知其概圖不能向背悉見視説則全體圓彰雖廣數百里高數千仞持圖而閲之即可心領山勢于方寸間緬想佛化于億萬世故志星野圖説初星野者常璩云西崦峨嶓地稱天府其精靈上應井絡河圖括地象云峨嶓上值天井故多雨潦占候井明大盛多風雨月犯井多風雨日暈井多陰雨大風是也張子家峨山志謂峨山在九囿中下鎮梁益上應鶉首為南戒同界之宗與秦同分熊南沙過跋云志敘分野既引夾漈之説明常璩以為井絡者無據矣其稽南戒而定峨嶓以為在井絡之南亦終未能曉然自解乎夾漈之疑而又曰星應輿鬼君子精敏小人詭黠則疑于口給誇多自變井絡之説矣按井絡宮曰巨蟹辰曰未方曰西南在地坤維值坤故多文章值未故尚滋味德在少昊又尚辛香也峨位西南物産相符則井絡之説近之熊跋亦未盡也天文志謂嘉定屬東井輿鬼分野今州治峨山上當井絡故山頂有井絡泉次圖説者舊志圖甚簡略止標大概亦無有説自清光緒十一年奏列祀典遂遍探山勢而為圖説今欲廣傳篇幅多則難於流通故于圖只取其總而去其別悉存其説庶閲者仍得其詳原書序跋悉録如下峨眉山志圖説序凡志首重圖説而山志為最蓋郡縣志計里開方紀其廣輪嬴縮方隅繡錯詳其山川險要道路津梁俾守土者展卷瞭如備寇則厄要設防捕盜則刻期立至此其大略也而山志則疊嶂層巒橫峯側嶺峭壁撑空激湍截地綿亙數百里或足迹不能到亦目力不能窮倘以意揣則差之毫釐後有識者徒滋訾笑峨為蜀名山而不列祀典光緒乙酉總督丁公疏請春秋致祭奉旨俞允明年護理總督遊公乃遣候補道黃君綬芙有事於峨至則壇場寺庵皆奉佛像而山神之廟闕然搜求舊志則缺略惟多於是遊公籌款建廟於山麓并製祭器以供望祀而黃君毅然以纂修山志為己任談君晴峯工繪事以圖委之廖君笙堂俾輯説又明年而黃君卒圖未及半説亦未成何志事之難耶於是遊公憫有志之未成也復使談窮其圖縋巖梯嶮足趼叢山者纍月凡為圖六十有四補舊志所未及者十之七八廖仍為之説按新圖稽舊聞亦數月而竣事而遊公尤虞其未善也謂余分巡建南峨為屬境總修之責無可辭嘻其難也蓋其慎矣余於是披圖索瘢詳加考證刪訂其説衷諸一是不敢自以為功特不方遊公之命而已既刻而使余為之序余惟山祀始於丁公而遊公為之廟山志始於黃君而遊公落其成圖則談之勞説亦廖之績余何力之有焉然余竊喜圖説成而願往者可為先導未至者可當臥遊既往者如逢故境豈非一大快事哉余故樂為之序光緒十四年戊子十月善化黃錫燾書於建昌道署此序作於建南因遊公書來謂談圖廖説勤勞莫沒故序并及之余旋省後同鄉諸君皆謂説本黃君綬芙原稿廖特修飾之耳序言失實是則遊公之故也茲識於序後以補余過且免後來作刊謬多著議論也十五年二月初吉錫燾又識峨眉山圖記峨眉山者西蜀之雄鎮高百餘里相傳為普賢菩薩道場梵林如櫛最著者為伏虎善覺報國萬年靈巖天門仙峯諸寺其他如大坪洪椿長老太子雷洞諸坪清音閣華嚴頂洗象池沈香塔銅鐵錫金祖諸殿莫不稱大觀焉其間峯巒層疊若玉女若寶掌若鸑鷟若獅駝若筍若蓮若爐若鉢備極崢嶸石有亮光太子大峨天門魚兒蓮華聖鐘法船飛劍象鼻牛心仙人羅漢太湖等名形似物者不可指數橋有雙飛仙女七天涼風無懷鐵索木棧石梁凡橫流斷壑皆藉以通水有黑白雙溪龍門倒峽瀑布飛崖諸噴泉險有鵓鴿鑽天猴子坡蛇倒退長壽坡放光坡壽星坡羅漢坡陡曲而滑洞有九老三仙雄黃鬼谷伏羲女媧左慈龍門豬肝爛柯紫芝桂花三魈及無名號者凡千百草木有桫欏樹浮圖松菩薩藤木芙蓉木涼傘及一切奇花異草多莫能名禽有二迦陵異鳥飛翔上下佛光現時始鳴曰佛現了獸有人熊虎狼質頗小者其鳴陀佛人以比邱字之蟲有蛙鳴聲如琴有大蟒圍可三尺長十丈許鱗甲晶瑩稱之曰龍居士有蜥蜴方首五爪藏水石間目為龍子氣候則陰晴不定變幻萬千即如雪有千年積雷有掃殿期雷洞坪有人聲烈風暴雨冰雹即至者良可怪也其中古迹若軒轅訪道處涪翁習靜處蒲氏老人村東坡摩崖字右軍河南碑皆不足奇所異者金頂祖殿懸巖絶壁處朝夕雲海霧氣忽聚忽散每至未刻兜羅綿雲布滿巖下現圓光一團邊分五色七層間暈為佛光如鏡覩者自見其形雖並立之人絶不能見為攝身光遠者為水盆光有氣如虹橫亙數里兩端紫雲捧之為金橋奇觀哉夜有燈光磷磷飛滿崖壑為萬盞神燈朝普賢此更不可思議真福境也余攀躋越半載索險探幽身歷神會尤見瓦屋青城天竺雪嶺玉壘岷江若礪若帶數萬里奔來眼底者竊歎此山形勝甲天下耳遂竭耳目心思摹其圖而並為之記衡山談鍾嶽晴峯圖并識一峨眉山總圖説此峨山總圖也世傳大峨為黃帝問道於廣成子處佛經稱普賢道場歷建大小七十餘廟皆奉普賢故雖天下名山未列祀典攬勝遊蹤爰稽志乘而闕略維多兹繪總圖較加詳慎然亦發其大凡至窮原竟委備悉分圖可按而索也自峨眉縣出南門至正頂計程百二十里凡山路水道寺宇峯巒古迹一一縷載燦若列眉餘詳散圖顧復初書談鍾嶽繪二峨眉縣至回龍寺圖説峨眉縣治漢南安縣後周平羌縣地隋開皇初為峨眉縣元和志曰枕峨眉山東麓故名開皇十三年置屬眉郡唐宋屬嘉州元屬嘉定路明屬嘉定州至清雍正十三年改州為府縣屬焉東北各一門西門二南門二遊山者出大南門門曰勝峯諸峯相對蒼翠環照過石橋曰儒林古化龍橋亦名勝峯儒林街人家數十南行至回龍寺小而幽比丘尼居之前臨澗水碧玉縈回古樹數株西坡古剎在其間唐武德六年建舊名壽聖西坡寺今就圮三回龍寺至峨神廟圖説山神舊無廟祀至清光緒十有一年四川總督丁文誠公寶楨以峨為山鎮水旱癘疫禱求輒應有功德於民奏請春秋致祭部議奉旨俞允其明年護理總督遊廉訪智開捐建峨神廟於縣南城外學堂山並製祭器歲遣官望祀咸於斯廟門外有泮池故址井研胡世安登峨道里紀云聖宮外合三流為泮澄波千頃鱉樂蓮香亦多雅致即茲地矣前瞻古塔後倚崇山嘉樹叢篁映帶左右遊人至此遠觀近矚蒼翠紛來飄飄然不啻置身兜羅綿雲表也四峨神廟至什方院圖説由峨神廟上行過古石坊右為川主宮正殿祀李二郎神前有劇臺後鄰什方院院外歧路中𧐖蜷樛結有涼亭一夏秋時清風徐來遊人多憩於此五什方院至壁山廟圖説出什方院道途平坦經薛家店至壁山廟廟古朴中祀風雲雷雨之神一路榕木森森蔭周數畝堪避暑雨六壁山廟至菩提庵圖説由壁山廟西南行二里許有菩提庵在路左門對四峨如玉屏前立出庵左行百餘步茅屋數椽古致歷落連畦蠟樹蔥蘢居民賴以為利七菩提庵至興聖寺圖説過菩提庵沿茅屋行百餘步茂林修竹中左為興聖寺寺宇兩層佛像尊嚴山門外路嵌鞾石以形似呼之遙望金頂及衆山最高處歷歷可數按舊志興聖庵近聖積寺疑此即古興聖也八興聖寺至聖積寺圖説由興聖寺順行有石坊清乾隆乙丑年住持性琳建路左即聖積寺為古慈福院明萬曆壬午川南道參議高重題篆字碑豎寺外相傳為軒轅問道處正德三年內江王公重修之萬曆丁酉四川巡撫萬任布政使楊國明重建接引殿康熙十一年御史董明命重建大雄寶殿殿內銅鑄普賢騎象像金身丈六象伏地長亦如之兩旁銅佛頗多殿外左懸八卦銅鐘高九尺徑八尺重二萬五千斤右峙銅塔高二丈許十有四層鑄佛四千七百尊旁鐫華嚴經全部永川萬華軒施製前有樓曰真境一名老寶訛呼了鴇乃慧寶禪師建額題峨峯真境四大字宋魏了翁華甫鶴山書也相傳范蜀公書有簡板一幅云半天開佛閣平地見人家今佚九聖積寺至文昌廟圖説由聖積寺大道行過普安橋一名普庵橋又曰普賢橋水出銅河即余大師坐化處昔人稱有普賢殿普安院今俱廢右上為文昌廟廟後有八卦井今廢惟源泉混混灌注田疇農無旱魃之患出廟左行經石坊有瓦店一家即往保寧寺之坦途也十文昌廟至保寧寺圖説由瓦店平行二里許即保寧寺古卓錫庵明嘉靖四十四年僧德統建萬曆辛卯僧德佐重建清康熙五十年僧峨雲復修葺之因易今名歷經雍正三年連碧禪師嘉慶十三年仁寬禪師隨廢隨舉代有經營增其壯麗瀠洄水抱平遠山環不亞聖積真境十一保寧寺至子龍廟圖説由保寧寺上走兩河口過石橋即蕭店子茅屋數十家再上里許至子龍廟廟外順河下為萬行莊古海會堂右通冠峨場後即光明壩十二子龍廟至報國寺圖説由子龍廟沿河而上漸入山徑里許繞古樹林進報國寺古會宗堂一名問宗堂又曰會宗坊道人明光開建有碑記立伏虎寺堂原在伏虎寺右山麓虎頭山之陽嗣遷至此初仍舊額後易今名按明光著有心經楞嚴經解八識規矩注會心録禪林功課大乘百法注峨眉傳等書行世寺左往龍門洞捷徑也十三報國寺至善覺寺圖説出報國寺仍由大路上行有木坊榜善覺寺三字登其峯有二坪前為善覺寺即古降龍寺明萬曆時道德禪師建清康熙間賜元亨禪師龍廂善覺寺匾額因以為名并賜玉印一顆其文曰普賢願王法寶御書玉音一章至今珍藏之寺後宋皇坪乃天皇授道於軒轅處寺左山麓宋紹興間虎狼為患人不敢至士性禪師建尊勝幢以鎮之患遂絶十四善覺寺至伏虎寺圖説由善覺寺下行不數里即合大路路右關帝廟廟右響水橋為下報國寺直道也由路左順上過木坊榜曰伏虎寺經興隆橋土地廟玉皇樓再前虎溪橋橋下石子細潤如玉屈曲上行路左有龍神廟渡發隆橋經觀音堂即伏虎寺行僧心安開建明末燬於兵燹清初僧貫之率徒可聞結茅為虎溪精舍順治十八年川省大僚捐廉興建經營十餘載始告成功前後左右凡十有三層崇隆廣大為入峨第一大觀也光緒十年僧靜安重新之右後為龍鳳輝室康熙壬子蔣虎臣太史超自稱華陽山人寓此改名羅峯庵藏頒賜御書法寶匾額由伏虎寺左過木橋即無量殿殿後太湖石煎湯服之可療心氣上高洞口過涼風橋橋為清初四川巡撫羅公命僧可聞修古有涼風亭石壁峭削中有空洞風颼颼自口出曰涼風洞因以名亭谷口舊有震旦第一山坊今圮十五伏虎寺至雷音寺圖説由涼風橋上行半里許至馬家溝昔有茶庵今廢渡解脫橋水聲潺潺聽而忘倦謂入此解脫塵凡出此解脫險阻耳直上竹林陡窄滑澾木磴層層約高百餘丈為解脫坡左即古解脫庵又名觀音堂光緒十年改為雷音寺寺下有仙人會舊傳一池入山者必沐浴而後登今其址亦不存矣十六雷音寺至華嚴寺圖説由雷音寺直上為華嚴寺一名會福為唐昌福達道禪師道場僖宗時僧慧通易名歸雲閣宋紹興三年僧士性重修節梲旋螺制極奇古又名雲篆殿為白牛長老住持明洪武時僧廣圓奉敕重修掘地得宋碣鐫華嚴堠左刻至縣十五里右刻至頂七十里寺後有雲卷石山頂即古心坪因昔古心禪師建有靜室得名寺左過青竹橋有玉女池仰望尖秀插空者為玉女峯相傳池為天女浴器深廣四尺歲旱不涸宋邛州刺史馮楫結茅峯下日誦華嚴經不輟天女感而饋食焉池畔有飛龍庵每大風雨聞石中龍吟一夕雷劈石開龍飛去故名又有鳳嶺庵今俱廢路右有古楠一株大圍十餘尺孤挺數尋始敷枝葉青青如圓蓋可覆畝許俗呼木楠繖古名木涼繖十七華嚴寺至純陽殿圖説由木涼繖左上過木坊不數十武進純陽殿殿宇歷級而升重樓瑰瑋為明初御史郝衛陽所造崇禎六年巡按劉宗祥率峨眉令朱國柱捐金增修益稱完美殿後雲霧縹眇間有坪曰華嚴古稱赤城山相傳為赤城子隱居舊址向有香煙羅漢白雲等寺今一片荊榛無迹可尋殿左行里許忽逼窄異常不容輿馬明初蜀獻王遊峨至此下輦行五十三步後人重其步因以名其地十八純陽殿至會燈寺圖説由五十三步度凹平行里許即會燈寺寺右荒煙蔓草中有天台庵故址寺前陡下過小石梁為太平橋前望二山中凹稱馬鞍山茅屋數椽呼袁店子十九會燈寺至大峨寺圖説從袁店下坡過正心橋再過萬定橋古萬福橋又稱萬佛橋路右巨石壁立大峨石三字呂純陽書靈陵太妙之天六字明督學郭子章書路左神水池即玉液泉隋智者禪師知此水發源西域後卓錫荊門龍女為引神水並浮所寄中峯寺鉢杖自玉泉流出舊有神水通楚碑紀其事又有巨石刻陳圖南草書福壽字蘇東坡雲外流春字上有神水閣一名聖水閣明巡撫安慶吳用先建高僧化機隱此由閣右進大峨寺古福壽庵明僧性天開建後圮清初僧智行重建名大峨庵康熙間峨邊參將李楨增廣之易庵為寺光緒十一年僧圓明重修向有九曲渠流杯池靈文閣勝峯立禪彌陀等庵今俱廢惟寺後古松一株老幹龍鱗為千百年物上有中和石再上有歸子石一名魚兒石石有二孔水常溢不涸山頂為黃帽山後為寶掌峯寺外往左轉右即呵呼庵故址有鳳嘴石俗呼雞公石刻歌鳳臺三字相傳為楚狂陸通隱居舊廬明弘治間督學王敕改今名前即歌鳳橋古百福橋俗名響水橋往來聽之四山皆響如洪濤巨浪挾風雨而來昔人稱為山潮以之驗雨晴占豐歉為不爽云二十大峨寺至中峯寺圖説由歌鳳橋順上渡結緣橋行二里許即中峯寺一名集雲在晉為乾明觀資州明果禪師除蟒患始改為寺隋茂真尊者重修之相傳有孫王宋三真人羽化於此宋黃涪翁曾習靜其中即隋智者禪師寄鉢杖處也寺倚白雲峯一名白巖左即呼應峯原有呼應庵為智者禪師道場下有茂真尊者庵孫思邈真人隱峨眉時與禪師尊者集奕於茲常相呼應山後有三仙洞洞外有棋盤石方廣丈餘至今猶存右有雄黃石歷傳唐玄宗幸蜀夢真人乞武都雄黃石上遣使齎送至此煙雲相隔使者呼應因得造焉見一叟幅巾被褐危坐手指石曰致藥於此上有表録上皇帝中使顧石有朱書百餘字就録一行則行滅呼應之名或曰即此眉人程堂登峨見菩薩竹有結花於節外枝者茸密如球即寫於寺壁宛有生趣今佚二十一中峯寺至觀音寺圖説由中峯寺左上三望坡以路險峻行者三望乃至或云昔軒轅帝訪道天皇真人時曾於此三舉望祭故名前有石橋一道亦名三望舊有茶庵今廢層級而登進觀音寺寺內一石蹲峙呼雞母以形似也出寺往左上絲網坡向有怪異傷人自修寺後怪頓息二十二觀音寺至龍升岡圖説從絲網坡策杖攀藤盤旋里許躋龍升岡以岡名寺此地稍寬衍梵宇幽敞回望山後一峯獨峙圓轉自如名香爐峯以形肖也二十三龍升岡至廣福寺圖説從龍升岡下坡山境幽深野屋一間茅茨不翦平步徐行望煙雲舒卷中翠竹離離即廣福寺一名慈雲寺乃前牛心別院也寺後緑陰簇抱蔽虧天日為牛心嶺往石船子下龍門洞則從寺右小徑去矣二十四廣福寺至清音閣圖説由廣福寺左一路順下石磴粼粼苔蒼蘚碧水聲湍激殷殷如雷俯視雙流飛注鬥捷若不相下有橋翼然稱雙飛橋相傳左橋建自軒轅遊勝峯時水從黑龍潭繞白水寺而來右橋則自古至今幾經舉廢水從九老洞繞洪椿坪黑水寺而來出橋數十步兩水會合一石嶟峙為牛心石遊山者從右橋行數十武有瓦亭一頗軒敞為遊人小憩之所再過小亭內有明御史馬如蛟碑記又數十步由左進清音閣閣陵空高聳兩水環抱閣右一徑通金剛坡往大坪閣左則仍轉兩亭過左橋往白龍洞二十五清音閣至金龍寺圖説從左橋緣磴道北上過接御亭故址路右即古德林緑雲蔽天空翠欲滴為明時洪濟和尚手植楠樹即高僧會宗法號別傳也相傳當日種一樹誦法華經一字一禮拜按字計株植六萬九千七百七株天時地利手到春生今存十餘株皆本長丈餘始枝葉分起如兩手捧佛真不啻檀林祇樹從路左進白龍洞洞久淹毗盧僧建寺於其上仍舊名順上斑籜紛披猿鳥相逐剎竿隱隱出青靄間者為金龍寺二十六金龍寺至萬年寺圖説由金龍寺右上靈官樓古大峨樓云是公輸子所造明末燬於兵火清康熙間川督蔡育榮鼎新之乃易今名經四會亭有銅鑄接引佛像亭前向有普同總塔中大小數十塔別傳和尚塔在焉今廢直上又一亭豎第一山碑進聖壽萬年寺在晉為普賢寺唐僧慧通改白水寺即僧廣濬彈琴處宋為白水普賢寺明萬曆間敕改今名寺殿七層天王金剛七佛大佛四殿燬前毗盧中甎砌旋螺銅鑄普賢丈六騎象像象高長各丈許足踏三尺蓮華遍體為朝山者摩損光緒十三年署成綿龍茂道黃沛翹捐金修補並砌石欄以護之宋太宗真宗仁宗俱有御賜寶供康熙壬午有御賜經書後為新殿殿右山邊有明月池又號白水池從四會亭左過山王廟往慈聖庵明萬曆癸巳無窮禪師建藏慈聖太后御賜經典袈裟供器今尚有銅鐘一由庵左上海會堂即佛牙殿原有御賜紫衣及丁雲鵬畫歷代祖師像八十八軸今俱毀惟佛牙尚在重十三斤長尺二寬八寸厚三寸堂左數里有白衣庵故址再里許為淨水溪有淨水廟古淨業堂黃冠居之萬年寺左古楠一株橫圍二丈三尺五寸左上觀音閣後為正龍山前平地突起如盂呼鉢盂峯二十七萬年寺至觀心庵圖説從觀音閣右上里許道左有石高丈餘中有人形頭面手足俱備無斧鑿痕相傳為太子石右旋數折路左有羅漢洞上有山王廟橫過白果樹數株均十數圍境頗清幽稍坦處明時空安禪師開建觀心庵清乾隆間燬於火洪湛禪師重新之出庵右徑陡絶輿馬不通上為頂心坡又名觀心坡俗名點心坡以左右懸巖攢仰至頂六十里登者躡足膝輒點心云二十八觀心庵至息心所圖説循坡直上仰望怪石嶙嶙如排牙礪齒劍峙森嚴勢欲飛走者為鬼門關石嘴長拖形如象鼻稱象鼻巖又上石脊眠亙左右懸巖稱大小鵝嶺以形似鵝頸名之過關空空洞洞石梁數尺天然鞏固名仙女橋橋東北隅昔古智禪師建有萬松庵今廢渡橋直上結一剎名息心所上覆木板以蔽風雨右山有地藏庵故址從左路平行往石碑岡岡下數百步外一片荊榛為慶雲庵故址二十九息心所至長老坪圖説下石碑岡沿山行過峽道右巨石矗立呼觀音巖朝山者皆焚香禮拜前有石梁呼觀音橋左右懸空為雲壑雲煙常布幽深莫測所恃藤蘿古木叢茸遮蔽不欲示人以險者然僧云下有緑映沱水甘美再下有石洞風從內出呼風洞過橋上坡甚陡峻名放光坡相傳為普賢現瑞之所上即長老坪寺頗宏敞為清康熙二年峨徹禪師移建於茲額仍長老坪者示不忘本也寺後萬箇千竿為翠竹峯峯左為蒲公結廬處下為蒲氏村由寺左而上有萬壽坡坡下宋紹興間懷古禪師創修正殿三楹奉古佛蒲公像明正德初宗寶禪師重修額曰萬壽堂命徒會賢理之於坪側元寶山別建淨室尋改永明萬壽禪林今廢故址尚存再上山肩為駱駝嶺以形名也三十長老坪至初殿圖説下駱駝嶺行半里許路稍坦又斜上轉至初殿昔漢時蒲公採藥見鹿迹現蓮華因開建此山故額曰初殿其山形若鸑鷟亦名鷟殿又名簇店蓋原祇板屋一間僧煮湯以俟遊客蒸炊後改店為殿即雲窩也明時續恩禪師鑄銅佛彌勒諸天像大小三十餘尊崇禎時鑄有鐵鐘清乾隆間被火焚南舟禪師重修之出殿右上即古石碑按殿門外有琉璃牌坊古石碑側有木坊為弘川禪師建道光時圮三十一初殿至華嚴頂圖説由古石碑直上危磴高懸為上天梯歷級而升進玉皇亭古剎雲深殿宇孤聳額華嚴頂頂後巖隅泉甘如醴名九龍井相傳建寺時患無水老僧夢神指示即其處鑿之水隨杖涌汪洋浩瀚至今仰汲頂前巖下有桂華洞匹練方橫一枝獨占平泉莊裏鮮此天香出亭右順下路稍坦復上古樹一株雪枝霄幹老氣橫秋呼老僧樹右望山峽一片瓦礫為九龍院故址三十二華嚴頂至蓮華石圖説由老僧樹歷數坡道平衍左通遇仙寺橫過山骨珠圓雲根玉立孱顏似芙蓉墜粉細蕊層萼天然錯理中結以庵院額曰蓮華石原名蓮華社社原在山頂左右靜室精工絶倫今僅存其名矣庵右為九嶺岡岡下舊有永延寺明周藩建今圮從庵中穿過平步里許亂峯壁立如臨絶地橫行數武復陡上危棧齒齒若登天然俗呼鵓鴿鑽天倣佛似之三十三蓮華石至洗象池圖説由鑽天坡轉左逆右歷石磴陡上過月臺見寺宇軒豁額曰洗象池原名初喜亭自白水至此遊蹤稍適因名其地曰初歡喜以前去尚多險徑又曰錯歡喜寺近無泉由弓背山架木引水入寺汲飲便之寺左有石砌六方小池深廣丈餘即古洗象池相傳普賢乘象過此必浴其象而後升今涸亂葉覆之旁一石高闊二尺為升象石石上小井不涸亦不溢池下石巖刻有巖谷靈光四大字巖下大小深壑終古雲封莫知底蘊稍上有磐陀石再上有左慈洞寺後羅漢坡有石罅數尺呼羅漢洞寺右巖壁層立為獅子巖三十四洗象池至大乘寺圖説由洗象池左直上數里橫過柏林即滑石溝溝上有井泉清前即大乘寺殿舍原覆木皮古稱木皮殿今用木板矣寺右數百步有化城寺故址相傳昆明施紹高太和王藎台來此遇白猿獻果啖之仙去舊有碣紀其事今失寺左行里許直上閻王扁昔有胡僧縛木架石以引行者為胡僧梯一名陵雲梯又有秦人劉海英趙光明募設木柵闌干攀援而上今廢右為梅子坡疏影橫斜往來遊人望以止渴焉三十五大乘寺至白雲寺圖説過陵雲梯下坡轉左行半里許路稍平白雲冉冉彌漫山谷素濤銀海變幻無端中有古剎為白雲寺又名雲壇殿三層覆以叢篁翠篠寺右為弓背山山勢長拖下有分水嶺左水出雅河右水經虎溪橋會洗象池黑水寺各水合雙飛橋水繞回龍山石船子龍門洞至峨眉縣北門出銅河山産桐花鳳五色俱備每桐花放時即來花落不知所之唐李德裕有畫桐花鳳扇賦詳藝文三十六白雲寺至雷洞坪圖説由白雲寺左陡上二里許荒煙岑樾中為雷洞坪寺舊基再上有古廟一座為雷神殿鐵像十餘尊明萬曆年鑄瀕巖豎鐵碑禁人語否則迅雷驚電風雨暴作相傳龍雷會居其下凡七十二洞歲旱禱於第三洞初投香幣不應則投死彘及婦人衣履之類往往雷雨交作又上三坪進寺額曰雷洞坪自漢時開建至清康熙四十一年賜御書靈覺二大字金剛經一部乾隆四十一年僧聞奇聞剛重新之道光二十三年僧心量移基重建同治甲子年僧覺圓又遷建於此此地空濛暗黑長無天日寺右懸巖絶壁間有飛來劍一名仙人劍歷傳女媧於此煉石伏羲於此悟道鬼谷於此著珞琭子三洞沈黑人迹罕到寺左峭阪險峻盤回紆折而上名為八十四盤三十七雷洞坪至接引殿圖説從盤路曲折而上右為接引殿清初順治庚子年河間府僧年八十見佛像臥荒叢中乃誓餓七日募修時大雪已露餓六日適蜀人趙翊凰登山見而憫之歸白督臺李公捐金五百命僧聞達重修之殿右瀕巖為金剛嘴巖下有石形似鐘名聖鐘對岸一石屹立十餘丈呼仙人石望之儼然三十八接引殿至太子坪圖説由接引殿盤旋而上道左一石壁立高二丈餘苔蘚平鋪現第一山字字畫色赤高寬二尺許年年必現現未必全若全現則年占大有復屈曲仰登凡數百丈名三倒拐一曰三倒角前有巨石橫亙當途為觀音巖原有觀音殿又三濟禪師建有回龍庵今俱廢傍巖斜上進太子坪以坪名寺層樓高聳內供太子因名一名萬行庵古智禪師開建聞達禪師重修之基址屢易從此至頂喜無險徑昔建有大歡喜亭今廢寺前巖下石形如象呼象王石自大乘寺以上遍山皆桫欏花宋子京贊曰衆葩共房葉附花外根不可徙見偉茲世昔賢遊記指大歡喜亭八十四盤上有桫欏坪蔣超辨之實在千佛頂後與獅子羅漢等坪同列詳舊志凡例三十九太子坪至天門寺圖説由太子坪左斜上道左有永慶寺原名盤龍由寺橫過至祖師殿殿左里許有大覺寺故址殿右上沈香塔以塔名寺明通天和尚奉敕開建神宗賜額護國草庵慈聖太后賜有珍珠繖御書佛號金繡長幡并九層沈香塔高丈許覆以層樓雕鏤金彩工極天然通天和尚法身在焉萬曆間賜住持本炯敕書一道塔左古有空樹老僧入定其中枯幹復榮今亡按老僧即晉遠公禪師弟慧持也塔右直上天門寺明瑞峯禪師建寺右兩石對立劃然中分入其門如登閶闔名天門石四十天門寺至七天橋圖説從天門石凡三折始達山徑境極幽峭過亭進七天橋以橋名寺古文殊庵亦名金剛寺被焚後光緒十年大峨寺僧圓明重建寺左古七天橋俗傳為九天仙女降會處而道書注峨山為第七洞天也舊有為天一柱坊今圮渡橋上和尚塔塔藏法身趺坐原額誤題普賢塔談鍾嶽以為和尚法身不當冒普賢之名改題和尚塔四十一七天橋至金殿圖説由和尚塔左上渡天仙橋旁有仙女庵故址進金殿明僧妙峯建僧惟密嗣修清初總兵祁三升捐修鐵瓦大殿以覆之金殿之瓦柱門櫺窗壁皆銅為之而滲金高二丈五尺廣一丈四尺四寸深一丈三尺五寸中設普賢菩薩像旁列萬佛門陰刻全蜀山川程途明瀋王捐造後以大殿火隨之而燬光緒十二年僧心啓改砌磚殿惟王育宗集王羲之書傅光宅集褚遂良書兩銅碑巋然完善光澤可鑑頂後懸巖下臨無地巖左祖殿亦修磚殿以護佛像有覩光臺居其中佛光每現於巳午先布兜羅綿雲平如玉地名銀色世界上有圓光外暈數重五色斑斕虛明若鏡觀者各自見形名攝身光雲散復出大圓光映物絢蒨不可正視名清現又有紫雲捧虹者名金橋白色無紅暈者名水光形如箕則曰辟支光如鐃鈸則曰童子光光止一光變態而名異當光欲現時二小鳥飛鳴其語曰佛現佛現明巡撫廖大亨有佛現鳥賦詳藝文至夜佛燈始見數點若螢火飛明漸至數千百萬儼若燈光冉冉而來落雪上有聲以手覆之浮光四迸不可掩殿前鐵闌干十餘丈殿左鐵塔矗立塔左有石屹然曰金剛石又曰金剛嘴嘴下萬石嵯峨名七寶臺又名獨尊臺臺下峭削六稜多石室石樞刻有鬱儀引日精結璘致月神得道處字頂左銅塔銅碑銅鐘鼎峙藏經觀音兩閣圮金殿前有瑞星石橫過即錫瓦殿殿右過楞嚴閣故址即光相寺往臥雲庵庵為僧性天建明末圮總制哈瞻令僧可聞重修康熙壬午賜僧照玉御書經典右有磐陀石石下為光明巖絶頂無水惟此庵下有井絡泉日飲千人因汙穢涸寺僧誦經泉復出金殿左下新鑿龍泉再下古白龍池深廣二丈水清多蜥蜴色白微黃長數寸四足兩額豎角有花文性馴而靈相傳為龍子遇旱禱雨輒應有碣刻明巡按馬如蛟七絶一首云龍向深山學化龍涓涓泉水自從容聞經想已能冥契好去乘時惠九農池左淨土庵明萬曆時僧大智建內豎遺願碑大佛坪方廣里許銅瓦殿僧別傳建前有捫參歷井坊以分野應參井也今俱圮千佛萬佛兩頂並峙各建庵於其下再下明月華藏兩庵皆結茅以奉香火焉山後昔有七二古德名庵坊今圮四十二蓮華石至遇仙寺圖説由蓮華石下分路望東北隅下遇仙寺據高臨下寥曠欲鶱其坡名長壽坡坡左尖石屹立低昂不一稱石筍峯坡足石梁橫亙為長壽橋橋右高巖瀑布飛射水出橋下順山麓屈曲而行有觀音橋直跨山澗右望百尺危巖跳珠噴雪如驚濤怒湍聲震山谷者呼觀音巖古苔如亂髮䰐鬖纏挂枮木頑石下垂十餘丈縷縷不絶名普賢線方物略稱仙人絛贊曰附陽而生垂若文絛大概苔類土石所交煎湯服之治氣痛有效亦山靈變幻之奇也四十三遇仙寺至仙峯寺圖説由觀音橋依山順行渡仙峯橋上有兩石對屹若劈中通一路名仙峯石亦呼天門石不數十武即仙峯寺梵宇頗敞寺右過坡即往九老洞路也寺前瀕巖古樹一幹而葉分四種即椰瓢樹前望大小尖峯逼肖芙蕖遂名蓮華峯屈曲而下呼九十九倒拐一名壽星坡有壽星橋橫亙山澗順巖而上復平行數十步為扁擔巖下視溪水盈盈為龍居溪昔有瘋僧百餘歲至此遇蟒當途默祝而去至今山旁草木人不敢樵採按九老洞在九嶺岡初殿上黃帝訪天皇真人至此遇一叟問有侶乎答以九人故名洞深窈莫測昔有然炬入者行三十餘里聞雞犬鼓樂之聲蝙蝠如鴉撲炬乃出中有觀音水一勺可資掬飲巖下即卜應泉也四十四仙峯寺至洪椿坪圖説從龍居溪沿巖而下路右即洪椿坪以坪名寺古千佛庵伏牛山楚山禪師開建一云寶掌禪師建明德心禪師重修法嗣鋭峯接踵歷二十餘年落成殿宇樓閣結構精工清初峨雲圓滿禪師復鼎新之康乾間御賜經典字幅寺後山頂有天成石池因名天池峯右為呪詛泉相傳當日大衆千人苦乏水源老僧持呪引水故名亦名錫杖水從寺左下行經木坊渡積善橋一名萬渡向有上中下三道橋右小徑乃下雙飛橋路也四十五洪椿坪至大坪圖説由積善橋陡上危坡俗呼蛇倒退其地昔多虎患因建山王廟鎮之患乃止道左有仙姬池池內蛙鳴聲韻悠揚儼然一部鼓吹人呼仙姬彈琴穿過茂林重歷月臺始達禪院舊名淨土今榜大坪以地名也相傳後殿初建時掘地得一圓石中空水一盂金魚二尾生機潑潑廟右敞坪有千年古松虯姿鶴骨鬱鬱森森昔開山老僧跏趺其下每見龍虎當前勢欲攫人輒默祝馴服至今虎夜巡更蛇不傷人亦異矣四十六大坪至會佛寺圖説由大坪轉山王廟下坡左瀕危壁迹絶人鳥相傳有猴王洞坡呼猴子坡路在山脊陡甚行者股栗進會佛寺寺為洪椿坪住持僧創建右為象鼻巖昔有靜室今圮左為石筍溝水出黑龍潭寺前陡下有坪差堪駐足稱牛心坪旁為杉樹岡即下牛心寺要道也四十七會佛寺至牛心寺圖説牛心寺一名延福唐慧通禪師以山多回祿改為臥雲乃孫真人思邈修煉處所遺鐵臼銅罐質朴色古今隨婪吏去矣藥爐丹竈在峯頂石洞中洞為藥王洞巖石碎裂無草木説者以為丹氣熏蒸所致方士多取煮服以為能助精養神洞外一石可以箕踞宴坐名玩丹石寺壁相傳有張僧繇畫羅漢像筆迹超妙眉目栩栩欲活頗著靈異一云吳道子畫今毀寺為宋繼業三藏重興淳祐間僧紹才重修明洪武時廣濟禪師住持溫井涸涼井水甘洌合寺仰汲寺內有卜應泉久晴將雨久雨將晴前一日取供炊白粲必赤為雨暘之應故名寺右有青蓮峯峯下有黑龍江再下石罅丈許為祖師洞由寺左行仍轉雙飛橋去矣四十八牛心寺至黑水寺圖説由牛心寺轉萬年淨水廟左旋過鐵索橋兩道一虎跳橋唐僖宗時僧慧通至此水泛不得渡見一虎蹲伏其旁跨之而濟因以名橋後蜀人張鳳羾等七人遊此又題其橋曰七笑一無懷橋以巖龕為無懷洞名之路右八音池又曰樂池遊人鼓掌一蛙大鳴羣蛙次第相和其數八將終一蛙復大鳴羣蛙頓止作止翕然一律如玉振金聲池邊一石可以小憩上有雞公石因作祟被雷擊之改呼雷打石一路曲折紆轉呼十二盤循石磴而上進黑水寺古名華藏創自晉肇公唐僧慧通率其妹慧續尼駐錫道聞朝廷賜有無縫衣玉環供器今無存寺宇屢經舉廢至清乾隆四十四年僧明仙重修之寺後對月峯原有祖師堂慧通肉身在焉寺前原有慧續尼院即續入定處相傳有黑虎巡廊之異今堂院瓦解僅存其名矣出寺仍轉雷打石往白袍殿殿小而新比丘居之寺後絶頂産茶味佳而色一年白二年緑地氣所鍾隨時變異四十九黑水寺至石船子圖説由黑水寺仍轉雙飛橋廣福寺下回龍山山勢崔巍周圍五里自牛心石俯瞰衆流匯歸成渠甫有歸宿源來渺渺瀉去潺潺則回龍實為砥柱矣由茲屈曲而下為五顯岡小店零星參綜錯伍再下瀕河逆行百餘步見長石橫臥溪中類艅艎若浮水面稱石船子俗號普賢船迫視之微肖紋理縱橫亦異他石豈慈航寶筏於此示相耶道左昔建有藏舟於壑山房今廢沿河順下有鐵索橋一道長二十餘丈橫亙溪中渡橋即往峨眉縣之山徑也五十石船子至龍門洞圖説由鐵索橋左沿河竭蹶而下見澗流自兩山石門中噴出為龍門峽峽之中兩岸巖壁千尋色如碧玉光潤照人有兩瀑布各出一巖頂相對飛下巖根有磐石承之激而濺沫跳珠常見籜葉隨出相傳即呂純陽劍畫十字洞旁叢篁遺墜也越數丈巖半有圓龕即龍門洞去水可二丈遊人乘槎至洞口萬壑千巖競來邀盼入尺許另透天光一線豁然開朗左壁刻龍門二大字為宋蘇東坡書一云富春孫公雙鉤石凸凹作鱗爪名以龍牀龍枕遊人援梯而上俯臨深潭紺碧無底非復人寰宋范成大云聞峨眉雙溪不減廬山三峽及至龍門則雙溪又在下風蓋天下峽泉之勝當以龍門為第一觀五十一龍門洞至新開寺圖説由龍門洞右繞蕭店伏虎寺至解脫橋左上陡甚度凹即旺相臺橫下新開寺明萬曆三年僧大用建後左為滴水巖右為尖峯嶺大松一株輪囷古致酷似獰龍前左對岸桂樹二株半去皮膚而生趣盎然當門小坡名以木魚形相似也按寺近舊有蟠龍寺為唐慧覺禪師建又有羅漢寺初建日梵僧赴齋齋畢不見西北隅有佛到寺因開山日得石佛故名又傳尊者曾到其間留有佛迹焉而孤峯絶壁鳥道紆縈人迹所不能到也故又稱不到寺今俱廢五十二新開寺至靈巖寺圖説由新開寺下坡經青龍場野店二十餘家過高橋進接引殿再渡觀音橋平疇沃衍桑麻映道上古石梯即靈巖寺寺為寶掌禪師結廬舊址歷朝增葺宋紹興五年太尉王陵漢州知州王陟施資重修易名護國光林元季燬明洪永間僧弘義圓道重建之仍曰靈巖景泰間僧寶峯增修三世佛殿殿前為明王樓東為伽藍堂西為祖師堂凡禪堂齋堂靜室香積客廳以次告成規模廣大天順庚辰頒賜藏經成化乙酉寶峯詣闕請額賜名會福弘正間僧本印重修寺宇昔有四十八重今存五之一僧衆昔以千計今寥寥矣佛光時現寺後有覩佛臺按寶掌生於周威烈王十二年丁卯至唐高宗顯慶二年丁巳卒住世一千七十一年詳舊志五十三靈巖寺至二峨三峨圖説二峨即中峨古綏山一名覆篷方輿記云綏山廢縣在峨眉縣西四十里高半大峨形如覆釜雄據南方上有天池葛由洞下有豬肝洞魚洞舊志云天池與李仙洞相對葛仙洞在白巖溪上為周成王時羌人葛由騎木羊處白巖溪旁有玉蟾洞洞壁石室如雲母倣佛見肩背衣絛傳為白玉蟾尸解處豬肝洞一名紫芝明督學王敕過洞前知有異物掘地得石碣刻紫芝洞三字旁注一山五口道人書今猶豎道左上一里有爛柯洞洞口刻爛柯二字魚洞下冷水河河畔乾洞元和志謂洞穴才容一人行數里漸寬平蝙蝠大如箕人不敢復進昔陰長生製黃表寫丹經四通其一通以黃金之簡書而刻之封以白銀之函置之綏山即兹地矣山産桃諺曰得綏山一桃雖不得仙亦足以豪三峨即小峨一名鏵刃山海經所謂西皇山是也在縣東西六十里距二峨九里高半之兩山耕作約數千人其間草木茶菜豆芋蕃膴豐熟足當田疇十分之五桃華白而實紅土人呼曰蟠桃味甘香惟較二峨産者頗小耳由大峨靈巖寺經青龍場渡孝心鐵索橋上紫芝廟遞上清虛樓樓後望三峨如在目前餘詳圖中不贅三峨在縣東西六十里東西二字疑誤但多處皆然祇好仍之五十四三峨至四峨圖説四峨一名華山其形稜瓣如華因以為名在大峨之直北距峨眉縣二十里酈道元水經注云峨山東北有武陽龍尾山仙者羽化之所殆即此與昔印宗禪師止錫四峨每跏趺時祥雲結蓋遇旱延禱甘霖立沛有龍王受戒猛獸調伏之異詳舊志高僧山有圓通寺由紫芝廟轉青龍場至其處計程三十里而遙按二峨三峨四峨均以大峨得名大峨高峻俯瞰羣山兼有三峨之勝綿亙岌翠環峙於前愈顯大峨雄偉上接穹蒼為名山之祖也峨山十景金頂祥光即絶頂金殿祖殿後為覩光臺以下各詩晴峯談鍾嶽撰一抹祥光畫不成峨山形勢極崢嶸琳宮紺宇塵緣絶直似須彌頂上行靈巖疊翠即靈巖寺危巖固是夙鍾靈風雨飄零常翠青疑是為吾標奇迹心香一瓣薦芳馨聖寺晚鐘即聖積寺樓有巨鐘晚鐘忽撞一聲聲古寺猶傳聖積名縱令凡情蔽塞極也應入耳覺心清象池夜月即洗象池普賢騎象杳何之勝迹空留洗象池一月映池池貯月月池感應妙難思白水秋風即萬年寺有白水池曾聞白水出真人此水由茲不染塵何遽西風吹木落歸根誰不悟玄因洪椿曉雨即洪椿坪此處多雨萬壑千巖勢不平攀蘿捫葛力難勝蒼茫山雨天將曙既到不憂犯夜行雙橋清音即雙飛橋有清音閣黑白二水牛心石傑然高閣出清音倣佛仙人下撫琴試向雙橋一傾耳無情兩水漱牛心九老仙府即仙峯寺有九老古洞圖成九老記香山九老緣何到此間料是箇中丹訣妙致令九老遠追攀大坪霽雪淨土寺即大坪禪院清涼別有天偶來淨土識真禪晴光晃映雪光朗心目空明照大千羅峯晴雲即伏虎寺有羅峯庵蔣虎臣舊隱處境幽正好學無餘太史虎臣曾結廬佛聖來迎蹤已渺長空萬里日光舒附峨山圖説明胡世安大學士井研西南屹然摩漢首記峨眉襟岷嶓而帶江涪遠窮天竺近矚蜀都陰壑陽巖雲溪風洞朝暮而冬夏降陟而晦明花卉別鍾禽蟲畸類琳宮玄觀錯飾其間逸客騷人迭相盟主洵坤輿巨望也意接口得而宣之有遺音矣目涉手得而繪之有遺形矣神契手與口得而億中焉翻有出人意表者則天機離合之因也余既集衆言以測厥蘊先茲圖以表厥儀三百餘里郛廓直欲尺寸規之以引遊緒可謂操約而願奢矣世有崇域外觀者小中見大略處稽詳則普賢願王法界可決眥納之矣又何必策筇造極置身兜羅綿雲表也附圖頌明李尊美雲間二儀分位流峙標奇鍾彼峨兮上應鶉首下帶龍藪睇岷嶓兮權輿南戒遊蹤罕屆仙隱薖兮相霙封山如蹯啓關侯逶迤兮綿雲冠椒環霞映㟽態剎那兮莫雨匪嵐莫唄匪庵歷嵾嵯兮耳而目之久而倏之引興酡兮吮毫圖畫聊以意逆絓漏多兮峨眉圖跋無名氏宇內名山有名殊而實班者峨眉之於昆崙是也如以名潯之德安泉之永春以及肅衛且有三昆崙矣若夫平南天門汀之歸化邵武泰寧粵西太平汝之郟黔思城南之山莫不竊號峨眉裒然著郡志不僅如覆篷鏵刃溟涬雁行依光近附也雖擬倫不類有目共昭徒按圖以索驥拔幅於拘墟凡有一體與具體而微者咸得以貸靈甲秀而目眯粳粃者又比比是使峨竟不克以圖自表矣故正名莫要於核實
